openapi: 3.0.3
info:
  title: TRPG API (MVP, runtime-aligned)
  version: 0.2.0
  description: |
    Runtime contract for TRPG endpoints implemented in `bin/main_eio.ml`.
    Request schemas are aligned with MCP TRPG tool inputs in `lib/tool_trpg.ml`
    (`masc_trpg_dice_roll`, `masc_trpg_turn_advance`, `masc_trpg_stream`,
    `masc_trpg_round_run`).
servers:
  - url: http://127.0.0.1:8935
x-mcp-tools:
  masc_trpg_dice_roll:
    requestSchema: '#/components/schemas/TrpgDiceRollRequest'
    equivalentHttp:
      method: POST
      path: /api/v1/trpg/dice/roll
  masc_trpg_turn_advance:
    requestSchema: '#/components/schemas/TrpgTurnAdvanceRequest'
    equivalentHttp:
      method: POST
      path: /api/v1/trpg/turns/advance
  masc_trpg_stream:
    requestSchema: '#/components/schemas/TrpgStreamQuery'
    equivalentHttp:
      method: GET
      path: /api/v1/trpg/stream
  masc_trpg_round_run:
    requestSchema: '#/components/schemas/TrpgRoundRunRequest'
    equivalentHttp:
      method: POST
      path: /api/v1/trpg/rounds/run
paths:
  /api/v1/trpg/events:
    get:
      summary: Read room events (incremental)
      parameters:
        - $ref: '#/components/parameters/RoomIdQuery'
        - in: query
          name: after_seq
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
        - in: query
          name: event_type
          required: false
          schema:
            $ref: '#/components/schemas/EventTypeString'
      responses:
        '200':
          description: Event list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventsResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      summary: Append an event
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AppendEventRequest'
      responses:
        '201':
          description: Event appended
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppendEventResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/trpg/state:
    get:
      summary: Derive current state by replaying events
      parameters:
        - $ref: '#/components/parameters/RoomIdQuery'
        - in: query
          name: rule_module
          required: false
          schema:
            $ref: '#/components/schemas/RuleModule'
      responses:
        '200':
          description: Derived state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DerivedStateResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/trpg/dice/roll:
    post:
      summary: Roll and append `dice.rolled` event
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TrpgDiceRollRequest'
      responses:
        '201':
          description: Dice roll applied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DiceRollResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/trpg/turns/advance:
    post:
      summary: Advance turn and optional phase change
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TrpgTurnAdvanceRequest'
      responses:
        '200':
          description: Turn advanced
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TurnAdvanceResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/trpg/stream:
    get:
      summary: Stream-like window read of events (JSON)
      parameters:
        - $ref: '#/components/parameters/RoomIdQuery'
        - in: query
          name: after_seq
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
        - in: query
          name: event_type
          required: false
          schema:
            $ref: '#/components/schemas/EventTypeString'
      responses:
        '200':
          description: Event window
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StreamResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/trpg/rounds/run:
    post:
      summary: Run one keeper-driven TRPG round (DM then players)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TrpgRoundRunRequest'
      responses:
        '200':
          description: Round executed with status summary and appended events
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoundRunResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'

components:
  parameters:
    RoomIdQuery:
      in: query
      name: room_id
      required: true
      schema:
        type: string
        minLength: 1

  responses:
    BadRequest:
      description: Validation or input error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    InternalServerError:
      description: Server-side processing error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    RuleModule:
      type: string
      enum: [dnd5e-lite]
      default: dnd5e-lite

    PhaseString:
      type: string
      enum: [lobby, briefing, round, resolution, end, ended]

    EventTypeString:
      type: string
      enum:
        - room.created
        - room.started
        - phase.changed
        - turn.started
        - turn.action.proposed
        - turn.action.resolved
        - turn.timeout
        - keeper.unavailable
        - metric.updated
        - room.ended
        - dice.rolled
        - hp.changed
        - inventory.changed
        - flag.set
        - node.advanced
        - narration.posted

    ErrorResponse:
      type: object
      properties:
        ok:
          type: boolean
          enum: [false]
        error:
          type: string
      required: [ok, error]

    EventEnvelope:
      type: object
      properties:
        seq:
          type: integer
        room_id:
          type: string
        ts:
          type: string
          format: date-time
        type:
          $ref: '#/components/schemas/EventTypeString'
        actor_id:
          type: string
          nullable: true
        payload:
          type: object
          additionalProperties: true
      required: [seq, room_id, ts, type, payload]

    StateObject:
      type: object
      additionalProperties: true

    AppendEventRequest:
      type: object
      properties:
        room_id:
          type: string
        event_type:
          $ref: '#/components/schemas/EventTypeString'
        actor_id:
          type: string
        ts:
          type: string
          format: date-time
        seq:
          type: integer
          minimum: 1
        payload:
          type: object
          additionalProperties: true
      required: [room_id, event_type]

    AppendEventResponse:
      type: object
      properties:
        ok:
          type: boolean
        event:
          $ref: '#/components/schemas/EventEnvelope'
      required: [ok, event]

    DerivedStateResponse:
      type: object
      properties:
        ok:
          type: boolean
        room_id:
          type: string
        rule_module:
          $ref: '#/components/schemas/RuleModule'
        event_count:
          type: integer
        state:
          $ref: '#/components/schemas/StateObject'
      required: [ok, room_id, rule_module, event_count, state]

    TrpgDiceRollRequest:
      type: object
      properties:
        room_id:
          type: string
        actor_id:
          type: string
        action:
          type: string
        stat_value:
          type: integer
        dc:
          type: integer
        raw_d20:
          type: integer
          minimum: 1
          maximum: 20
        rule_module:
          $ref: '#/components/schemas/RuleModule'
      required: [room_id, actor_id, action, stat_value, dc]

    DiceRollDetail:
      type: object
      properties:
        raw_d20:
          type: integer
        bonus:
          type: integer
        total:
          type: integer
        dc:
          type: integer
        passed:
          type: boolean
        label:
          type: string
      required: [raw_d20, bonus, total, dc, passed, label]

    DiceRollResponse:
      type: object
      properties:
        ok:
          type: boolean
        event:
          $ref: '#/components/schemas/EventEnvelope'
        roll:
          $ref: '#/components/schemas/DiceRollDetail'
        state:
          $ref: '#/components/schemas/StateObject'
      required: [ok, event, roll, state]

    TrpgTurnAdvanceRequest:
      type: object
      properties:
        room_id:
          type: string
        phase:
          $ref: '#/components/schemas/PhaseString'
        rule_module:
          $ref: '#/components/schemas/RuleModule'
      required: [room_id]

    TurnAdvanceResponse:
      type: object
      properties:
        ok:
          type: boolean
        room_id:
          type: string
        turn:
          type: integer
        events:
          type: array
          items:
            $ref: '#/components/schemas/EventEnvelope'
        state:
          $ref: '#/components/schemas/StateObject'
      required: [ok, room_id, turn, events, state]

    TrpgStreamQuery:
      type: object
      properties:
        room_id:
          type: string
        after_seq:
          type: integer
          minimum: 0
          default: 0
        event_type:
          $ref: '#/components/schemas/EventTypeString'
      required: [room_id]

    TrpgRoundRunRequest:
      type: object
      properties:
        room_id:
          type: string
        dm_keeper:
          type: string
        player_keepers:
          type: object
          additionalProperties:
            type: string
        phase:
          type: string
          default: round
        rule_module:
          $ref: '#/components/schemas/RuleModule'
        timeout_sec:
          type: number
          default: 30
      required: [room_id, dm_keeper, player_keepers]

    RoundRunParticipantStatus:
      type: object
      properties:
        actor_id:
          type: string
        role:
          type: string
          enum: [dm, player]
        keeper:
          type: string
        status:
          type: string
          enum: [ok, timeout, unavailable, invalid_response]
        timeout_sec:
          type: number
        error:
          type: string
        reply:
          type: string
      required: [actor_id, role, keeper, status]

    RoundRunSummary:
      type: object
      properties:
        participants:
          type: integer
        successes:
          type: integer
        timeouts:
          type: integer
        unavailable:
          type: integer
      required: [participants, successes, timeouts, unavailable]

    RoundRunResponse:
      type: object
      properties:
        ok:
          type: boolean
          enum: [true]
        room_id:
          type: string
        phase:
          type: string
        turn_before:
          type: integer
        turn_after:
          type: integer
        timeout_sec:
          type: number
        statuses:
          type: array
          items:
            $ref: '#/components/schemas/RoundRunParticipantStatus'
        summary:
          $ref: '#/components/schemas/RoundRunSummary'
        events:
          type: array
          items:
            $ref: '#/components/schemas/EventEnvelope'
        state:
          $ref: '#/components/schemas/StateObject'
      required:
        - ok
        - room_id
        - phase
        - turn_before
        - turn_after
        - timeout_sec
        - statuses
        - summary
        - events
        - state

    EventsResponse:
      type: object
      properties:
        ok:
          type: boolean
        room_id:
          type: string
        after_seq:
          type: integer
        count:
          type: integer
        events:
          type: array
          items:
            $ref: '#/components/schemas/EventEnvelope'
      required: [ok, room_id, after_seq, count, events]

    StreamResponse:
      type: object
      properties:
        ok:
          type: boolean
        stream:
          type: boolean
          enum: [true]
        room_id:
          type: string
        after_seq:
          type: integer
        count:
          type: integer
        events:
          type: array
          items:
            $ref: '#/components/schemas/EventEnvelope'
      required: [ok, stream, room_id, after_seq, count, events]
