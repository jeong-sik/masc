# ÔöÇÔöÇ Runtime lanes (ordered failover) ÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇ
# A lane is an ordered list of runtime candidates. When a keeper is assigned
# to a lane, the turn attempts candidates in order until one succeeds or the
# lane is exhausted. Lanes are resolved at config load; unknown candidate ids
# abort startup. Only the "ordered" strategy is implemented today.
[runtime.lanes.default]
strategy = "ordered"
candidates = [
  "ollama_cloud.deepseek-v4-flash",
  "deepseek.deepseek-v4-pro",
]

# ÔöÇÔöÇ Keeper assignments ÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇ
# Keepers are assigned to a model by provider.model key. Unassigned
# keepers fall back to [runtime].default. Per-keeper overrides in the
# live config (<base>/.masc/config/runtime.toml) take precedence.
#
# The public seed ships no keeper assignments: keeper names are
# deployment-local identities, so per-keeper routing belongs in the live
# config, not here (enforced by test_runtime_config_validity "public seed
# has no keeper assignments").
# Do not assign general keeper lanes to Pro here. Pro is reserved for explicit
# judge/evaluator lanes ([runtime].cross_verifier and [fusion].judge).
#
# Assignment targets must be runtime ids (<provider>.<model>); a lane id here
# is rejected at load. A keeper reaches a [runtime.lanes] failover group only
# when the lane id shadows a runtime id (resolve_assignment prefers the lane
# on collision).
[runtime.assignments]
# example: pin a test keeper to an explicit runtime
# canary = "deepseek.deepseek-v4-pro"

# ÔöÇÔöÇ Discord ÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇ
# Trigger policy controls which inbound Discord events the bot responds to.
#   mention_or_thread  ÔÇö ýŐĄŰáłŰôťýŚÉýäť ý×ÉŰĆÖ ýŁĹŰőÁ, ýŁ╝Ű░ś ý▒äŰäÉýŁÇ Űęśýůś ÝĽäýÜö (ŕŞ░Ű│Şŕ░ĺ)
#   mention_only       ÔÇö @ŰęśýůśŰÉť ŰęöýőťýžÇŰžî ýŁĹŰőÁ
#   all                ÔÇö Ű¬ĘŰôá ŰęöýőťýžÇýŚÉ ýŁĹŰőÁ
#   user_only:<snowflake> ÔÇö ÝŐ╣ýáĽ ýéČýÜęý×ÉŰžî
# Env var MASC_DISCORD_TRIGGER_POLICY overrides this value.
[discord]
trigger_policy = "mention_or_thread"

# ÔöÇÔöÇ Fusion ÝîĘŰäÉ+ýőČÝîÉ ýőČýŁś (RFC-0252) ÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇ
# masc_fusion ŰĆäŕÁČýŁś out-of-band ýőČýŁś ŰúĘÝöä ýäĄýáĽ. ŕ░ťýŁŞ dev ý╣┤ŰéśŰŽČŰíť ŕŞ░Ű│Ş ON.
# harness(RFC-0252 ┬ž11) Ű»Şŕ▓ÇýŽŁ ÔÇö ý╣┤ŰéśŰŽČ ýÂťŰáą(panel ŰőÁ + judge ýóůÝĽę)ýť╝Űíť ýéČÝŤä ÝîÉŰőĘ.
# [fusion] ýä╣ýůśýŁ┤ ýŚćŕ▒░Űéś enabled=falseŰę┤ masc_fusion ÝśŞýÂťýŁÇ ŕ▓îýŁ┤ÝŐŞýŚÉýäť
# DenyŰíť ýŽëýőť Ű░śÝÖśŰÉśŕ│á Ű¬ĘŰŹŞýŁä ÝśŞýÂťÝĽśýžÇ ýĽŐŰŐöŰőĄ.
#
# ÝîĘŰäÉ/ýőČÝîÉ Ű¬ĘŰŹŞ ŰČŞý×ÉýŚ┤ýŁÇ ýťäýŁś <provider>.<model> Űč░ÝâÇý×ä idŰą╝ ŕĚŞŰîÇŰíť ýô┤ŰőĄ.
# ÝîĘŰäÉýŁÇ ÝĽśŰéś ýŁ┤ýâüýŁś Űč░ÝâÇý×äýť╝Űíť ŕÁČýä▒ÝĽśŕ│á, ýőČÝîÉýŁÇ ÝîĘŰäÉ ŰőÁŰ│ÇýŁä ýóůÝĽęÝĽťŰőĄ.
[fusion]
enabled = true
default_preset = "trio"
# staged_judge_of_judgesýŁś ŕ│áýáĽ reducer group ÝüČŕŞ░.
staged_judge_group_size = 3

# ÝîĘŰäÉ ÝöäŰŽČýůő. ÝîĘŰäÉ ŰőÁŰ│ÇýŁÇ free textŰőĄ. 2026-07-01 ýéČŕ│á(ollama.com cloudŕ░Ç json_schemaŰą╝
# ýí░ýÜęÝ×ł ŰČ┤ýőť Ôćĺ ÝîĘŰäÉ ýáäŰęŞ) ýŁ┤ÝŤä ÝîĘŰäÉýŁś provider-native structured output ýÜöŕÁČŰŐö ýáťŕ▒░ŰÉÉŰőĄ
# (fusion_panel.ml). Űö░ŰŁ╝ýäť ÝîĘŰäÉ Űč░ÝâÇý×äýŁÇ supports-structured-output ýäáýľŞýŁ┤ ÝĽäýÜö ýŚćŰőĄ ÔÇö
# structured output ýÜöŕÁČŰŐö ýĽäŰ×ś judgeýŚÉŰžî ŰéĘŰŐöŰőĄ.
# ÝöäŰíČÝöäÝŐŞŰŐö ÝľëŰĆÖýŁä ýáĽýŁśÝĽśŰ»ÇŰíť ýŻöŰôť defaultŕ░Ç ýĽäŰőłŰŁ╝ ýŚČŕŞ░ýäť Ű░ŤŰŐöŰőĄ (ŰłäŰŁŻ ýőť ŰíťŰôť
# ŰőĘŕ│äýŚÉýäť fail-fast). ÝŐťŰőŁýŁÇ ý×Čý╗┤ÝîîýŁ╝ ýŚćýŁ┤ ýŁ┤ ŕ░ĺŰžî Ű░öŕżŞŰę┤ ŰÉťŰőĄ.
[fusion.presets.trio]
panel = [
  "ollama_cloud.ollama-cloud-devstral-2-123b",
  "ollama_cloud.ollama-cloud-devstral-small-2-24b",
  "ollama_cloud.ollama-cloud-ministral-3-14b",
]
# Fusion judges request provider-native structured output. Keep this on a
# runtime whose model resolves through the OAS catalog with native schema support.
judge = "ollama_cloud.ollama-cloud-devstral-2-123b"
panel_system_prompt = """
You are an expert panelist. Answer the user's question directly and concisely \
with your best independent analysis. Do not defer to other models; give your \
own view.
"""
judge_system_prompt = """
You are an impartial judge. You are given a panel of model answers to the same \
question. Synthesize them: identify points of consensus, contradictions, \
partial coverage, unique insights, and blind spots, then give one resolved \
answer. Respond with ONLY the requested JSON object, no prose and no code fences.
"""
# ÝîĘŰäÉ/ýőČÝîÉýŚÉ MASC web_search/web_fetch ŰĆäŕÁČŰą╝ ýú╝ý×ůÝĽáýžÇ ýŚČŰÂÇ.
web_tools = false

# ÔöÇÔöÇ JoJ-capable preset (RFC-0283 judge-of-judges) ÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇ
# masc_fusion topology="judge_of_judges"ŰŐö presetýŚÉ 1ý░Ę ýőČÝîÉ >= 2Ű¬ůýŁä ýÜöŕÁČÝĽťŰőĄ
# (fusion_orchestrator.run_judge_of_judges). trioŰŐö ŰőĘýŁ╝ judgeŰŁ╝ JoJ ÝśŞýÂťýŁ┤ ÝĽşýâü
# "requires >= 2 judges"Űíť fail-closedŰÉťŰőĄ Ôćĺ ÝéĄÝŹ╝ŕ░Ç JoJ topologyŰą╝ ýôŞ ýłś ýŚćýŚłŰőĄ.
# quorumýŁÇ ýäťŰíť ŰőĄŰąŞ ŰáîýŽł(evidence/coverage)ýŁś 1ý░Ę ýőČÝîÉ 2Ű¬ůýŁä ŰĹÉŕ│á, meta judge(judge=)ŕ░Ç
# ŰĹÉ ýóůÝĽęýŁä ý×Čýí░ýáĽÝĽťŰőĄ. ÝéĄÝŹ╝ ýéČýÜę: masc_fusion preset="quorum" topology="judge_of_judges".
# Panel models and Fusion judge/refine/meta paths request provider-native
# structured output, so every panel and judge runtime below must declare
# supports-structured-output=true. Distinct labels preserve lens identity while
# the schema contract prevents config drift back to JSON-mode-only runtimes.
# staged_judge_of_judgesŰŐö [fusion].staged_judge_group_size(=3)ýŁś ýáĽÝÖĽÝĽť Ű░░ýłś
# ŕĚŞŰú╣ýŁä ýÜöŕÁČÝĽśŰ»ÇŰíť quorum(2 judges)ýŁÇ Ű╣äŰîÇýâü ÔÇö Ű│äŰĆä preset ÝĽäýÜö.
[fusion.presets.quorum]
panel = [
  "ollama_cloud.ollama-cloud-devstral-2-123b",
  "ollama_cloud.ollama-cloud-devstral-small-2-24b",
  "ollama_cloud.ollama-cloud-ministral-3-14b",
]
panel_system_prompt = """
You are an expert panelist. Answer the user's question directly and concisely \
with your best independent analysis. Do not defer to other models; give your \
own view.
"""
# meta judge: 1ý░Ę ýőČÝîÉŰôĄýŁś ýóůÝĽęýŁä ý×Čýí░ýáĽÝĽśŰŐö ýÁťýóů reducer (RFC-0283).
judge = "ollama_cloud.ollama-cloud-ministral-3-14b"
judge_system_prompt = """
You are the meta-judge. You are given several independent judge syntheses of the \
same panel of model answers, each produced through a different evaluative lens. \
Reconcile them: where the judges agree, state the consensus; where they diverge, \
adjudicate with reasons; surface any blind spot that a single lens missed. Produce \
one resolved answer. Respond with ONLY the requested JSON object, no prose and no code fences.
"""
web_tools = false

# 1ý░Ę ýőČÝîÉ ÔÇö ýäťŰíť ŰőĄŰąŞ ŰáîýŽłŰíť ÝîĘŰäÉýŁä ŰĆůŰŽŻ ýóůÝĽęÝĽťŰőĄ (JoJ requires >= 2; RFC-0283).
# labelýŁ┤ ýáĽý▓┤ýä▒ýŁä ýú╝Ű»ÇŰíť distinct lensŰŐö distinct identityŕ░Ç ŰÉťŰőĄ (Duplicate_judge ÝÜîÝö╝).
# Strict structured-output support is mandatory for panel and judge runtimes in
# this seed. Some model families overlap across panel and judge lanes because the
# checked-in schema-capable runtime set is intentionally narrow; distinct labels
# still preserve lens identity for judge-of-judges routing.
[[fusion.presets.quorum.judges]]
model = "ollama_cloud.ollama-cloud-devstral-2-123b"
label = "evidence"
system_prompt = """
You are an impartial first-pass judge. Synthesize the panel of model answers \
through an EVIDENCE lens: weigh each claim by how well it is supported, flag \
unsupported assertions, and prefer conclusions grounded in verifiable reasoning. \
Respond with ONLY the requested JSON object, no prose and no code fences.
"""

[[fusion.presets.quorum.judges]]
model = "ollama_cloud.ollama-cloud-devstral-small-2-24b"
label = "coverage"
system_prompt = """
You are an impartial first-pass judge. Synthesize the panel of model answers \
through a COVERAGE lens: map what each answer addresses and omits, surface blind \
spots and unique insights, and prefer the most complete resolution. \
Respond with ONLY the requested JSON object, no prose and no code fences.
"""

# ÔöÇÔöÇ Staged-JoJ-capable preset (RFC-0283 staged_judge_of_judges) ÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇ
# staged_judge_of_judgesŰŐö judge ýłśŕ░Ç [fusion].staged_judge_group_size(=3)ýŁś
# ýáĽÝÖĽÝĽť Ű░░ýłśýŁ┤Űę┤ýäť group_size*2(=6) ýŁ┤ýâüýŁ┤ýľ┤ýĽ╝ ÝĽťŰőĄ (fusion_policy.staged_judge_groups).
# ýžÇŕŞłŕ╣îýžÇ ýÂęýí▒ presetýŁ┤ 0ýŁ┤ŰŁ╝ topologyŕ░Ç ŰĆäŕÁČ ýŐĄÝéĄŰžłýŚÉ ŰůŞýÂťŰÉśŕ│áŰĆä Ű¬ĘŰôá ÝśŞýÂťýŁ┤
# config ýŚÉŰčČŰíť fail-closedŰÉśŰŐö ýúŻýŁÇ ýśÁýůśýŁ┤ýŚłŰőĄ. councilýŁÇ 6ŕ░ť lens ýőČÝîÉýŁä
# 3ŕ░ťýöę 2 stageŰíť ŰéśŰłłŰőĄ: stage 1 = evidence/coverage/risk, stage 2 =
# feasibility/simplicity/adversarial. ŕ░ü stage metaŕ░Ç ŕĚŞŰú╣ ýóůÝĽęýŁä ŰžîŰôĄŕ│á ýÁťýóů
