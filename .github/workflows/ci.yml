name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch: {}

permissions:
  contents: read
  actions: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Changed Paths
    runs-on: ubuntu-latest
    outputs:
      ci_shared: ${{ steps.filter.outputs.ci_shared }}
      dashboard: ${{ steps.filter.outputs.dashboard }}
      ocaml_ci: ${{ steps.filter.outputs.ocaml_ci }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            ci_shared:
              - '.github/workflows/**'
              - '.github/actions/**'
            dashboard:
              - 'dashboard/**'
            ocaml_ci:
              - '**/*'
              - '!dashboard/**'
              - '!docs/**'
              - '!**/*.md'

  health:
    name: Health
    runs-on: ubuntu-latest
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.ocaml_ci == 'true'
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify OAS pin ratchet
        run: |
          chmod +x scripts/check-oas-pin.sh
          scripts/check-oas-pin.sh

      - name: Verify PR sync
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        env:
          PR_HEAD_REF: ${{ github.head_ref }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          chmod +x scripts/check-pr-sync.sh
          scripts/check-pr-sync.sh \
            --head-branch "$PR_HEAD_REF" \
            --pr-number "$PR_NUMBER" \
            --expected-head-sha "$PR_HEAD_SHA"

      - name: Setup OCaml environment
        uses: ./.github/actions/setup-ocaml-env
        with:
          cache-prefix: oas-otel-02
          pin-extra-args: --with-bisect
          apt-packages: ripgrep bc
          opam-install-args: --deps-only --with-test --yes

      - name: Fetch base branch for health ratchet
        if: github.event_name == 'pull_request'
        run: git fetch origin "${{ github.base_ref }}" --depth=1

      - name: Run health snapshot
        env:
          HEALTH_BASELINE_REF: ${{ github.event_name == 'pull_request' && format('origin/{0}', github.base_ref) || '' }}
        run: |
          chmod +x scripts/health_snapshot.sh scripts/anti-fake-audit.sh
          if [ -n "${HEALTH_BASELINE_REF}" ]; then
            opam exec -- bash scripts/health_snapshot.sh \
              --json-out .health/health-snapshot.json \
              --baseline-ref "${HEALTH_BASELINE_REF}" \
              --fail-on-lib-regression
          else
            opam exec -- bash scripts/health_snapshot.sh \
              --json-out .health/health-snapshot.json \
              --baseline-file .ci/health-baseline.json \
              --fail-on-lib-regression
          fi

      - name: Upload health snapshot
        uses: actions/upload-artifact@v4
        with:
          name: health-snapshot
          path: .health/health-snapshot.json

  pr-hygiene:
    name: PR Hygiene
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify PR sync
        if: github.event.pull_request.head.repo.full_name == github.repository
        env:
          PR_HEAD_REF: ${{ github.head_ref }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          chmod +x scripts/check-pr-sync.sh
          scripts/check-pr-sync.sh \
            --head-branch "$PR_HEAD_REF" \
            --pr-number "$PR_NUMBER" \
            --expected-head-sha "$PR_HEAD_SHA"

      - name: Run PR hygiene guards
        env:
          BASE_REF: origin/${{ github.base_ref }}
          HEAD_REF: ${{ github.event.pull_request.head.sha }}
        run: |
          chmod +x scripts/check-pr-hygiene.sh
          git fetch origin "${{ github.base_ref }}" --depth=100
          scripts/check-pr-hygiene.sh \
            --base "$BASE_REF" \
            --head "$HEAD_REF" \
            --recent-main 50 \
            --duplicate-policy warn
  build:
    name: Build and Test
    runs-on: ubuntu-latest
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.ocaml_ci == 'true'
    timeout-minutes: 60
    env:
      CI_CONTRACT_HARNESS_ENABLED: "0"
      DUNE_BUILD_DIR: .ci_build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify PR sync
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        env:
          PR_HEAD_REF: ${{ github.head_ref }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          chmod +x scripts/check-pr-sync.sh
          scripts/check-pr-sync.sh \
            --head-branch "$PR_HEAD_REF" \
            --pr-number "$PR_NUMBER" \
            --expected-head-sha "$PR_HEAD_SHA"

      - name: Setup OCaml environment
        uses: ./.github/actions/setup-ocaml-env
        with:
          cache-prefix: oas-otel-02
          pin-extra-args: --with-bisect
          apt-packages: jq
          opam-install-args: --deps-only --with-test --yes

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install grpcurl
        run: |
          GOBIN="$HOME/go/bin" go install github.com/fullstorydev/grpcurl/cmd/grpcurl@latest
          echo "$HOME/go/bin" >> "$GITHUB_PATH"

      - name: Build
        run: |
          opam exec -- dune build

      - name: Run tests (quick suite)
        env:
          ME_ROOT: /tmp/me
          ALCOTEST_QUICK_TESTS: "1"
          CI_TEST_TIMEOUT_SEC: 900
          CI_TEST_HEARTBEAT_SEC: 30
          MASC_LLAMA_RUNTIMES_JSON: '[{"base_url":"http://127.0.0.1:8085","max_concurrency":4}]'
          MASC_KEEPER_MSG_TIMEOUT_MAX_SEC: "10"
        run: |
          mkdir -p /tmp/me
          chmod +x scripts/ci-run-tests.sh
          scripts/ci-run-tests.sh "opam exec -- dune test"

      - name: Run SSE reconnect e2e
        env:
          ME_ROOT: /tmp/me
          CI_TEST_TIMEOUT_SEC: 900
          CI_TEST_HEARTBEAT_SEC: 15
          MASC_MAIN_EIO_EXE: .ci_build/default/bin/main_eio.exe
        run: |
          mkdir -p /tmp/me
          chmod +x scripts/ci-run-tests.sh
          scripts/ci-run-tests.sh "opam exec -- dune exec ./test/test_sse_storm_e2e.exe"

      - name: Run transport harness suite
        env:
          ME_ROOT: /tmp/me
          CI_TEST_TIMEOUT_SEC: 900
          CI_TEST_HEARTBEAT_SEC: 15
        run: |
          mkdir -p /tmp/me
          chmod +x scripts/ci-run-tests.sh
          chmod +x scripts/harness/transport/run_all.sh
          chmod +x scripts/harness/transport/verify_sse.sh
          chmod +x scripts/harness/transport/verify_grpc_subscribe.sh
          chmod +x scripts/harness/transport/verify_h2c_autodetect.sh
          chmod +x scripts/harness/transport/verify_ws.sh
          chmod +x scripts/harness/transport/verify_webrtc_signaling.sh
          chmod +x scripts/harness/lib/server_bootstrap.sh
          scripts/ci-run-tests.sh "bash scripts/harness/transport/run_all.sh"

      - name: Check formatting
        run: |
          opam exec -- dune fmt 2>&1 || true
          # Note: dune fmt may not be available, skip if so

      - name: Verification matrix summary
        run: |
          echo "::notice::Required CI gates in this job: dune test, test_sse_storm_e2e, transport harness suite"
          echo "::notice::Dedicated required CI job: contract harness suite"
          echo "::notice::Optional env-gated suites not run here: PostgreSQL tests, live ICE/STUN/TURN/browser interop, viewer-local-e2e-check, swarm/team-session workload harnesses"

  contract:
    name: Contract Harness
    runs-on: ubuntu-latest
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.ocaml_ci == 'true'
    timeout-minutes: 30
    env:
      CI_CONTRACT_HARNESS_ENABLED: "0"
      DUNE_BUILD_DIR: .ci_build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify PR sync
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        env:
          PR_HEAD_REF: ${{ github.head_ref }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          chmod +x scripts/check-pr-sync.sh
          scripts/check-pr-sync.sh \
            --head-branch "$PR_HEAD_REF" \
            --pr-number "$PR_NUMBER" \
            --expected-head-sha "$PR_HEAD_SHA"

      - name: Setup OCaml environment
        uses: ./.github/actions/setup-ocaml-env
        with:
          cache-prefix: oas-otel-02
          opam-install-args: --deps-only --yes

      - name: Build server executable
        run: |
          opam exec -- dune build ./bin/main_eio.exe

      - name: Run contract harness suite
        env:
          ME_ROOT: /tmp/me
          CI_TEST_TIMEOUT_SEC: 900
          CI_TEST_HEARTBEAT_SEC: 15
        run: |
          mkdir -p /tmp/me
          chmod +x scripts/ci-run-tests.sh
          chmod +x scripts/harness/contract/run_all.sh
          chmod +x scripts/harness/lib/server_bootstrap.sh
          scripts/ci-run-tests.sh "scripts/harness/contract/run_all.sh"

      - name: Verification matrix summary
        run: |
          echo "::notice::Required CI gate in this job: contract harness suite"
          echo "::notice::Contract harness runs once here via an explicit wrapped command"
          echo "::notice::Optional env-gated suites not run here: PostgreSQL tests, live ICE/STUN, viewer-local-e2e-check, swarm/team-session workload harnesses"

  dashboard:
    name: Dashboard Validation
    runs-on: ubuntu-latest
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.dashboard == 'true' || needs.changes.outputs.ci_shared == 'true'
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify PR sync
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        env:
          PR_HEAD_REF: ${{ github.head_ref }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          chmod +x scripts/check-pr-sync.sh
          scripts/check-pr-sync.sh \
            --head-branch "$PR_HEAD_REF" \
            --pr-number "$PR_NUMBER" \
            --expected-head-sha "$PR_HEAD_SHA"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.31.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: dashboard/pnpm-lock.yaml

      - name: Install dashboard dependencies
        run: pnpm --dir dashboard install --frozen-lockfile

      - name: Typecheck dashboard
        run: pnpm --dir dashboard exec tsc --noEmit --pretty false

      - name: Run dashboard unit tests
        run: pnpm --dir dashboard exec vitest run

      - name: Verification matrix summary
        run: |
          echo "::notice::Required CI gates in this job: dashboard typecheck, dashboard unit tests"
          echo "::notice::Dashboard-only changes skip OCaml transport jobs unless shared CI files changed"

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.ocaml_ci == 'true'
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify PR sync
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        env:
          PR_HEAD_REF: ${{ github.head_ref }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          chmod +x scripts/check-pr-sync.sh
          scripts/check-pr-sync.sh \
            --head-branch "$PR_HEAD_REF" \
            --pr-number "$PR_NUMBER" \
            --expected-head-sha "$PR_HEAD_SHA"

      - name: Setup OCaml environment
        uses: ./.github/actions/setup-ocaml-env
        with:
          cache-prefix: oas-otel-02
          apt-packages: ripgrep
          opam-install-args: --deps-only --yes

      - name: Check Eio conventions
        run: |
          chmod +x scripts/check-eio-conventions.sh
          scripts/check-eio-conventions.sh

      - name: Build with warnings as errors
        run: |
          opam exec -- dune build @install --force
        env:
          OCAMLPARAM: "_,warn-error=+a"

      - name: Check gRPC proto descriptor drift
        run: |
          sudo apt-get install -y -qq protobuf-compiler
          chmod +x scripts/gen-grpc-descriptors.sh
          scripts/gen-grpc-descriptors.sh --check

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup OCaml environment
        uses: ./.github/actions/setup-ocaml-env
        with:
          cache-prefix: oas-otel-02
          opam-install-args: --deps-only --with-doc --yes

      - name: Install odoc
        run: |
          for attempt in 1 2 3; do
            opam install odoc --yes && break
            if [ "$attempt" -eq 3 ]; then
              echo "opam install odoc failed after ${attempt} attempts"
              exit 1
            fi
            echo "opam install odoc failed (attempt ${attempt}); retrying in 15s..."
            sleep 15
          done

      - name: Build documentation
        run: |
          opam exec -- dune build @doc || echo "Docs build skipped"
