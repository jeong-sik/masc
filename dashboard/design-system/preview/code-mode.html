<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>MASC — Code Mode</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="../colors_and_type.css" />
  <link rel="stylesheet" href="../source_styles/tokens.css" />
  <link rel="stylesheet" href="../source_styles/primitives.css" />
  <link rel="stylesheet" href="../source_styles/code.css" />
  <link rel="stylesheet" href="../source_styles/layers.css" />
  <link rel="stylesheet" href="_preview.css" />
  <link rel="stylesheet" href="components.css" />
  <style>
    html, body { margin: 0; background: var(--bg-0); color: var(--fg-1); font-family: var(--font-sans); overflow: hidden; }
    #root { width: 100vw; height: 100vh; }
    /* Override source grid-area layout so components work standalone inside artboards.
       Source CSS uses grid-area for positioning inside .zone-code; we reset that. */
    .code-tree, .code-editor, .code-review, .code-activity {
      display: flex; flex-direction: column;
      grid-area: unset !important;
    }
    .code-tree { background: var(--bg-1); border-right: 1px solid var(--line-1); border-top: 1px solid var(--line-1); border-bottom: 1px solid var(--line-1); border-left: 1px solid var(--line-1); border-radius: var(--r-1); overflow: hidden; }
    .code-editor { background: var(--bg-0); border: 1px solid var(--line-1); border-radius: var(--r-1); overflow: hidden; }
    .code-review { background: var(--bg-1); border: 1px solid var(--line-1); border-radius: var(--r-1); overflow: hidden; }
    .code-activity { background: var(--bg-1); border: 1px solid var(--line-1); border-radius: var(--r-1); overflow: hidden; }
    /* editor-body is a grid with minimap — force it back on since .code-editor reset grid-area */
    .editor-body { display: grid !important; grid-template-columns: minmax(0,1fr) 60px; min-height: 0; min-width: 0; flex: 1; overflow: hidden; }
    /* scroll panel needs a finite height inside the editor flex child */
    .editor-scroll { overflow: auto; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="code-mode.jsx"></script>
  <script type="text/babel">
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<CodeModeRoot />);
  </script>
</body>
</html>
