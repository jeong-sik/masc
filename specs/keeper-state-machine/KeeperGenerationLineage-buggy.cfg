\* Buggy rollover: generation advances and a new trace_id is allocated, but
\* ancestry and checkpoint lineage remain stale. Expected to violate
\* GenerationMatchesHistory or IdleCheckpointMatchesCommittedLineage.

SPECIFICATION SpecBuggy

CONSTANTS
    Keepers = {"alpha"}
    MaxHandoffs = 2

CHECK_DEADLOCK FALSE

INVARIANTS
    TypeOK
    GenerationMatchesHistory
    CurrentTraceNotInHistory
    TraceHistoryUnique
    TraceIdsAllocated
    IdleCheckpointMatchesCommittedLineage
