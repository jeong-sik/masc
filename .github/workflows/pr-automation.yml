name: PR Automation

on:
  pull_request_target:
    types: [opened, reopened, synchronize, ready_for_review]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  label-and-review:
    runs-on: ubuntu-latest
    steps:
      - name: Auto label and optional reviewer request
        uses: actions/github-script@v9
        env:
          DEFAULT_REVIEWERS: ${{ vars.DEFAULT_REVIEWERS }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pr = context.payload.pull_request;
            const pullNumber = pr.number;
            const author = pr.user.login;

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner,
              repo,
              pull_number: pullNumber,
              per_page: 100
            });
            const names = files.map((f) => f.filename);

            const isDocPath = (name) =>
              name.startsWith("docs/") ||
              name.startsWith("examples/trpg-mvp/") ||
              name === "README.md" ||
              name.endsWith(".md");

            const docsOnly = names.length > 0 && names.every(isDocPath);
            const hasDocs = names.some(isDocPath);
            const hasCode = names.some((n) => n.startsWith("lib/") || n.startsWith("bin/") || n.startsWith("test/"));

            const labels = new Set();
            if (hasDocs) labels.add("docs");
            if (hasCode || !docsOnly) labels.add("enhancement");

            if (labels.size > 0) {
              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number: pullNumber,
                labels: [...labels]
              });
              core.info(`Applied labels: ${[...labels].join(", ")}`);
            } else {
              core.info("No labels to apply.");
            }

            const reviewersRaw = (process.env.DEFAULT_REVIEWERS || "").trim();
            if (!reviewersRaw) {
              core.info("DEFAULT_REVIEWERS is empty. Skip reviewer request.");
              return;
            }

            const reviewers = reviewersRaw
              .split(",")
              .map((s) => s.trim())
              .filter((s) => s.length > 0)
              .filter((s) => s !== author);

            if (reviewers.length === 0) {
              core.info("No eligible reviewer after filtering author.");
              return;
            }

            try {
              await github.rest.pulls.requestReviewers({
                owner,
                repo,
                pull_number: pullNumber,
                reviewers
              });
              core.info(`Requested reviewers: ${reviewers.join(", ")}`);
            } catch (err) {
              core.warning(`Reviewer request skipped: ${err.message}`);
            }
