name: TLA+ Main Verification

# Independent of ci.yml — ensures every main commit gets TLA verification
# even when ci.yml's workflow-level cancel-in-progress aborts the main ci
# run due to rapid back-to-back merges.
#
# Background: #14668 fixed a clean-spec violation (KeeperCascadeRouting
# TypeOK) that persisted on main for 4 days. #14670 forced TLA to run on
# every main push by bypassing path-scope. However, ci.yml's
# concurrency.cancel-in-progress=true on push events cancels the entire
# workflow when the next merge lands, so 30+ consecutive main pushes
# (2026-05-11 14:22-15:02 window) all cancelled before TLA could complete.
#
# This workflow has its own concurrency group keyed by sha, so each commit
# gets its own slot and runs to completion regardless of subsequent pushes.
#
# Sharding (2026-05-13): The monolithic `check-clean` + `check-buggy`
# pair previously took ~22 min wall-clock on every main push (run
# 25800347971 sampled 100 specs / 1178s, but 5 specs accounted for 1107s).
# The matrix below partitions specs across 4 GitHub-hosted runners using
# Makefile shard targets, dropping wall-clock to ~7-8 min while keeping
# coverage identical (`check-matrix-coverage` is the gate).

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'  # belt-and-suspenders: 6h sweep catches gaps

concurrency:
  group: tla-main-${{ github.sha || github.run_id }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  coverage:
    name: TLA+ matrix coverage
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Verify every spec dir is sharded
        run: make -C specs check-matrix-coverage

  tla-specs:
    name: TLA+ Model Checking (${{ matrix.shard.name }})
    needs: coverage
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        shard:
          - { name: keeper-state-machine, target: check-keeper }
          - { name: masc-ecosystem,       target: check-ecosystem }
          - { name: social-state,         target: check-social }
          - { name: others,               target: check-others }

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Download tla2tools.jar (pinned v1.8.0)
        run: |
          curl -fsSL -o specs/keeper-state-machine/tla2tools.jar \
            https://github.com/tlaplus/tlaplus/releases/download/v1.8.0/tla2tools.jar

      - name: Run TLA+ model checking (${{ matrix.shard.name }})
        run: make -C specs ${{ matrix.shard.target }}
