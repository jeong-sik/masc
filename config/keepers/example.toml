# Example keeper TOML configuration.
#
# Place files in config/keepers/*.toml to define keepers declaratively.
# Each file produces one keeper. The filename (minus .toml) is the keeper
# name unless keeper.name is set explicitly.
#
# All fields are optional except keeper.goal.

[keeper]
# name = "my-keeper"  # Override filename-derived name

goal = "Analyze system logs and detect anomalies."
short_goal = "Monitor logs for the current session."
mid_goal = "Build pattern knowledge from recurring errors."
long_goal = "Maintain a continuously improving log analysis capability."

   # balanced | safety | delivery | research | relationship | minimal

will = "Detect issues before they become incidents."
needs = "Access to structured log output and codebase context."
desires = "Proactive anomaly detection with low false-positive rate."

instructions = "You are a log analyzer. Read structured JSONL logs, identify patterns, correlate with recent code changes, and report findings on the board."

# Trigger and scope
# room_scope is a single-room compatibility field and should stay "current".
room_scope = "current"
scope_kind = "global"
mention_targets = ["sherlock", "log-analyzer"]

# Proactive behavior
proactive_enabled = true

# Execution scope — controls what the keeper can modify.
#   observe_only = read-only, no file writes (default for new keepers until #3886)
#   workspace    = write to allowed_paths only (current default)
#   local        = full filesystem access
# execution_scope = "workspace"

# Allowed paths — restrict file writes to these path prefixes.
#   []       + observe_only = no writes (tool-level block)
#   []       + workspace    = computed default (.masc/keepers/<name>/, .masc/traces/)
#   ["*"]    = explicit full access (operator opt-in)
#   ["src/"] = only src/ prefix allowed
# allowed_paths = ["src/", "lib/"]

# Tool shards — restrict which tool groups are available.
# Omit or leave empty to grant all default shards (backward compatible).
# Available: base, board, filesystem, shell, coding, voice, library,
#            taskboard, governance, autoresearch
# shards = ["base", "board", "library", "taskboard"]
