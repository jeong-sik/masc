\* Buggy variant 2: pre-#6580 cross-keeper playground leak.
\* Keeper A operates inside keeper B's playground bundle
\* (the old `.worktrees/` workspace_default + pr_submit cwd
\* accepting any `.masc/playground/*` leak).
\* Expected: KeeperWorktreeOwner VIOLATED in one step.
\* KeeperWorktreeKind is NOT violated here — that is the point of
\* splitting the invariants. If a future refactor drops Owner from
\* the cfg, this bug action would silently slip through.
SPECIFICATION SpecBuggyOtherPlayground
INVARIANT KeeperWorktreeKind
INVARIANT KeeperWorktreeOwner
INVARIANT TypeOK
CONSTANTS
    Keepers = {a, b}
CHECK_DEADLOCK FALSE
