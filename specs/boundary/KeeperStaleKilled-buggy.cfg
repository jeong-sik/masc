\* Buggy spec — pre-#10765 supervisor.  SupervisorBlindRestart is
\* reachable; the supervisor restarts a Killed keeper without checking
\* killCount, so the restart loop has no upper bound.
\*
\* TLC must report KillStormImpliesPaused violated: after killCount
\* climbs past EscalationThreshold, the keeper is back in Running
\* (via blind restart) without being paused — exactly the production
\* pattern (#10765) where a single keeper accumulated 13 sequential
\* kills before the fix.
\*
\* StateConstraint: bound killCount so TLC terminates instead of
\* exploring the unbounded restart loop forever.

SPECIFICATION SpecBuggy

CONSTANTS
    Keepers = {k1, k2}
    EscalationThreshold = 2
    MaxBackoffSteps = 3

INVARIANTS
    Safety

CONSTRAINT
    KillCountUnderBound

CHECK_DEADLOCK
    FALSE
