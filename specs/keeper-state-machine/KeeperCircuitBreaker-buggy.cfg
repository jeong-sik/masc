SPECIFICATION SpecBuggy

CONSTANTS
    Threshold = 3
    ErrorClasses = {"path_not_found", "path_not_allowed", "other"}
    MaxSteps = 12

\* TripOnlyWithStreak is an action property (references primed [tripped']), so
\* it is supplied via PROPERTY. The buggy [count] accumulates across error
\* classes and trips on a cross-class total while the honest [sameClassRun] is
\* below Threshold-1, violating the property.
PROPERTY TripOnlyWithStreak

CHECK_DEADLOCK FALSE
