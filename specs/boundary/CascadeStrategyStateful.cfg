\* Expected outcome: OK (clean)
\* Verifies: TypeOK, StickyDomainBounded, StickyMembersAreCandidates,
\*           RRBounded, NoExpiredEntriesUsable, and the liveness
\*           property StickyEventuallyEvicts under WF(Tick) +
\*           WF(StickyExpire).

SPECIFICATION Spec

CONSTANTS
    Keepers     = {k1, k2}
    Cascades    = {c1}
    Candidates  = {a, b}
    MaxClock    = 4
    DefaultTTL  = 2

INVARIANTS
    TypeOK
    StickyDomainBounded
    StickyMembersAreCandidates
    RRBounded
    NoExpiredEntriesUsable

PROPERTIES
    StickyEventuallyEvicts

CHECK_DEADLOCK
    FALSE
