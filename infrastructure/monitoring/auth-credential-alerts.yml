# Prometheus alerting rules for the boot-time + runtime credential
# surface introduced by PR #15112 (γ guard against PR-#10440 ↔ PR-3b2
# bare-form ping-pong). Companion code:
#
#   - lib/auth.ml: classify_bare_for_canonical, bare_alias_audit,
#     prune_archive, start_bare_alias_audit_fiber
#   - lib/server/server_runtime_bootstrap.ml: startup_prune_auth_archive
#   - lib/server/server_bootstrap_loops.ml: wires the periodic audit
#     fiber
#   - lib/prometheus.{ml,mli}: metric definitions
#
# These rules turn the gauges from a passive scrape target into an
# active surface that pages operators within one evaluation interval
# of a regression, rather than waiting for someone to look at a
# dashboard.

groups:
  - name: masc_auth_credential_contract
    interval: 30s
    rules:
      - alert: AuthCredentialSurfaceMetricAbsent
        # Coarse liveness signal for the periodic bare_alias_audit fiber.
        #
        # The previous expression used absent() on
        # masc_auth_bare_alias / masc_auth_archive_epochs /
        # masc_auth_archive_pruned_total, but all three are
        # pre-registered at process start by Prometheus.add (see
        # lib/prometheus.ml). Once registered, absent() never returns
        # true even after the producer stops updating values — so the
        # original alert was structurally unable to detect the exact
        # failure mode described in the annotation: a fiber crash after
        # metric registration.
        #
        # masc_auth_bare_alias_audit_ticks_total is incremented by the
        # periodic fiber after each successful audit tick, so a 15m
        # window with zero rate means the audit fiber has not run: the
        # genuine crashed / paused / wedged condition.
        #
        # archive_epochs / archive_pruned_total are boot-time only
        # (not periodic) and do not belong in a fiber-liveness alert;
        # detecting a missing boot signal needs a different rule.
        #
        # The disjunction with absent(...) restores missing-metric
        # coverage that bare rate==0 cannot provide. Specifically:
        # if the metric series does not exist (an older binary that
        # predates the heartbeat counter, or a full scrape-side
        # disappearance), [rate(missing_series[15m])] yields no series
        # and [no_series == 0] also yields no series — the alert can
        # never fire. [absent(...)] returns 1 in that case. On a
        # healthy current binary the metric is pre-registered at
        # process start (Prometheus.add) so absent() is always false
        # and only the rate clause governs fiber liveness.
        expr: |
          absent(masc_auth_bare_alias_audit_ticks_total)
          or rate(masc_auth_bare_alias_audit_ticks_total[15m]) == 0
        for: 5m
        labels:
          severity: critical
          component: auth
          subsystem: credential
        annotations:
          summary: "Auth bare_alias_audit fiber is not running"
          description: |
            Either the bare_alias_audit fiber has not bumped its tick
            counter (masc_auth_bare_alias_audit_ticks_total) in the
            last 15 minutes, or the metric series does not exist at all
            (older binary predating the heartbeat counter, or a
            scrape-side disappearance). Without a live audit the
            ping-pong regression alert
            (AuthBareAliasPingPongRegression) cannot react. Investigate
            the [Auth] bare_alias_audit fiber startup log line and the
            running binary version; the absent() clause specifically
            flags the missing-instrumentation case.

  - name: masc_auth_bare_alias
    interval: 30s
    rules:
      - alert: AuthBareAliasPingPongRegression
        expr: |
          masc_auth_bare_alias{state="dead"} > 0
        for: 1m
        labels:
          severity: critical
          component: auth
          subsystem: credential
        annotations:
          summary: "Bare-form keeper credential ping-pong regression detected"
          description: |
            One or more keepers have a bare-form credential file that
            the γ classifier (PR #15112) flagged as Bare_dead --
            i.e. a direct credential, an orphan redirect stub, or a
            stub aimed at a UUID different from the canonical
            credential's. Under PR-3b2 the boot sweep archives it,
            under PR-#10440 the alias writer re-creates it: the same
            split-brain pattern that accumulated 331 .archive/
            epochs in 17 days. Either the fix has been reverted, the
            classifier is missing a new shape, or an operator wrote a
            bare-form file out of band.

            Investigate:
              - .masc/auth/.archive/ growth (masc_auth_archive_epochs)
              - the latest commit on lib/auth.ml around
                archive_bare_for_canonical / classify_bare_for_canonical
              - .masc/auth/agents/<bare>.json file shapes for
                affected keepers

      - alert: AuthBareAliasNoBareElevated
        expr: |
          masc_auth_bare_alias{state="no_bare"} > 0
        for: 10m
        labels:
          severity: warning
          component: auth
          subsystem: credential
        annotations:
          summary: "Keepers without a short-form alias detected"
          description: |
            One or more keepers have a canonical credential but no
            bare-form alias file. PR-#10440 expects every keeper to
            have one; persistent no_bare means
            ensure_credential_alias failed (the WARN line
            "short-form alias write failed" should also have fired).
            short-form load_credential callers (auth_doctor and
            similar) will fail to resolve these keepers.

  - name: masc_auth_archive
    interval: 30s
    rules:
      - alert: AuthArchiveEpochsExcessive
        expr: |
          masc_auth_archive_epochs > 100
        for: 10m
        labels:
          severity: warning
          component: auth
          subsystem: credential
        annotations:
          summary: "Auth .archive/ epoch inventory above 100 dirs"
          description: |
            The credential .archive/ directory holds more than 100
            epoch subdirs after the retention sweep. Either the
            retention defaults (MASC_AUTH_ARCHIVE_RETENTION_DAYS=30,
            MASC_AUTH_ARCHIVE_MIN_KEEP=20) are too generous for this
            deployment's churn, or a regression is again producing
            archive events on every boot (cross-check
            AuthBareAliasPingPongRegression).

      - alert: AuthArchivePruneSurge
        expr: |
          increase(masc_auth_archive_pruned_total[1d]) > 100
        for: 0m
        labels:
          severity: warning
          component: auth
          subsystem: credential
        annotations:
          summary: "Auth archive prune surge: more than 100 epochs/day"
          description: |
            The retention sweep removed more than 100 epoch
            subdirectories in the last 24h. Likely either a
            one-time backlog drain after PR #15112 deployed against
            an already-bloated .archive/ (the 331-epoch state
            measured 2026-05-14), or a regression that re-introduced
            the ping-pong and is producing archive events at the
            historical ~20/day rate. Confirm against
            masc_auth_archive_epochs trend and
            AuthBareAliasPingPongRegression.

  # Flow + fiber surfaces added after PR #15112 audit (2026-05-14).
  # Snapshot gauges show end-state; these rules detect transient
  # regressions and fiber stalls that the absent() check would miss.
  - name: masc_auth_bare_alias_flow
    interval: 30s
    rules:
      - alert: AuthBareAliasDeadArchiveOngoing
        expr: |
          rate(masc_auth_bare_alias_outcome_total{outcome="dead_archive"}[5m]) > 0
        for: 5m
        labels:
          severity: critical
          component: auth
          subsystem: credential
        annotations:
          summary: "archive_bare_for_canonical dispatching to dead_archive after PR #15112"
          description: |
            After PR #15112 the steady-state dead_archive rate is 0
            -- every boot the γ classifier should route all
            bare files through alive_skip or absent. A non-zero
            rate over 5 minutes means either a regression
            (re-introduced ping-pong) or an out-of-band actor
            writing bare files between boots.

            Pair with masc_auth_bare_alias{state="dead"} snapshot
            and .masc/auth/.archive/ mtime to confirm the
            regression cycle.

      - alert: AuthBareAliasAuditFiberStalled
        expr: |
          rate(masc_auth_bare_alias_audit_ticks_total[5m]) < 0.01
          and
          rate(masc_auth_bare_alias_audit_ticks_total[5m]) >= 0
        for: 2m
        labels:
          severity: warning
          component: auth
          subsystem: credential
        annotations:
          summary: "Periodic bare_alias_audit fiber has stalled"
          description: |
            The periodic audit fiber expected ~1 tick per 60s
            (rate ~0.0166/s); below 0.01/s for 2m means the fiber
            stopped publishing heartbeat counters. masc_auth_bare_alias
            gauges may be stale even though they remain present.

            AuthCredentialSurfaceMetricAbsent catches a 15-minute hard
            stop of the same heartbeat; this rule is the faster warning
            threshold where the gauges retain their last value.

            Investigate the [Auth] bare_alias_audit warn line
            "periodic tick failed" and the server log for fiber
            crashes near the fiber-start INFO line.
