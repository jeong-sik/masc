[build]
target = "index.html"
release = true
filehash = true

[watch]
watch = ["src", "assets", "index.html", "style.css"]

[serve]
addresses = ["127.0.0.1"]
port = 8080
open = false

# Proxy /api requests to the MASC MCP server
[[proxy]]
rewrite = "/api/"
backend = "http://localhost:8935/api/"

# Proxy /mcp requests (JSON-RPC)
[[proxy]]
rewrite = "/mcp"
backend = "http://localhost:8935/mcp"
