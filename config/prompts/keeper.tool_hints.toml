# Keeper tool guidance hints.
# Loaded by lib/keeper/keeper_tool_guidance.ml via otoml on first use (lazy).
# Order is significant — render_preferred_tools preserves it.
# Substitution: {{web_fetch_timeout}} -> Tool_misc_web_fetch.default_timeout_sec at load time.

[[hints]]
name = "keeper_task_claim"
call = "`keeper_task_claim` {} or { task_id: \"task-123\" }"
description = "reserve the next eligible task or an explicitly requested task"

[[hints]]
name = "keeper_tasks_list"
call = "`keeper_tasks_list` {}"
description = "inspect eligible task context"

[[hints]]
name = "keeper_task_create"
call = "`keeper_task_create` { title: \"actionable title\", description: \"acceptance criteria\" }"
description = "create a new backlog task with keeper-native evidence"

[[hints]]
name = "keeper_board_post_get"
call = "`keeper_board_post_get` { post_id: \"POST_ID\" }"
description = "read one board post only after you have its post_id"

[[hints]]
name = "keeper_board_comment"
call = "`keeper_board_comment` { post_id: \"POST_ID\", content: \"reply\" }"
description = "reply to a board post"

[[hints]]
name = "keeper_board_post"
call = "`keeper_board_post` { content: \"note\" }"
description = "align via board"

[[hints]]
name = "keeper_broadcast"
call = "`keeper_broadcast` { message: \"note\" }"
description = "share broadly in the namespace"

[[hints]]
name = "Read"
call = "`Read` { file_path: \"path/to/file\" }"
description = "read one file before editing or reporting"

[[hints]]
name = "Edit"
call = "`Edit` { file_path: \"path/to/file\", old_string: \"...\", new_string: \"...\" }"
description = "patch an existing file inside the keeper workspace"

[[hints]]
name = "Write"
call = "`Write` { file_path: \"path/to/file\", content: \"full file content\" }"
description = "create or overwrite a file inside the keeper workspace"

[[hints]]
name = "Grep"
call = "`Grep` { pattern: \"regex\", path: \"repos/REPO/lib\", glob: \"*.ml\" }"
description = "search files without Execute pipes, redirects, grep/head chains, or repo-wide scans"

[[hints]]
name = "Execute"
call = "`Execute` { executable: \"git\", argv: [\"status\", \"--short\"], cwd: \"repos/REPO\" }"
description = "run one typed argv command; set cwd for git, never type keeper_* names as commands, and use the pipeline field instead of shell syntax"

[[hints]]
name = "WebSearch"
call = "`WebSearch` { query: \"current-info query\", limit: 5, includeContent: true, contentMaxChars: 4000 }"
description = "MASC-owned tool-list alias for current public context; includeContent returns keeper-readable content_text plus raw page_content for top results"

[[hints]]
name = "WebFetch"
call = "`WebFetch` { url: \"https://example.com/page\", timeout: {{web_fetch_timeout}}, extractMode: \"markdown\" }"
description = "fetch one known URL for deeper reading or citation after search"

[[hints]]
name = "masc_transition"
call = "`masc_transition` { task_id: \"TASK_ID\", action: \"approve\", notes: \"verification evidence\" }"
description = "approve or reject an awaiting_verification task after inspecting evidence"

[[hints]]
name = "keeper_task_done"
call = "`keeper_task_done` { task_id: \"TASK_ID\", result: \"completion evidence\" }"
description = "close claimed task work with task_id and concrete result evidence"
