\* Clean spec — post-#10765 supervisor.  KillStormImpliesPaused holds
\* because the only path past threshold is SupervisorAutoPause.
\* PausedRequiresEscalation holds because pause is only reachable via
\* the threshold-gated transition.
\*
\* Note on state-space sizing: with [EscalationThreshold = 2] and
\* |Keepers| = 2, killCount per keeper ranges 0..3 (it can climb to 3
\* via WatchdogKill before AutoPause fires for the second kill, since
\* AutoPause does not change keeperState back to Running — the kill
\* counter only grows when the keeper is Running, but the buggy spec
\* needs StateConstraint).  TLC bounds via the threshold constant.

SPECIFICATION Spec

CONSTANTS
    Keepers = {k1, k2}
    EscalationThreshold = 2

INVARIANTS
    Safety

CHECK_DEADLOCK
    FALSE
