# Native Ollama Cloud schema lane. The OpenAI-compatible ollama_cloud row is
# intentionally not reused: only /api/chat provides the strict schema contract.
[[models]]
id_prefix = "minimax-m3"
provider_name = "ollama_cloud_native"
base = "ollama_cloud"
max_context_tokens = 524288
max_output_tokens = 131072
supports_tools = true
supports_tool_choice = false
supports_reasoning = true
supports_extended_thinking = true
supports_reasoning_budget = true
thinking_control_format = "ollama_think"
supports_multimodal_inputs = true
supports_image_input = true
modality_priority = "visual_first"
supports_response_format_json = true
supports_structured_output = true
supports_native_streaming = true

# Kimi Code coding-plan gateway under [providers.kimi_code].
[[models]]
id_prefix = "kimi-for-coding"
provider_name = "kimi_code"
base = "kimi"
max_context_tokens = 256000
ignored_sampling_parameters = ["temperature", "top_p"]
input_per_million = 0.0
output_per_million = 0.0

