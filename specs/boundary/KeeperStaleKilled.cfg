\* Clean spec — post-Phase-3 supervisor.  KillStormImpliesPaused holds
\* because the only path past threshold is SupervisorAutoPause, which
\* sets [autoResumeBackoff > 0].  The keeper is auto-resumed by
\* SweepAutoResume (circuit-breaker release) and back-off resets on
\* a successful turn.

SPECIFICATION Spec

CONSTANTS
    Keepers = {k1, k2}
    EscalationThreshold = 2
    MaxBackoffSteps = 3

INVARIANTS
    Safety

CHECK_DEADLOCK
    FALSE
