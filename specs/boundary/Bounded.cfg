\* Bounded execution loop boundary — clean model.
\* Step advances only when both the hard-limit guard and the predictive
\* token-budget guard allow. HitHardLimit / HitBudgetGuard close the
\* loop with Constraint_exceeded.

SPECIFICATION Spec

CONSTANTS
    HardMax = 4
    MaxTokens = 6
    Buffer = 1

INVARIANTS
    TypeOK
    Termination
    TokenBudget

CHECK_DEADLOCK
    FALSE
