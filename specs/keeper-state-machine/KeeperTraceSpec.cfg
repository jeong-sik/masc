\* TLC Configuration for KeeperTraceSpec
\* Validates a recorded trace against safety invariants.

CONSTANTS
    MaxRestarts = 3

SPECIFICATION TraceSpec

INVARIANTS
    TypeOK
    RunningRequiresFiber
    OfflineRequiresLaunchPending
    StoppedRequiresDrain
    DeadRequiresNoBudget
    DerivePhaseAgreement

PROPERTIES
    RestartCountMonotonic
    BudgetNeverRevives
    TransitionMatrixAgreement

CHECK_DEADLOCK
    FALSE
