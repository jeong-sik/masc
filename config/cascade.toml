# Declarative cascade configuration (RFC-0058 v2 5-layer schema).
# Checked-in seed. Logical usage names are configured under [routes].
#
# This file is the SSOT for: provider credentials, model capabilities,
# per-binding capacity (max-concurrent) and pricing, per-use aliases,
# tier composition, tier-group fallback chains, and route assignments.
# Code MUST NOT hard-code provider or model names; it dispatches by
# api_format (Messages_api / Chat_completions_api / Ollama_api) and
# reads everything else from this file. See RFC-0058 §2.4.

# ── Layer 1: Providers ──────────────────────────────────────────

[providers.claude_code]
display-name = "Anthropic Claude Code CLI"
protocol = "anthropic-cli"
command = "claude"
is-non-interactive = true

[providers.claude_code.credentials]
type = "env"
key = "ANTHROPIC_API_KEY"

[providers.claude_code.liveness]
class = "cloud_fast"

# Behavioral capabilities — RFC-0058 §2.4 Phase 5.1.
# Replaces the OCaml `tool_policy` record and per-kind matches in
# cascade_transport / provider_tool_support / keeper_usage_trust.
# Field defaults (when omitted) are all false / [] / None.
[providers.claude_code.capabilities]
supports-runtime-mcp-http-headers = true
uses-anthropic-caching = true
max-turns-per-attempt = 30
tolerates-bound-actor-fallback = true

[providers.codex_cli]
display-name = "OpenAI Codex CLI"
protocol = "openai-http"
command = "codex"
is-non-interactive = true

[providers.codex_cli.credentials]
type = "env"
key = "OPENAI_API_KEY"

[providers.codex_cli.liveness]
class = "cloud_fast"

[providers.codex_cli.capabilities]
# Codex CLI's cached login cannot inject arbitrary per-request headers,
# so keeper-bound actor tools must be bridged via argv (per-keeper auth
# token routed through bearer_token_env_var) — see masc-mcp#10097.
requires-per-keeper-bridging-for-bound-actor-tools = true
identity-runtime-mcp-header-keys = ["authorization", "x-masc-agent-name", "x-masc-keeper-name"]
argv-prompt-preflight = true

[providers.gemini_cli]
display-name = "Google Gemini CLI"
protocol = "google-cli"
command = "gemini"
is-non-interactive = true

[providers.gemini_cli.credentials]
type = "env"
key = "GEMINI_API_KEY"

[providers.gemini_cli.liveness]
class = "cloud_fast"

# Gemini CLI carries one capability — it is intended as a viable
# bound-actor fallback target for cascades that include Codex CLI
# (per-keeper MCP config injection is unimplemented upstream but the
# catalog-level validator only requires "tolerates", not "natively
# supports"; see masc-mcp#11356). All other capability flags remain at
# their defaults (no runtime MCP HTTP headers, no anthropic caching,
# no max-turns cap).
#
# NOTE (data-only until cutover): this declaration is parsed into the
# in-memory cascade-decl config, but [Cascade_catalog_validator] still
# reads [Provider_adapter]'s hardcoded value for this kind. Toggling
# this line therefore does not move the validator warn surface until
# the caller cutover lands (see #14659 bridge primitive).
[providers.gemini_cli.capabilities]
tolerates-bound-actor-fallback = true

[providers.kimi_cli]
display-name = "Moonshot Kimi CLI"
protocol = "kimi-cli"
command = "kimi"
is-non-interactive = true

[providers.kimi_cli.credentials]
type = "env"
key = "MOONSHOT_API_KEY"

[providers.kimi_cli.liveness]
class = "cloud_thinking"

[providers.kimi_cli.capabilities]
supports-runtime-mcp-http-headers = true
tolerates-bound-actor-fallback = true

[providers.glm-coding]
display-name = "Zhipu GLM Coding"
protocol = "openai-http"
endpoint = "https://api.z.ai/api/coding/paas/v4"

[providers.glm-coding.credentials]
type = "env"
key = "ZAI_API_KEY"

[providers.glm-coding.liveness]
class = "cloud_thinking"

# glm-coding ships no [capabilities] sub-table — no runtime MCP HTTP
# headers, no anthropic caching. Parser yields `capabilities = None`;
# A.3 callers treat `None` as the conservative defaults.

# Provider liveness class (RFC-0058 §3.2.1) feeds attempt-wall budgets
# in Cascade_attempt_liveness_config. Values: cloud_fast | cloud_thinking
# | local_27b | local_70b_plus.

[providers.ollama]
display-name = "Ollama Local"
protocol = "ollama-http"
endpoint = "http://localhost:11434"

[providers.ollama.liveness]
class = "local_27b"

[providers.ollama.capabilities]
# Local Ollama is a viable bound-actor fallback target in catalogs
# that include Codex CLI — its HTTP surface accepts per-keeper auth
# headers natively. All other capability flags default to false.
tolerates-bound-actor-fallback = true

[providers.runpod_qwen]
display-name = "RunPod Qwen3.6-27B vLLM"
protocol = "openai-http"
endpoint = "https://57c7602uqm0t4w-8000.proxy.runpod.net/v1"

[providers.runpod_qwen.liveness]
class = "local_27b"

[providers.runpod_qwen.capabilities]
# RunPod-hosted vLLM serving Qwen3.6-27B-FP8 on 2× RTX 6000 Ada.
# OpenAI-compatible /v1 endpoint with native tool_calls parser
# (`--tool-call-parser qwen3_coder`). Self-hosted, no per-token cost.
# Same bound-actor fallback semantics as Ollama.
tolerates-bound-actor-fallback = true

# ── Layer 2: Models ────────────────────────────────────────────

[models.codex-spark]
api-name = "gpt-5.3-codex-spark"
max-context = 128000
tools-support = true
streaming = true

[models.kimi-coding]
api-name = "kimi-for-coding"
max-context = 128000
tools-support = true
streaming = true

[models.sonnet]
api-name = "claude-sonnet-4-6"
max-context = 200000
tools-support = true
thinking-support = true
max-thinking-budget = 16000
streaming = true

[models.haiku]
api-name = "claude-haiku-4-5-20251001"
max-context = 200000
tools-support = true
streaming = true

[models.gemini-flash]
api-name = "gemini-3-flash-preview"
max-context = 128000
tools-support = true
streaming = true

[models.gemini-flash-lite]
api-name = "gemini-3.1-flash-lite-preview"
max-context = 128000
tools-support = true
streaming = true

[models.glm-5-turbo]
api-name = "glm-5-turbo"
max-context = 128000
tools-support = true
streaming = true

[models.glm-flashx]
api-name = "glm-4.7-flashx"
max-context = 128000
tools-support = true
streaming = true

[models.qwen3-6-27b-fp8]
api-name = "Qwen/Qwen3.6-27B-FP8"
max-context = 131072
tools-support = true
streaming = true

# ── Layer 3: Provider×Model Bindings ───────────────────────────
#
# `max-concurrent` is REQUIRED (RFC-0058 §3.4). Defaults reflect
# observed CLI/HTTP capacity ceilings — CLI providers serialize at
# the binary level (1 concurrent invocation per credential), HTTP
# providers tolerate small fan-out before upstream throttling.
# `price-input` / `price-output` are USD per 1M tokens.

[codex_cli.codex-spark]
is-default = true
max-concurrent = 1

[kimi_cli.kimi-coding]
is-default = true
max-concurrent = 1

[claude_code.sonnet]
is-default = true
max-concurrent = 1
price-input = 3.00
price-output = 15.00

[claude_code.haiku]
is-default = false
max-concurrent = 2
price-input = 0.80
price-output = 4.00

[gemini_cli.gemini-flash]
is-default = true
max-concurrent = 1

[gemini_cli.gemini-flash-lite]
is-default = false
max-concurrent = 1

[glm-coding.glm-5-turbo]
is-default = true
max-concurrent = 2

[glm-coding.glm-flashx]
is-default = false
max-concurrent = 2

[runpod_qwen.qwen3-6-27b-fp8]
# vLLM is configured with VLLM_MAX_NUM_SEQS=4 — 4 concurrent
# keeper turns at 128k context per sequence. Self-hosted on
# 2× RTX 6000 Ada (96GB VRAM total); no marginal token cost.
is-default = true
max-concurrent = 4

# ── Layer 4: Aliases (per-use overrides) ───────────────────────
#
# Aliases give logical names to (provider, model) pairs with
# call-site specific overrides. Code MUST reference aliases here
# rather than raw `<provider>.<model>` pairs — that is how RFC-0058
# §2.4 keeps vendor/model identifiers out of OCaml source.

[claude_code.haiku.for-tool-rerank]
max-output = 1024
temperature = 0.1

[codex_cli.codex-spark.for-tool-rerank]
max-output = 1024
temperature = 0.1

[claude_code.haiku.for-governance]
max-input = 8192
max-output = 2048
temperature = 0.1

# ── Layer 5: Tiers ─────────────────────────────────────────────

[tier.big_three]
# Canonical keeper/workflow tier.
members = ["codex_cli.codex-spark", "kimi_cli.kimi-coding"]
strategy = "failover"

[tier.keeper_diverse]
# Fallback tier for contract violation retry. Different model
# composition from big_three to break correlated failure.
members = ["claude_code.sonnet", "gemini_cli.gemini-flash", "codex_cli.codex-spark"]
strategy = "failover"

[tier.tool_rerank]
# System-only short-output tier for rerank/scoring calls.
# Members are aliases (Layer 4) with reduced max-output.
members = [
  "codex_cli.codex-spark.for-tool-rerank",
  "claude_code.haiku.for-tool-rerank",
]
strategy = "failover"

[tier.governance]
# System-only baseline for governance / judge calls.
members = ["claude_code.haiku.for-governance"]
strategy = "failover"

[tier.tier_small]
# Operator opt-in slot for 4B-class local models. Empty by default;
# routes fall through to tier_medium via tier-group fallback.
members = []
strategy = "failover"

[tier.tier_medium]
# 9B-class cloud-coding models for moderate tasks.
members = ["glm-coding.glm-flashx"]
strategy = "failover"

[tier.__safe_lane]
# System-only baseline tier (RFC-0027 PR-4). Last-resort fallback
# target that satisfies every capability profile. Not keeper-assignable.
members = ["kimi_cli.kimi-coding"]
strategy = "failover"

[tier.local_recovery]
# Recovery tier for fallback_cascade = "local_recovery".
members = ["codex_cli.codex-spark"]
strategy = "failover"

[tier.tier_fast]
# Cheap+fast tool-capable cloud models for keeper turns.
members = [
  "claude_code.haiku",
  "codex_cli.codex-spark",
  "gemini_cli.gemini-flash",
  "gemini_cli.gemini-flash-lite",
  "glm-coding.glm-5-turbo",
  "glm-coding.glm-flashx",
]
strategy = "failover"

# ── Tier-Groups (fallback chains) ──────────────────────────────

[tier-group.big_three]
tiers = ["big_three", "keeper_diverse", "__safe_lane"]
strategy = "priority_tier"
fallback = true

[tier-group.tier_small]
tiers = ["tier_small", "tier_medium", "big_three"]
strategy = "priority_tier"
fallback = true

[tier-group.tier_medium]
tiers = ["tier_medium", "big_three"]
strategy = "priority_tier"
fallback = true

[tier-group.local_recovery]
tiers = ["local_recovery", "big_three"]
strategy = "priority_tier"
fallback = true

[tier-group.tier_fast]
tiers = ["tier_fast", "big_three"]
strategy = "priority_tier"
fallback = true

[tier-group.tool_rerank]
tiers = ["tool_rerank", "__safe_lane"]
strategy = "priority_tier"
fallback = true

[tier-group.governance]
tiers = ["governance", "__safe_lane"]
strategy = "priority_tier"
fallback = true

# ── Routes (logical usage → tier-group) ────────────────────────
#
# RFC-0058 §4 R6: route targets resolve to tier-groups, tiers,
# bindings, or aliases (validated by `Cascade_declarative_validator`
# rule R7). The seed below targets tier-groups exclusively because
# routing through a tier-group keeps fallback chains explicit and
# discourages callers from depending on a single tier without a
# documented degradation path.

[routes.keeper_turn]
target = "tier-group.big_three"

[routes.phase_recovery]
target = "tier-group.big_three"

[routes.phase_buffer]
target = "tier-group.big_three"

[routes.tool_required]
target = "tier-group.big_three"

[routes.governance_judge]
target = "tier-group.governance"

[routes.operator_judge]
target = "tier-group.governance"

[routes.cross_verifier]
target = "tier-group.big_three"

[routes.verifier]
target = "tier-group.big_three"

[routes.autoresearch]
target = "tier-group.big_three"

[routes.adversarial_reviewer]
target = "tier-group.big_three"

[routes.auto_responder]
target = "tier-group.big_three"

[routes.routing]
target = "tier-group.big_three"

[routes.openai_compat]
target = "tier-group.big_three"

[routes.persona_generation]
target = "tier-group.big_three"

[routes.provider_benchmark]
target = "tier-group.big_three"

[routes.llm_rerank]
target = "tier-group.tool_rerank"

[routes.simple_task]
target = "tier-group.tier_small"

[routes.moderate_task]
target = "tier-group.tier_medium"

[routes.complex_task]
target = "tier-group.big_three"

# ── Profiles (capability requirements per route class) ─────────

[profiles.tool_strict]
required_capabilities = [
  "runtime_mcp_tools",
  "runtime_tool_events",
  "runtime_mcp_http_headers",
]

[profiles.inline_tools]
required_capabilities = ["inline_tools", "inline_tool_choice"]

[profiles.lite]
required_capabilities = ["runtime_mcp_tools", "runtime_tool_events"]

[profiles.local]
required_capabilities = []
