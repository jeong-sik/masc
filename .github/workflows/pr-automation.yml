name: PR Automation

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
      - converted_to_draft
      - auto_merge_enabled
      - labeled
      - unlabeled

permissions:
  contents: write
  checks: read
  issues: write
  pull-requests: write

# Cancel superseded PR-Automation runs for the same PR. Multiple
# labeled/unlabeled/synchronize events on the same PR otherwise stack
# into duplicate runs (observed 2026-04-29: feature/board-core-mli,
# feature/ds-v2-dialog-anim-wiring, fix/ir3-checkpoint-error).
concurrency:
  group: pr-automation-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  draft-automerge-guard:
    name: Draft Auto-Merge Guard
    runs-on: ubuntu-latest
    # Skip when the PR is already closed/merged. labeled/unlabeled
    # events on pull_request_target can fire after merge (post-merge
    # automation removing labels), causing wasted runs.
    if: ${{ github.event.pull_request.state != 'closed' && github.event.pull_request.merged != true }}
    steps:
      - name: Keep draft PRs draft-only unless explicitly approved
        uses: actions/github-script@v9
        env:
          AGENT_DRAFT_GUARD_TITLE_RE: ${{ vars.AGENT_DRAFT_GUARD_TITLE_RE }}
          AGENT_DRAFT_GUARD_BRANCH_RE: ${{ vars.AGENT_DRAFT_GUARD_BRANCH_RE }}
          AGENT_DRAFT_GUARD_BYPASS_LABELS: ${{ vars.AGENT_DRAFT_GUARD_BYPASS_LABELS }}
          AGENT_DRAFT_GUARD_HARD_STOP_LABELS: ${{ vars.AGENT_DRAFT_GUARD_HARD_STOP_LABELS }}
          AGENT_DRAFT_GUARD_HUMAN_ACTORS: ${{ vars.AGENT_DRAFT_GUARD_HUMAN_ACTORS }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pr = context.payload.pull_request;
            const action = context.payload.action;
            const pullNumber = pr.number;

            const titlePattern = new RegExp(
              (process.env.AGENT_DRAFT_GUARD_TITLE_RE || String.raw`^\[codex\]`),
              "i"
            );
            const branchPattern = new RegExp(
              (process.env.AGENT_DRAFT_GUARD_BRANCH_RE || String.raw`^(codex[/-]|keeper[/-])`),
              "i"
            );
            const automationProneBypassLabels = new Set(["allow-auto-merge"]);
            const bypassLabels = (process.env.AGENT_DRAFT_GUARD_BYPASS_LABELS || "human-approved-ready")
              .split(",")
              .map((s) => s.trim().toLowerCase())
              .filter((label) => !automationProneBypassLabels.has(label))
              .filter(Boolean);
            const hardStopLabels = (process.env.AGENT_DRAFT_GUARD_HARD_STOP_LABELS || "do-not-merge")
              .split(",")
              .map((s) => s.trim().toLowerCase())
              .filter(Boolean);
            const humanActors = (process.env.AGENT_DRAFT_GUARD_HUMAN_ACTORS || owner)
              .split(",")
              .map((s) => s.trim().toLowerCase())
              .filter(Boolean);

            // Race-condition defence: the event payload reflects the PR state at
            // trigger time. If the PR was merged/closed between trigger and job
            // execution, bail out gracefully instead of failing on irreversible
            // mutations (e.g. convert-to-draft on a merged PR).
            const { data: currentPr } = await github.rest.pulls.get({
              owner,
              repo,
              pull_number: pullNumber
            });
            if (currentPr.merged) {
              core.info(`PR #${pullNumber} is already merged. Skipping draft guard.`);
              return;
            }
            if (currentPr.state === "closed") {
              core.info(`PR #${pullNumber} is already closed. Skipping draft guard.`);
              return;
            }

            const prAuthorLogin = (pr.user?.login || "").toLowerCase();
            const prAuthorType = pr.user?.type;
            const humanAuthored =
              prAuthorType === "User" &&
              prAuthorLogin &&
              humanActors.includes(prAuthorLogin);

            const labels = (pr.labels || []).map((label) => label.name.toLowerCase());
            const ignoredBypassLabels = labels.filter((label) =>
              automationProneBypassLabels.has(label)
            );
            if (ignoredBypassLabels.length > 0) {
              core.info(`Ignoring automation-prone bypass labels: ${ignoredBypassLabels.join(", ")}.`);
            }
            const hardStopLabelSet = new Set(hardStopLabels);
            const presentHardStopLabels = labels.filter((label) => hardStopLabelSet.has(label));
            if (presentHardStopLabels.length > 0) {
              core.warning(`Hard-stop labels present: ${presentHardStopLabels.join(", ")}.`);
            }

            const looksAgentAuthored =
              titlePattern.test(pr.title || "") ||
              branchPattern.test(pr.head?.ref || "") ||
              labels.includes("agent-pr") ||
              labels.includes("codex");

            const bypassLabelSet = new Set(bypassLabels);
            const presentBypassLabels = labels.filter((label) => bypassLabelSet.has(label));
            const bypassPolicyFailures = [];
            const verifiedBypassLabels = [];
            if (presentBypassLabels.length > 0) {
              const events = await github.paginate(github.rest.issues.listEvents, {
                owner,
                repo,
                issue_number: pullNumber,
                per_page: 100
              });
              for (const label of presentBypassLabels) {
                const latest = [...events].reverse().find((event) =>
                  (event.event === "labeled" || event.event === "unlabeled") &&
                  event.label?.name?.toLowerCase() === label
                );
                const actor = latest?.actor;
                const actorName = actor?.login?.toLowerCase();
                if (!latest) {
                  bypassPolicyFailures.push(`${label}: no label event found`);
                } else if (latest.event !== "labeled") {
                  bypassPolicyFailures.push(`${label}: latest event is ${latest.event}`);
                } else if (actor?.type !== "User") {
                  bypassPolicyFailures.push(`${label}: actor ${actor?.login || "(unknown)"} is ${actor?.type || "unknown"}, not User`);
                } else if (!humanActors.includes(actorName)) {
                  bypassPolicyFailures.push(`${label}: actor ${actor.login} is not in AGENT_DRAFT_GUARD_HUMAN_ACTORS`);
                } else {
                  verifiedBypassLabels.push(`${label} by ${actor.login}`);
                }
              }
            }
            if (verifiedBypassLabels.length > 0) {
              core.info(`Verified human bypass label present: ${verifiedBypassLabels.join(", ")}.`);
            }
            for (const failure of bypassPolicyFailures) {
              core.warning(`Ignoring unverified bypass label: ${failure}.`);
            }

            const query = `
              query($owner: String!, $repo: String!, $number: Int!) {
                repository(owner: $owner, name: $repo) {
                  pullRequest(number: $number) {
                    id
                    isDraft
                    state
                    merged
                    autoMergeRequest {
                      enabledAt
                    }
                  }
                }
              }
            `;
            const result = await github.graphql(query, {
              owner,
              repo,
              number: pullNumber
            });
            const current = result.repository.pullRequest;
            if (!current) {
              core.info(`PR #${pullNumber} no longer resolves; skip draft auto-merge guard.`);
              return;
            }
            if (current.state === "MERGED" || current.state === "CLOSED" || current.merged === true) {
              core.info(
                `PR #${pullNumber} live state is ${current.state} (merged=${current.merged}); ` +
                  "skip draft auto-merge guard for post-close/post-merge event."
              );
              return;
            }
            const draftBoundaryAction =
              action === "ready_for_review" ||
              action === "auto_merge_enabled" ||
              action === "converted_to_draft";
            const hasAutoMergeRequest = Boolean(current.autoMergeRequest);
            const guarded =
              current.isDraft ||
              hasAutoMergeRequest ||
              draftBoundaryAction ||
              presentHardStopLabels.length > 0 ||
              looksAgentAuthored;
            if (!guarded) {
              if (humanAuthored) {
                core.info(
                  `PR author ${pr.user.login} is in AGENT_DRAFT_GUARD_HUMAN_ACTORS, ` +
                    "and this event has no draft/auto-merge boundary; skip draft auto-merge guard."
                );
              } else {
                core.info("PR is not draft, auto-merge-enabled, draft-boundary, or agent-like; skip draft auto-merge guard.");
              }
              return;
            }

            const actions = [];
            const failedActions = [];
            const softFailures = [];
            const policyFailures = bypassPolicyFailures.map((failure) =>
              `unverified bypass label ${failure}`
            );
            let shouldRestoreDraft = false;
            let shouldDisableAutoMerge = false;
            let ciGatePolicyFailure = false;
            if (presentHardStopLabels.length > 0) {
              policyFailures.push(`hard-stop label present: ${presentHardStopLabels.join(", ")}`);
              shouldRestoreDraft = !current.isDraft;
              shouldDisableAutoMerge = hasAutoMergeRequest;
            }
            const safeDraftOnlyState = current.isDraft && !hasAutoMergeRequest;
            const unsafeDraftBoundaryAction =
              action === "ready_for_review" ||
              action === "auto_merge_enabled";
            const approvalRequired =
              (!safeDraftOnlyState &&
                (looksAgentAuthored ||
                  unsafeDraftBoundaryAction ||
                  hasAutoMergeRequest)) ||
              bypassPolicyFailures.length > 0;
            const missingVerifiedApproval =
              approvalRequired &&
              verifiedBypassLabels.length === 0;
            if (missingVerifiedApproval) {
              const expected =
                bypassLabels.length > 0 ? bypassLabels.join(", ") : "(no configured bypass labels)";
              policyFailures.push(`missing verified human approval label: ${expected}`);
              shouldRestoreDraft = !current.isDraft;
              shouldDisableAutoMerge = hasAutoMergeRequest;
            }
            if (bypassPolicyFailures.length > 0) {
              shouldRestoreDraft = !current.isDraft;
              shouldDisableAutoMerge = hasAutoMergeRequest;
            }
            const summarizeError = (error) => {
              const messages = [];
              if (error?.message) messages.push(error.message);
              if (Array.isArray(error?.errors)) {
                for (const item of error.errors) {
                  if (item?.message) messages.push(item.message);
                }
              }
              return [...new Set(messages)].join("; ") || String(error);
            };
            const recordFailure = (actionName, error) => {
              const summary = summarizeError(error);
              failedActions.push(`${actionName}: ${summary}`);
              core.warning(`Draft PR guard failed to ${actionName}: ${summary}`);
            };
            const recordSoftFailure = (actionName, error) => {
              const summary = summarizeError(error);
              softFailures.push(`${actionName}: ${summary}`);
              core.info(`Draft PR guard soft-failure (${actionName}): ${summary}`);
            };

            if (hasAutoMergeRequest) {
              const checks = await github.rest.checks.listForRef({
                owner,
                repo,
                ref: pr.head.sha,
                check_name: "CI Gate",
                per_page: 100
              });
              const ciGateRuns = [...(checks.data.check_runs || [])].sort((a, b) => {
                const aTime = Date.parse(a.started_at || a.created_at || "") || 0;
                const bTime = Date.parse(b.started_at || b.created_at || "") || 0;
                return bTime - aTime;
              });
              const latestCiGate = ciGateRuns[0];
              if (
                !latestCiGate ||
                latestCiGate.status !== "completed" ||
                latestCiGate.conclusion !== "success"
              ) {
                const ciGateStatus = latestCiGate
                  ? `${latestCiGate.status}/${latestCiGate.conclusion || "none"} ${latestCiGate.html_url}`
                  : "missing";
                // CI Gate may be missing/pending, or left as cancelled by a
                // superseded draft run, immediately after auto-merge is
                // enabled or a synchronize event starts a replacement CI run.
                // Branch protection still prevents merge until a successful
                // current-head CI Gate exists, so do not disable auto-merge
                // for this startup race.
                const ciGateStartupRaceAction =
                  action === "auto_merge_enabled" || action === "synchronize";
                const ciWorkflowActiveCheckNames = new Set([
                  "PR Sync Check",
                  "Detect Changed Surfaces",
                  "Keeper Cwd Leak Gate",
                  "Meta Guards",
                  "Health",
                  "Build and Test",
                  "Lint",
                  "Dashboard",
                  "OCaml Structure Ratchet",
                  "TLA+ Model Checking",
                  "CI Gate"
                ]);
                let activeHeadChecks = [];
                if (
                  ciGateStartupRaceAction &&
                  latestCiGate?.status === "completed" &&
                  latestCiGate?.conclusion === "failure"
                ) {
                  const refChecks = await github.rest.checks.listForRef({
                    owner,
                    repo,
                    ref: pr.head.sha,
                    per_page: 100
                  });
                  activeHeadChecks = (refChecks.data.check_runs || [])
                    .filter((run) => run.status !== "completed")
                    .filter((run) => ciWorkflowActiveCheckNames.has(run.name))
                    .map((run) => `${run.name}:${run.status}`);
                }
                const staleFailedCiGateDuringActiveRun =
                  ciGateStartupRaceAction &&
                  latestCiGate?.status === "completed" &&
                  latestCiGate?.conclusion === "failure" &&
                  activeHeadChecks.length > 0;
                const ciGateStartupRace =
                  ciGateStartupRaceAction &&
                  (!latestCiGate ||
                    latestCiGate.status !== "completed" ||
                    latestCiGate.conclusion === "cancelled" ||
                    staleFailedCiGateDuringActiveRun);
                if (ciGateStartupRace) {
                  const activeSuffix =
                    activeHeadChecks.length > 0
                      ? `; active head checks: ${activeHeadChecks.join(", ")}`
                      : "";
                  core.info(`CI Gate is ${ciGateStatus} for head ${pr.head.sha}${activeSuffix}; skipping block on ${action} event.`);
                } else {
                  policyFailures.push(`CI Gate is not completed successfully for head ${pr.head.sha}: ${ciGateStatus}`);
                  shouldDisableAutoMerge = true;
                  ciGatePolicyFailure = true;
                }
              }
            }

            if (current.autoMergeRequest && shouldDisableAutoMerge) {
              try {
                await github.graphql(`
                  mutation($pullRequestId: ID!) {
                    disablePullRequestAutoMerge(input: {pullRequestId: $pullRequestId}) {
                      pullRequest {
                        id
                      }
                    }
                  }
                `, { pullRequestId: current.id });
                actions.push("disabled auto-merge");
              } catch (error) {
                recordFailure("disable auto-merge", error);
              }
            }

            if (!current.isDraft && shouldRestoreDraft) {
              try {
                await github.graphql(`
                  mutation($pullRequestId: ID!) {
                    convertPullRequestToDraft(input: {pullRequestId: $pullRequestId}) {
                      pullRequest {
                        id
                      }
                    }
                  }
                `, { pullRequestId: current.id });
                actions.push("converted PR back to draft");
              } catch (error) {
                recordFailure("convert PR back to draft", error);
              }
            }

            if (actions.length === 0 && failedActions.length === 0 && policyFailures.length === 0) {
              if (safeDraftOnlyState) {
                core.info("Guarded PR is already draft-only.");
              } else if (verifiedBypassLabels.length > 0) {
                core.info("Guarded PR has verified human approval; no draft restore needed.");
              } else {
                core.info("Guarded PR needs no draft or auto-merge repair.");
              }
              return;
            }

            const marker = "<!-- masc-agent-draft-guard -->";
            const bypassLabelList =
              bypassLabels.length > 0 ? bypassLabels.join(", ") : "(no configured bypass labels)";
            const statusLine =
              failedActions.length > 0
                ? "Draft PR guard could not fully reapply protection."
                : policyFailures.length > 0
                ? "Draft PR guard blocked an unsafe draft or auto-merge transition."
                : softFailures.length > 0
                ? "Draft PR guard applied with non-critical notes."
                : `Draft PR guard reapplied: ${actions.join(", ")}.`;
            const actionLines = [
              actions.length > 0 ? `Completed actions: ${actions.join(", ")}.` : "",
              policyFailures.length > 0 ? `Policy findings: ${policyFailures.join("; ")}.` : "",
              failedActions.length > 0 ? `Failed actions: ${failedActions.join("; ")}.` : "",
              softFailures.length > 0 ? `Non-critical: ${softFailures.join("; ")}.` : ""
            ].filter(Boolean);
            const body = [
              marker,
              statusLine,
              "",
              ...actionLines,
              "",
              `This repository treats draft PRs as draft-only until a human explicitly opts in by adding one of these labels: ${bypassLabelList}.`,
              ...(failedActions.length > 0
                ? [
                    "",
                    "Manual action required: restore draft state, or add a bypass label only after explicit human approval."
                  ]
                : policyFailures.length > 0
                ? [
                    "",
                    ciGatePolicyFailure
                      ? "Manual action required: restore draft state if needed, add a bypass label only after explicit human approval, and wait for CI Gate success before re-enabling auto-merge."
                      : "Manual action required: add a bypass label only after explicit human approval."
                  ]
                : softFailures.length > 0
                ? [
                    "",
                    "Non-critical notes above. Draft state is maintained — no manual action needed."
                  ]
                : [])
            ].join("\n");
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number: pullNumber,
              per_page: 100
            });
            const existing = comments.find((comment) =>
              comment.user?.type === "Bot" && comment.body?.includes(marker)
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: pullNumber,
                body
              });
            }

            // Always compose the summary so both hard-fail and warn paths can reference it.
            const summary = [
              policyFailures.length > 0 ? `policy failures: ${policyFailures.join("; ")}` : "",
              actions.length > 0 ? actions.join(", ") : "",
              failedActions.length > 0 ? `manual recovery required: ${failedActions.join("; ")}` : "",
              softFailures.length > 0 ? `non-critical: ${softFailures.join("; ")}` : ""
            ].filter(Boolean).join("; ");

            // Hard-fail on approval policy failures as well as critical
            // failures that violate Draft invariants:
            //   - agent-like PR lacks a verified human approval label
            //   - convert-to-draft failed (PR is still Ready when it shouldn't be)
            //   - someone tried to enable auto-merge / flip to draft while a policy is breached.
            // Auto-merge disable failure is a hard failure when the guard is
            // disabling auto-merge because CI Gate is missing/pending/failed.
            const hardFailure = failedActions.length > 0 || policyFailures.length > 0;
            const draftSafetyViolation =
              (action === "auto_merge_enabled" || action === "converted_to_draft") &&
              policyFailures.length > 0;

            if (hardFailure || draftSafetyViolation) {
              core.setFailed(`Draft PR guard blocked ${action}: ${summary}.`);
            } else if (policyFailures.length > 0 || softFailures.length > 0) {
              core.warning(`Draft PR guard non-blocking note (${action}): ${summary}`);
            }
