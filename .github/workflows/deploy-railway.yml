name: Deploy to Railway

on:
  workflow_dispatch:

concurrency:
  group: deploy-railway-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v5

      - name: Setup OCaml
        uses: ./.github/actions/setup-ocaml-toolchain
        with:
          ocaml-compiler: 5.4.1

      - name: Pin private dependencies
        run: |
          chmod +x scripts/opam-pin-external-deps.sh
          scripts/opam-pin-external-deps.sh --with-compact-protocol


      - name: Refresh apt index
        run: sudo apt-get update

      - name: Install dependencies
        run: |
          for attempt in 1 2 3; do
            opam install . --deps-only -y && break
            if [ "$attempt" -eq 3 ]; then
              echo "opam install failed after ${attempt} attempts"
              exit 1
            fi
            echo "opam install failed (attempt ${attempt}); retrying in 15s..."
            sleep 15
          done

      - name: Build release binary
        run: opam exec -- dune build --release bin/main_eio.exe

      - name: Prepare binary for Docker
        run: |
          cp _build/default/bin/main_eio.exe masc-mcp-linux-x64
          chmod +x masc-mcp-linux-x64
          ls -la masc-mcp-linux-x64

      - name: Verify Linux binary format
        run: |
          set -euo pipefail
          file masc-mcp-linux-x64
          file masc-mcp-linux-x64 | grep -q 'ELF 64-bit'

      - name: Create Railway LLM cascade config
        run: |
          mkdir -p config
          cat > config/llm_cascade.json << 'CASCADEJSON'
          {
            "governance_judge_models": ["glm:glm-4.7-flash"],
            "operator_judge_models": ["glm:glm-4.7-flash"],
            "heartbeat_action_models": ["glm:glm-4.7-flash"],
            "heartbeat_wake_models": ["glm:glm-4.7-flash"],
            "autonomy_direct_models": ["glm:glm-4.7-flash"],
            "classification_models": ["glm:glm-4.7-flash"],
            "verifier_models": ["glm:glm-4.7-flash"]
          }
          CASCADEJSON

      - name: Build deployment image
        run: docker build -t masc-mcp-railway-smoke .

      - name: Check shared library resolution
        run: |
          docker run --rm masc-mcp-railway-smoke sh -lc '
            set -e
            out="$(ldd /app/masc-mcp)"
            printf "%s\n" "$out"
            ! printf "%s\n" "$out" | grep -q "not found"
          '

      - name: Smoke deployment image
        run: |
          set -euo pipefail
          cid="$(docker run -d --network host -e PORT=18080 masc-mcp-railway-smoke /app/masc-mcp --port 18080 --base-path /app)"
          trap 'docker logs "$cid" || true; docker rm -f "$cid" || true' EXIT

          for attempt in $(seq 1 30); do
            if curl -fsS "http://127.0.0.1:18080/health" >/dev/null 2>&1; then
              echo "Container healthcheck passed."
              exit 0
            fi
            sleep 1
          done

          echo "Container healthcheck timed out (non-fatal in CI due to blocking GraphQL init)."
          docker logs "$cid" || true
          exit 1

      - name: Allow binary in Railway upload
        run: |
          # Railway CLI respects .gitignore. Instead of mutating .gitignore
          # (which could affect later steps), force-add the binary to git's
          # index so Railway includes it in the upload.
          git add -f masc-mcp-linux-x64

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        run: railway up --service masc-mcp --ci
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
