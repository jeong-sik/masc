# Declarative cascade configuration (RFC-0058 v2 5-layer schema).
# Checked-in seed. Logical usage names are configured under [routes].
#
# This file is the SSOT for: provider credentials, model capabilities,
# per-binding capacity (max-concurrent) and pricing, per-use aliases,
# tier composition, tier-group fallback chains, and route assignments.
# Code MUST NOT hard-code provider or model names; it dispatches by
# api_format (Messages_api / Chat_completions_api / Ollama_api) and
# reads everything else from this file. See RFC-0058 §2.4.

# ── Layer 1: Providers ──────────────────────────────────────────


[providers.codex_cli]
display-name = "OpenAI Codex CLI"
protocol = "openai-cli"
command = "codex"
is-non-interactive = true

[providers.codex_cli.credentials]
type = "env"
key = "OPENAI_API_KEY"

[providers.codex_cli.capabilities]
# Codex CLI's cached login cannot inject arbitrary per-request headers,
# so keeper-bound actor tools must be bridged via argv (per-keeper auth
# token routed through bearer_token_env_var) — see masc-mcp#10097.
requires-per-keeper-bridging-for-bound-actor-tools = true
identity-runtime-mcp-header-keys = ["x-masc-agent-name", "x-masc-keeper-name"]
argv-prompt-preflight = true

[providers.gemini_cli]
display-name = "Google Gemini CLI"
protocol = "google-cli"
command = "gemini"
is-non-interactive = true

[providers.gemini_cli.credentials]
type = "env"
key = "GEMINI_API_KEY"

# Gemini CLI carries one capability — it is intended as a viable
# bound-actor fallback target for cascades that include Codex CLI
# (per-keeper MCP config injection is unimplemented upstream but the
# catalog-level validator only requires "tolerates", not "natively
# supports"; see masc-mcp#11356). All other capability flags remain at
# their defaults (no runtime MCP HTTP headers, no anthropic caching,
# no max-turns cap).
#
# This declaration is part of the cascade TOML SSOT. Keep validator and
# runtime surfaces wired to declarative/provider-runtime capability data;
# do not add a second provider-specific copy in OCaml.
[providers.gemini_cli.capabilities]
tolerates-bound-actor-fallback = true


[providers.glm-coding]
display-name = "Zhipu GLM Coding"
protocol = "openai-http"
endpoint = "https://api.z.ai/api/coding/paas/v4"

[providers.glm-coding.credentials]
type = "env"
key = "ZAI_API_KEY"

# glm-coding ships no [capabilities] sub-table — no runtime MCP HTTP
# headers, no anthropic caching. Parser yields `capabilities = None`;
# A.3 callers treat `None` as the conservative defaults.

[providers.ollama]
display-name = "Ollama Local"
protocol = "ollama-http"
endpoint = "http://127.0.0.1:11434"

[providers.ollama.log]
enabled = false
path = "~/.ollama/logs/server.log"
default-lines = 200
max-bytes = 1048576

[providers.ollama.capabilities]
# Local Ollama is a viable bound-actor fallback target in catalogs
# that include Codex CLI — its HTTP surface accepts per-keeper auth
# headers natively. All other capability flags default to false.

[providers.openai_compat]
display-name = "OpenAI-Compatible Cloud"
protocol = "openai-http"
endpoint = "https://ollama.com/v1"

[providers.openai_compat.credentials]
type = "env"
key = "OLLAMA_CLOUD_API_KEY"
tolerates-bound-actor-fallback = true

# ── Layer 2: Models ────────────────────────────────────────────

[models.codex-spark]
api-name = "gpt-5.3-codex-spark"
max-context = 128000
tools-support = true
streaming = true

# Capabilities mirror OAS for_model_id_static gpt-5 family
# (openai_chat_extended_capabilities + max-output override). M2 will
# wire OAS to read these instead of substring-on-api-name.
[models.codex-spark.capabilities]
max-output-tokens = 128000
supports-parallel-tool-calls = true
supports-image-input = true
supports-native-streaming = true
supports-caching = true
supports-response-format-json = true

[models.gemini-flash]
api-name = "gemini-3-flash-preview"
max-context = 128000
tools-support = true
streaming = true

# Capabilities mirror OAS gemini_capabilities (matches starts_with
# "gemini-3"). Gemini supports JSON mode natively.
[models.gemini-flash.capabilities]
max-output-tokens = 65000
supports-parallel-tool-calls = true
supports-image-input = true
supports-native-streaming = true
supports-caching = true
supports-response-format-json = true

[models.gemini-flash-lite]
api-name = "gemini-3.1-flash-lite-preview"
max-context = 128000
tools-support = true
streaming = true

# Capabilities mirror OAS gemini_capabilities (api-name starts with
# "gemini-3"). Lite variant shares the family's capability matrix in
# OAS — refinement is a per-model M2 follow-up if production proves
# different.
[models.gemini-flash-lite.capabilities]
max-output-tokens = 65000
supports-parallel-tool-calls = true
supports-image-input = true
supports-native-streaming = true
supports-caching = true
supports-response-format-json = true

[models.glm-5-turbo]
api-name = "glm-5-turbo"
max-context = 128000
tools-support = true
streaming = true

# Capabilities mirror OAS for_model_id_static glm-5-turbo branch.
# tool_choice unsupported in OAS but that's separate from
# parallel_tool_calls (left false at default).
[models.glm-5-turbo.capabilities]
max-output-tokens = 16384
supports-native-streaming = true
supports-response-format-json = true

[models.glm-flashx]
api-name = "glm-4.7-flashx"
max-context = 128000
tools-support = true
streaming = true

# Capabilities mirror OAS for_model_id_static glm-4.7 branch — falls
# into the "glm-4.5 || glm-4.6 || glm-4.7 || glm-5" full-text OR clause
# (api-name "glm-4.7-flashx" does NOT match the narrower "glm-4-flash"
# entry which expects "glm-4-flash" prefix, not "glm-4.7-flashx").
[models.glm-flashx.capabilities]
max-output-tokens = 128000
supports-native-streaming = true
supports-response-format-json = true

# ── OAS for_model_id_static parity entries (RFC-0058 Phase 1) ──
#
# Each [models.<id>] below mirrors one OAS
# Llm_provider.Capabilities.for_model_id_static branch using M1c
# match-prefixes for longest-prefix-first lookup. Sole source of
# capability values is OAS lib/llm_provider/capabilities.ml:380-740
# (verified against origin/main 2026-05-12).
#
# Bindings are NOT auto-added here — these entries exist solely to
# feed Cascade_capabilities_bridge.lookup. Provider routing remains
# the responsibility of existing bindings + the 8 production model
# entries above.

supports-top-k = true
supports-computer-use = true

