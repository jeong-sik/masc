# Destructive Operations Policy
#
# Canonical catalogue of shell command substrings that the keeper
# destructive-pattern gate rejects. Each entry binds a typed
# destructive class to a lowercase substring and an operator-visible
# description.
#
# SSOT: this file is the only place the live catalogue is defined.
# It is embedded into the binary at build time via [masc.embedded_config]
# and can also be loaded from a workspace config root at runtime.

[destructive_ops]
enabled = true

[[destructive_ops.patterns]]
class = "recursive_delete"
pattern = "rm -rf"
description = "recursive forced deletion"

[[destructive_ops.patterns]]
class = "recursive_delete"
pattern = "rm -r"
description = "recursive deletion"

[[destructive_ops.patterns]]
class = "recursive_delete"
pattern = "rmdir"
description = "directory removal"

[[destructive_ops.patterns]]
class = "sql_destructive"
pattern = "drop table"
description = "SQL table drop"

[[destructive_ops.patterns]]
class = "sql_destructive"
pattern = "drop database"
description = "SQL database drop"

[[destructive_ops.patterns]]
class = "sql_destructive"
pattern = "truncate table"
description = "SQL table truncate"

[[destructive_ops.patterns]]
class = "sql_destructive"
pattern = "delete from"
description = "SQL bulk delete"

[[destructive_ops.patterns]]
class = "forced_git_mutation"
pattern = "git push --force"
description = "force push"

[[destructive_ops.patterns]]
class = "forced_git_mutation"
pattern = "git push -f"
description = "force push"

[[destructive_ops.patterns]]
class = "forced_git_mutation"
pattern = "git reset --hard"
description = "hard reset"

[[destructive_ops.patterns]]
class = "forced_git_mutation"
pattern = "git clean -f"
description = "forced clean"

[[destructive_ops.patterns]]
class = "privilege_escalation"
pattern = "chmod 777"
description = "world-writable permissions"

[[destructive_ops.patterns]]
class = "filesystem_format"
pattern = "mkfs"
description = "filesystem format"

[[destructive_ops.patterns]]
class = "device_write"
pattern = "> /dev/"
description = "device write"

[[destructive_ops.patterns]]
class = "device_write"
pattern = "dd if="
description = "raw disk operation"

[[destructive_ops.patterns]]
class = "process_signal"
pattern = "kill -9"
description = "forced process kill"

[[destructive_ops.patterns]]
class = "process_signal"
pattern = "pkill"
description = "pattern-based process kill"

[[destructive_ops.patterns]]
class = "system_control"
pattern = "shutdown"
description = "system shutdown"

[[destructive_ops.patterns]]
class = "system_control"
pattern = "reboot"
description = "system reboot"
