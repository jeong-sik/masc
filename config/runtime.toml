# MASC runtime seed.
#
# This file is copied into <base-path>/.masc/config/runtime.toml for new
# workspaces. Existing live config roots are preserved and must be edited
# explicitly through the dashboard/runtime config path.
#
# Local Gemma 4 QAT is a canary runtime, not the fleet default. Keep the
# default on the cloud runtime and pin only one keeper to local Ollama until
# sustained turns prove the local box can absorb more load. OAS handles Gemma 4
# thinking through the chat-template control token path, not Ollama think:true.

[runtime]
default = "ollama_cloud.deepseek-v4-flash"
# memory-os librarian (post-turn episode extraction) requests provider-native
# structured output, so it is routed independently of keeper chat to a
# schema-capable runtime. minimax-m3 declares supports-structured-output;
# deepseek-v4-flash does not in this runtime seed and measured ~74%
# empty/invalid-JSON on the librarian (2026-06-18). Override per process with
# MASC_KEEPER_MEMORY_OS_LIBRARIAN_RUNTIME_ID. Unset = inherit each keeper's
# runtime (legacy).
librarian = "ollama_cloud.minimax-m3"
# Provider-native structured-output judges must not inherit the fleet chat
# default when that default lacks schema support. Keep this lane explicit so
# dashboard operator/governance judges fail at config load on typo/unsupported
# routing instead of discovering the mismatch in the daemon loop.
structured_judge = "ollama_cloud.minimax-m3"
# Anti-rationalization/cross-verifier work asks for JSON and higher judgment.
# Keep normal keeper turns on the fleet default flash runtime; reserve Pro for
# this explicit smart lane.
cross_verifier = "deepseek.deepseek-v4-pro"

[providers.ollama_cloud]
display-name = "Ollama Cloud"
protocol = "openai-compatible-http"
endpoint = "https://ollama.com/v1"
# OAS connect + initial-response-headers wall-clock budget (oas#2163).
# Ollama Cloud serving reasoning models (kimi-k2.6, minimax-m3) can hold the
# first response header past the 60s OpenAI_compat default (cold-start /
# admission queueing / long reasoning prefill), surfacing in the Fusion panel
# as `phase=http_operation: HTTP operation exceeded wall-clock timeout` — which
# degraded a panel to 1/3 models (only deepseek-v4-pro cleared 60s). 600s
# intentionally mirrors OAS `Provider_config.default_connect_timeout_s Ollama`;
# omit to keep the OAS OpenAI-compatible default. Key spelling is mirrored by
# `Runtime_schema.connect_timeout_s_key`.
connect-timeout-s = 600.0

[providers.ollama_cloud.credentials]
type = "env"
key = "OLLAMA_CLOUD_API_KEY"

[providers.ollama_cloud.capabilities]
supports-runtime-mcp-tools = true
supports-runtime-tool-events = true
supports-runtime-mcp-http-headers = true

[providers.deepseek]
display-name = "DeepSeek API"
protocol = "openai-compatible-http"
endpoint = "https://api.deepseek.com"

[providers.deepseek.credentials]
type = "env"
key = "DEEPSEEK_API_KEY"

[providers.deepseek.capabilities]
supports-runtime-mcp-tools = true
supports-runtime-tool-events = true
supports-runtime-mcp-http-headers = true

[providers.glm-coding]
display-name = "GLM Coding Plan"
protocol = "openai-compatible-http"
endpoint = "https://api.z.ai/api/coding/paas/v4"

[providers.glm-coding.credentials]
type = "env"
key = "ZAI_API_KEY_SB"

[providers.glm-coding.capabilities]
supports-runtime-mcp-tools = true
supports-runtime-tool-events = true
supports-runtime-mcp-http-headers = true

[providers.ollama]
display-name = "Local Ollama"
protocol = "ollama-http"
endpoint = "http://localhost:11434"

