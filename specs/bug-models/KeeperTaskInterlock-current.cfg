\* Current implementation model: CrashToDead is normal, ReconcileByGC
\* is the async cleanup. Safety (NoDeadKeeperHoldsTask) is INTENTIONALLY
\* NOT checked here because the real code does not satisfy it
\* synchronously — the transient "Dead ∧ Held" window between mark_dead
\* and the next GC cycle is expected and safe in practice.
\*
\* What we DO check:
\*   - TypeOK: the variable space is well-formed
\*   - EventuallyCleaned: every orphaned state leads to a clean state
\*     (liveness, proven via WF_vars fairness on ReconcileByGC)
\*
\* Expected: no error, no liveness violation.
\* The liveness check is expensive relative to safety — TLC will
\* enumerate the full state graph and check that no infinite
\* behavior remains in the orphaned set.
SPECIFICATION SpecCurrent
CONSTANTS
  K = {k1, k2}
  T = {t1, t2}
INVARIANT TypeOK
PROPERTY EventuallyCleaned
CHECK_DEADLOCK FALSE
