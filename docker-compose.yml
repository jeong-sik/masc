# MASC MCP – local / single-host docker-compose orchestration.
#
# Observability stack (OTel-native, no Prometheus):
#   masc ──OTLP/HTTP──▶ otel-collector ──┬──OTLP/gRPC──▶ jaeger (traces)
#                                        └──prometheusremotewrite──▶ victoriametrics (metrics)
#   grafana ──queries──▶ jaeger + victoriametrics (UI: http://localhost:3000)
#
# Production runs on Railway today; this compose file is for:
#   - reproducible local stack-style runs,
#   - k8s/Nomad migrations that read compose for restart/log knobs,
#   - local observability development.

services:
  masc:
    # To run masc inside docker:
    #   docker compose --profile masc up -d
    # Requires a linux binary (masc-linux-x64) or OCaml cross-compile.
    profiles: ["masc"]
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BINARY_PATH: masc-linux-x64
    image: masc:local
    container_name: masc
    restart: unless-stopped
    stop_signal: SIGTERM
    stop_grace_period: 75s
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      MASC_BASE_PATH: /app
      MASC_CONFIG_DIR: /app/config
      MASC_SHUTDOWN_CLEANUP_TIMEOUT: "10"
      MASC_SHUTDOWN_FORCE_TIMEOUT: "60"
      MASC_OTEL_ENABLED: "true"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4318"
      OTEL_SERVICE_NAME: "masc"
    volumes:
      - masc-state:/app/.masc
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  masc-oneclick:
    # One-touch, self-contained: builds the server + dashboard from source and
    # seeds a keeper team on the default flash model. No prebuilt binary needed.
    #   OLLAMA_CLOUD_API_KEY=... docker compose --profile oneclick up --build
    # Then open http://localhost:8935/dashboard
    profiles: ["oneclick"]
    build:
      context: .
      dockerfile: Dockerfile.oneclick
    image: masc-oneclick:local
    container_name: masc-oneclick
    restart: unless-stopped
    stop_signal: SIGTERM
    stop_grace_period: 75s
    ports:
      - "${MASC_HOST_PORT:-8935}:8080"
    environment:
      PORT: "8080"
      MASC_BASE_PATH: /app
      MASC_TEAM_PRESET: "${MASC_TEAM_PRESET:-classic}"
      # Passed through from the host shell; required for the default flash model.
      OLLAMA_CLOUD_API_KEY: "${OLLAMA_CLOUD_API_KEY:-}"
    volumes:
      - masc-oneclick-state:/app/.masc
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health"]
      interval: 30s
      timeout: 3s
      start_period: 15s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: masc-otel-collector
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    volumes:
      - ./infrastructure/monitoring/otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml
    ports:
      - "4318:4318"
    depends_on:
      - jaeger
      - victoriametrics
    restart: unless-stopped

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: masc-jaeger
    ports:
      - "16686:16686"
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    command:
      - "--collector.otlp.grpc.max-message-size=16777216"
    restart: unless-stopped

  victoriametrics:
    image: victoriametrics/victoria-metrics:latest
    container_name: masc-victoriametrics
    ports:
      - "8428:8428"
    command:
      - "-retentionPeriod=7d"
    volumes:
      - victoriametrics-data:/victoria-metrics-data
    restart: unless-stopped

  loki:
    image: grafana/loki:latest
    container_name: masc-loki
    ports:
      - "3100:3100"
    command: ["-config.file=/etc/loki/local-config.yaml"]
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: masc-grafana
    ports:
      - "3000:3000"
    volumes:
      - ./infrastructure/monitoring/grafana/provisioning:/etc/grafana/provisioning
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_FEATURE_TOGGLES_ENABLE: "traceQLStreaming"
    depends_on:
      - jaeger
      - victoriametrics
      - loki
    restart: unless-stopped

volumes:
  masc-state:
    driver: local
  masc-oneclick-state:
    driver: local
  victoriametrics-data:
    driver: local
