comment = "Checked-in seed for cascade authoring. Repo defaults expose exactly two profiles: big_three for keeper/workflow calls and tool_rerank for short rerank calls. Logical usage names are configured under [routes] instead of being profile names."

[routes]
keeper_turn = "big_three"
phase_recovery = "big_three"
phase_buffer = "big_three"
tool_required = "big_three"
governance_judge = "big_three"
operator_judge = "big_three"
cross_verifier = "big_three"
verifier = "big_three"
autoresearch = "big_three"
adversarial_reviewer = "big_three"
auto_responder = "big_three"
routing = "big_three"
openai_compat = "big_three"
persona_generation = "big_three"
provider_benchmark = "big_three"
llm_rerank = "tool_rerank"
simple_task = "tier_small"
moderate_task = "tier_medium"
complex_task = "big_three"

[big_three]
comment = "Canonical keeper/workflow profile. Keep operator-chosen providers here; code must route logical usages through [routes] instead of hardcoding extra profile names."
models = [
  "codex_cli:gpt-5.3-codex-spark",
  "gemini_cli:auto",
  "kimi_cli:kimi-for-coding",
  { model = "glm-coding:auto", supports_tool_choice = true },
  "claude_code:auto",
]
temperature = 0.2
max_tokens = 16384
keeper_assignable = true
fallback_cascade = "keeper_diverse"

[keeper_diverse]
comment = "Fallback cascade for contract violation retry. Different model composition from big_three to break correlated failure."
models = [
  "claude_code:claude-sonnet-4-6",
  "gemini_cli:gemini-2.5-flash",
  "codex_cli:gpt-5.3-codex-spark",
]
temperature = 0.3
max_tokens = 16384
keeper_assignable = true

[tool_rerank]
comment = "System-only short-output profile for rerank/scoring calls."
models = [
  "codex_cli:gpt-5.3-codex-spark",
  "gemini_cli:auto",
  "kimi_cli:kimi-for-coding",
  "glm-coding:auto",
  "claude_code:auto",
]
temperature = 0.0
max_tokens = 200
keeper_assignable = false

[tier_small]
# Operator opt-in slot for 4B-class local models. Empty by default — every
# route that points at "tier_small" falls through to tier_medium via
# fallback_cascade until at least one model is uncommented below (and
# Ollama is running locally). Keeping the profile here documents the
# intended fallback chain rather than removing it; we'd otherwise need
# to either rewrite every "tier_small" route or silently ignore them.
comment = "Operator opt-in slot for 4B-class local models. Empty by default; routes fall through to tier_medium."
# models = [
#   "ollama:llama3.2:3b",
#   "ollama:phi-3-mini",
# ]
models = []
temperature = 0.3
max_tokens = 1000
keeper_assignable = false
fallback_cascade = "tier_medium"

[tier_medium]
comment = "9B-class models for moderate tasks (extraction, reformat, medium-length generation). Falls back to big_three on exhaustion."
models = [
  "glm-coding:glm-4.7-flashx",
]
temperature = 0.2
max_tokens = 4096
keeper_assignable = false
fallback_cascade = "big_three"

[__safe_lane]
# RFC-0027 PR-4: system-only baseline cascade that satisfies every
# capability profile (tool_strict / inline_tools / lite / local).
# All entries carry runtime MCP HTTP headers AND inline tools, so
# any keeper-bound MCP turn or any inline-tools turn can route here
# as last-resort fallback after upstream cascades exhaust.
#
# Members must remain (provider, model) pairs that:
#   - support_runtime_mcp_http_headers = true (claude_code, kimi_cli)
#   - or expose direct inline tools (HTTP-based glm-coding)
# Adding gemini_cli or codex_cli here breaks the safe-lane contract.
comment = "System-only baseline cascade. Satisfies every capability profile. Used as last-resort fallback target. Not keeper-assignable."
models = [
  "claude_code:auto",
  { model = "glm-coding:auto", supports_tool_choice = true },
  "kimi_cli:kimi-for-coding",
]
temperature = 0.2
max_tokens = 16384
keeper_assignable = false
required_capability_profile = "tool_strict"

[local_recovery]
# P1-2 fix: profiles may declare fallback_cascade = "local_recovery" (a
# logical route key that resolves to the Failing-phase cascade).  The runtime
# cascade loader looks up profile names, not route keys, so a missing
# [local_recovery] section caused the fallback hint to be silently ignored.
# This alias entry makes the name resolvable; it delegates to big_three so
# behaviour matches the phase_recovery route (routes.phase_recovery = "big_three").
comment = "Alias for the phase_recovery logical route. Profiles that declare fallback_cascade = \"local_recovery\" resolve here instead of silently ignoring the hint. Not keeper-assignable."
models = [
  "codex_cli:gpt-5.3-codex-spark",
  "gemini_cli:auto",
  "claude_code:auto",
]
temperature = 0.2
max_tokens = 16384
keeper_assignable = false
fallback_cascade = "big_three"

[tier_fast]
comment = "Cheap+fast tool-capable cloud models for keeper turns. Bias toward latency and cost over reasoning depth. All entries support tool calling. Falls back to big_three on exhaustion."
models = [
  "claude_code:claude-haiku-4-5-20251001",
  "codex_cli:gpt-5.3-codex-spark",
  "gemini_cli:gemini-3-flash-preview",
  "gemini_cli:gemini-3.1-flash-lite-preview",
  { model = "glm-coding:glm-5-turbo", supports_tool_choice = true },
  { model = "glm-coding:glm-4.7-flashx", supports_tool_choice = true },
]
temperature = 0.2
max_tokens = 8192
keeper_assignable = true
fallback_cascade = "big_three"
