# ── Layer 3: Provider×Model Bindings ───────────────────────────
#
# `max-concurrent` is REQUIRED (RFC-0058 §3.4). Defaults reflect
# observed CLI/HTTP capacity ceilings — CLI providers serialize at
# the binary level (1 concurrent invocation per credential), HTTP
# providers tolerate small fan-out before upstream throttling.
# `price-input` / `price-output` are USD per 1M tokens.

[codex_cli.codex-spark]
is-default = true
max-concurrent = 1

[kimi_cli.kimi-coding]
is-default = true
max-concurrent = 1

[claude_code.sonnet]
is-default = true
max-concurrent = 1
price-input = 3.00
price-output = 15.00

[claude_code.haiku]
is-default = false
max-concurrent = 2
price-input = 0.80
price-output = 4.00

[gemini_cli.gemini-flash]
is-default = true
max-concurrent = 1

[gemini_cli.gemini-flash-lite]
is-default = false
max-concurrent = 1

[glm-coding.glm-5-turbo]
is-default = true
max-concurrent = 2

[glm-coding.glm-flashx]
is-default = false
max-concurrent = 2

# ── Layer 4: Aliases (per-use overrides) ───────────────────────
#
# Aliases give logical names to (provider, model) pairs with
# call-site specific overrides. Code MUST reference aliases here
# rather than raw `<provider>.<model>` pairs — that is how RFC-0058
# §2.4 keeps vendor/model identifiers out of OCaml source.

[claude_code.haiku.for-tool-rerank]
max-output = 1024
temperature = 0.1

[codex_cli.codex-spark.for-tool-rerank]
max-output = 1024
temperature = 0.1

[claude_code.haiku.for-governance]
max-input = 8192
max-output = 2048
temperature = 0.1

# ── Layer 5: Tiers ─────────────────────────────────────────────

[tier.big_three]
# Canonical keeper/workflow tier.
members = ["codex_cli.codex-spark", "kimi_cli.kimi-coding"]
strategy = "failover"

[tier.keeper_diverse]
# Fallback tier for contract violation retry. Different model
# composition from big_three to break correlated failure.
members = ["claude_code.sonnet", "gemini_cli.gemini-flash", "codex_cli.codex-spark"]
strategy = "failover"

[tier.tool_rerank]
# System-only short-output tier for rerank/scoring calls.
# Members are aliases (Layer 4) with reduced max-output.
members = [
  "codex_cli.codex-spark.for-tool-rerank",
  "claude_code.haiku.for-tool-rerank",
]
strategy = "failover"

[tier.governance]
# System-only baseline for governance / judge calls.
members = ["claude_code.haiku.for-governance"]
strategy = "failover"

[tier.tier_small]
# Operator opt-in slot for 4B-class local models. Empty by default;
# routes fall through to tier_medium via tier-group fallback.
members = []
strategy = "failover"

[tier.tier_medium]
# 9B-class cloud-coding models for moderate tasks.
members = ["glm-coding.glm-flashx"]
strategy = "failover"

[tier.__safe_lane]
# System-only baseline tier (RFC-0027 PR-4). Last-resort fallback
# target that satisfies every capability profile. Not keeper-assignable.
members = ["kimi_cli.kimi-coding"]
strategy = "failover"

[tier.local_recovery]
# Recovery tier for fallback_cascade = "local_recovery".
members = ["codex_cli.codex-spark"]
strategy = "failover"

[tier.tier_fast]
# Cheap+fast tool-capable cloud models for keeper turns.
members = [
  "claude_code.haiku",
  "codex_cli.codex-spark",
  "gemini_cli.gemini-flash",
  "gemini_cli.gemini-flash-lite",
  "glm-coding.glm-5-turbo",
  "glm-coding.glm-flashx",
]
strategy = "failover"

# ── Tier-Groups (fallback chains) ──────────────────────────────

[tier-group.big_three]
tiers = ["big_three", "keeper_diverse", "__safe_lane"]
strategy = "priority_tier"
fallback = true

[tier-group.tier_small]
tiers = ["tier_small", "tier_medium", "big_three"]
strategy = "priority_tier"
fallback = true

[tier-group.tier_medium]
tiers = ["tier_medium", "big_three"]
strategy = "priority_tier"
fallback = true

[tier-group.local_recovery]
tiers = ["local_recovery", "big_three"]
strategy = "priority_tier"
fallback = true

[tier-group.tier_fast]
tiers = ["tier_fast", "big_three"]
strategy = "priority_tier"
fallback = true

[tier-group.tool_rerank]
tiers = ["tool_rerank", "__safe_lane"]
strategy = "priority_tier"
fallback = true

[tier-group.governance]
tiers = ["governance", "__safe_lane"]
strategy = "priority_tier"
fallback = true

# ── Routes (logical usage → tier-group) ────────────────────────
#
# RFC-0058 §4 R6: route targets resolve to tier-groups, tiers,
# bindings, or aliases (validated by `Cascade_declarative_validator`
# rule R7). The seed below targets tier-groups exclusively because
# routing through a tier-group keeps fallback chains explicit and
# discourages callers from depending on a single tier without a
# documented degradation path.

[routes.keeper_turn]
target = "tier-group.big_three"

[routes.phase_recovery]
target = "tier-group.big_three"

[routes.phase_buffer]
target = "tier-group.big_three"

[routes.tool_required]
target = "tier-group.big_three"

[routes.governance_judge]
target = "tier-group.governance"

[routes.operator_judge]
target = "tier-group.governance"

[routes.cross_verifier]
target = "tier-group.big_three"

[routes.verifier]
target = "tier-group.big_three"

[routes.autoresearch]
target = "tier-group.big_three"

[routes.adversarial_reviewer]
target = "tier-group.big_three"

[routes.auto_responder]
target = "tier-group.big_three"

[routes.routing]
target = "tier-group.big_three"

[routes.openai_compat]
target = "tier-group.big_three"

[routes.persona_generation]
target = "tier-group.big_three"

[routes.provider_benchmark]
target = "tier-group.big_three"

[routes.llm_rerank]
target = "tier-group.tool_rerank"

[routes.simple_task]
target = "tier-group.tier_small"

[routes.moderate_task]
target = "tier-group.tier_medium"

[routes.complex_task]
target = "tier-group.big_three"

# ── Profiles (capability requirements per route class) ─────────

[profiles.tool_strict]
required_capabilities = [
  "runtime_mcp_tools",
  "runtime_tool_events",
  "runtime_mcp_http_headers",
]

[profiles.inline_tools]
required_capabilities = ["inline_tools", "inline_tool_choice"]

[profiles.lite]
required_capabilities = ["runtime_mcp_tools", "runtime_tool_events"]

[profiles.local]
required_capabilities = []
