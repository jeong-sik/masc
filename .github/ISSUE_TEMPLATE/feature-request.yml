name: Feature request
description: Propose a new capability, workflow, or public surface.
title: "[Feature] "
labels:
  - "type:feature"
body:
  - type: markdown
    attributes:
      value: |
        Use this for net-new capability work.
        Human reporters, Codex, and internal agents may all file this form.
        Choose one planning area and one target lane below.
        Automation mirrors those choices into labels and keeps `triage-required`
        on the issue until it has exactly one `type:*`, one `area:*`, and one `target:*` label.
  - type: dropdown
    id: area
    attributes:
      label: Product area
      options:
        - Repo coordination
        - Team session delivery
        - Dashboard and read models
        - Operator and intervention
        - Transport, auth, and health
        - Config and installation
        - CI and release automation
        - Docs and onboarding
        - Experimental surfaces
    validations:
      required: true
  - type: dropdown
    id: target
    attributes:
      label: Target lane
      description: This is mirrored into a `target:*` label.
      options:
        - now
        - next
        - later
    validations:
      required: true
  - type: dropdown
    id: promise
    attributes:
      label: Promise affected
      options:
        - repo coordination
        - ops visibility
        - experimental or internal
    validations:
      required: true
  - type: checkboxes
    id: product_gap
    attributes:
      label: Product gap
      options:
        - label: Code may already exist, but the product promise is still not trustworthy.
  - type: input
    id: outcome
    attributes:
      label: Desired outcome
      placeholder: What becomes possible if this exists?
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      placeholder: What is currently missing or too expensive?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed approach
      description: Rough ideas are enough. This can stay incomplete.
    validations:
      required: false
  - type: textarea
    id: non_goals
    attributes:
      label: Non-goals
      description: What should this request explicitly not try to solve?
    validations:
      required: false
