name: tla-annotation-drift

# R-B-1.c CI integration — enforce that OCaml `[@tla.idle|active|terminal]`
# annotated constructors map to existing TLA+ spec set members.
#
# Background and rationale: `scripts/audit-tla-annotation-drift.sh` and
# `docs/tla-audit/ktc-b1-turn-phase-spec-gap-2026-05-12.md`.
#
# Baseline policy: `scripts/tla-annotation-drift-baseline.txt` lists drifts
# that are knowingly outstanding (awaiting their spec-extension RFC, e.g.
# R-B-1.a for TurnPhaseSet routing/exhausted).  The validator skips
# baseline entries so this job fails only on NEW regressions.  When an
# RFC lands and adds the missing spec symbol, the corresponding baseline
# line must be removed in the same PR — otherwise the next PR that
# re-introduces the same drift would slip through.

on:
  pull_request:
    paths:
      - 'specs/keeper-state-machine/**'
      - 'lib/keeper/keeper_registry.ml'
      - 'lib/keeper/keeper_state_machine.ml'
      - 'lib/cascade/cascade_fsm.ml'
      - 'lib/cascade/cascade_fsm.mli'
      - 'scripts/audit-tla-annotation-drift.sh'
      - 'scripts/audit-tla-phase-count.sh'
      - 'scripts/audit-ocaml-phase-count.sh'
      - 'scripts/ocaml-phase-count-baseline.txt'
      - 'scripts/audit-tla-ml-line-refs.sh'
      - 'lib/keeper/**/*.ml'
      - 'lib/keeper/**/*.mli'
      - 'scripts/tla-annotation-drift-baseline.txt'
      - '.github/workflows/tla-annotation-drift.yml'
  push:
    branches:
      - main
    paths:
      - 'specs/keeper-state-machine/**'
      - 'lib/keeper/keeper_registry.ml'
      - 'lib/keeper/keeper_state_machine.ml'
      - 'lib/cascade/cascade_fsm.ml'
      - 'lib/cascade/cascade_fsm.mli'
      - 'scripts/audit-tla-annotation-drift.sh'
      - 'scripts/audit-tla-phase-count.sh'
      - 'scripts/audit-ocaml-phase-count.sh'
      - 'scripts/ocaml-phase-count-baseline.txt'
      - 'scripts/audit-tla-ml-line-refs.sh'
      - 'lib/keeper/**/*.ml'
      - 'lib/keeper/**/*.mli'
      - 'scripts/tla-annotation-drift-baseline.txt'
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: tla-annotation-drift-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  drift:
    name: TLA+ annotation drift check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install ripgrep
        run: sudo apt-get update -qq && sudo apt-get install -y ripgrep

      - name: Run drift validator
        run: |
          bash scripts/audit-tla-annotation-drift.sh \
            --baseline scripts/tla-annotation-drift-baseline.txt \
            --check-cross-spec

      - name: Run phase-count validator (R-H-1.c)
        # Catches stale "N phases" mentions in spec comments where N
        # disagrees with the OCaml `type phase` constructor count.
        # iter 4 added Zombie (12→13) but 7 specs still cited 12 for
        # six months until iter 49 audit caught them; this guard
        # prevents the next phase-count change from regressing the
        # same way.  See docs/tla-audit/rh1b-sweep-zombie-12-phases-
        # stale-2026-05-12.md for the audit that motivated it.
        run: bash scripts/audit-tla-phase-count.sh

      - name: Run OCaml phase-count validator (R-H-1.f)
        # OCaml-side twin of R-H-1.c.  Iter 54 (#14886) discovered the
        # same 12→13 stale-count drift class in lib/keeper/*.{ml,mli}
        # docstrings — six sites, two of them ("11-state" in
        # keeper_registry) predating even Zombie addition.  iter 55
        # (#14891) added the validator with a temporary baseline
        # grandfathering the four sites in flight via #14886; iter 65
        # R-H-1.g drained that baseline after #14886 merged, so this
        # step now enforces zero drift.  The baseline file is kept
        # (empty) and the `--baseline` flag still works for any future
        # transient grandfathering — see its header comment.
        run: |
          bash scripts/audit-ocaml-phase-count.sh \
            --baseline scripts/ocaml-phase-count-baseline.txt

      - name: Run TLA->OCaml line-ref validator (N-2.c)
        # Catches stale `[func] at line N` citations in spec preambles
        # where the OCaml `let func` declaration has drifted out of an
        # N-line window.  iter 63 #14919 audit found KeeperApprovalQueue
        # citing lines 751/772/941 for functions now at +245..+413; two
        # more specs (KeeperHeartbeat, KeeperTaskAcquisition) had the
        # same drift.  iter 64 N-2.a converted those to function-name-
        # only references; this guard prevents the next preamble that
        # adds a line number from regressing the same way.
        # See scripts/audit-tla-ml-line-refs.sh and docs/tla-audit/
        # kaq-n1-approval-queue-line-ref-drift-2026-05-12.md.
        run: bash scripts/audit-tla-ml-line-refs.sh
