[ollama.gemma4-26b-a4b-qat]
wizard-default = true
max-concurrent = 1

[ollama.gemma4-e2b-it-qat]
max-concurrent = 1

# ── Runtime lanes (ordered failover) ─────────────────────────────────
# A lane is an ordered list of runtime candidates. When a keeper is assigned
# to a lane, the turn attempts candidates in order until one succeeds or the
# lane is exhausted. Lanes are resolved at config load; unknown candidate ids
# abort startup. Only the "ordered" strategy is implemented today.
[runtime.lanes.default]
strategy = "ordered"
candidates = [
  "ollama_cloud.deepseek-v4-flash",
  "deepseek.deepseek-v4-pro",
]

# ── Keeper assignments ──────────────────────────────────────────────
# Keepers are assigned to a model by provider.model key. Unassigned
# keepers fall back to [runtime].default. Per-keeper overrides in the
# live config (<base>/.masc/config/runtime.toml) take precedence.
#
# Seed only nick0cave to the local Gemma 4 canary. Other keepers use the
# fleet default unless their live config overrides this seed.
# Do not assign general keeper lanes to Pro here. Pro is reserved for explicit
# judge/evaluator lanes ([runtime].cross_verifier and [fusion].judge).
[runtime.assignments]
nick0cave = "ollama.gemma4-26b-a4b-qat"
# example: route a test keeper through the failover lane
# canary = "default"

# ── Discord ──────────────────────────────────────────────────────────
# Trigger policy controls which inbound Discord events the bot responds to.
#   mention_or_thread  — 스레드에서 자동 응답, 일반 채널은 멘션 필요 (기본값)
#   mention_only       — @멘션된 메시지만 응답
#   all                — 모든 메시지에 응답
#   user_only:<snowflake> — 특정 사용자만
# Env var MASC_DISCORD_TRIGGER_POLICY overrides this value.
[discord]
trigger_policy = "mention_or_thread"

# ── Fusion 패널+심판 심의 (RFC-0252) ─────────────────────────────────
# masc_fusion 도구의 out-of-band 심의 루프 설정. 개인 dev 카나리로 기본 ON.
# harness(RFC-0252 §11) 미검증 — 카나리 출력(panel 답 + judge 종합)으로 사후 판단.
# [fusion] 섹션이 없거나 enabled=false면 masc_fusion 호출은 게이트에서
# Deny로 즉시 반환되고 모델을 호출하지 않는다.
#
# 패널/심판 모델 문자열은 위의 <provider>.<model> 런타임 id를 그대로 쓴다.
# 패널은 비어 있지 않은 typed model 집합이다. 심판은 패널 답변을 종합한다.
[fusion]
enabled = true
default_preset = "trio"
# - staged_judge_group_size: staged_judge_of_judges의 고정 reducer group 크기.
staged_judge_group_size = 3

# 패널 프리셋. 패널 답변은 free text다. 2026-07-01 사고(ollama.com cloud가 json_schema를
# 조용히 무시 → 패널 전멸) 이후 패널의 provider-native structured output 요구는 제거됐다
# (fusion_panel.ml). 따라서 패널 런타임은 supports-structured-output 선언이 필요 없다 —
# structured output 요구는 아래 judge에만 남는다.
# 프롬프트는 행동을 정의하므로 코드 default가 아니라 여기서 받는다 (누락 시 로드
# 단계에서 fail-fast). 튜닝은 재컴파일 없이 이 값만 바꾸면 된다.
[fusion.presets.trio]
panel = [
  "ollama_cloud.ollama-cloud-devstral-2-123b",
  "ollama_cloud.ollama-cloud-devstral-small-2-24b",
  "ollama_cloud.ollama-cloud-ministral-3-14b",
]
# Fusion judges request provider-native structured output. Keep this on a
# runtime whose model resolves through the OAS catalog with native schema support.
judge = "ollama_cloud.ollama-cloud-devstral-2-123b"
panel_system_prompt = """
You are an expert panelist. Answer the user's question directly and concisely \
with your best independent analysis. Do not defer to other models; give your \
own view.
"""
judge_system_prompt = """
You are an impartial judge. You are given a panel of model answers to the same \
question. Synthesize them: identify points of consensus, contradictions, \
partial coverage, unique insights, and blind spots, then give one resolved \
answer. Respond with ONLY the requested JSON object, no prose and no code fences.
"""
# 구조적 타임아웃(초). 미지정 시 Fusion_policy.default_timeout_s.
panel_timeout_s = 300.0
judge_timeout_s = 300.0
# 패널/심판에 MASC web_search/web_fetch 도구를 주입할지 여부.
web_tools = false

# ── JoJ-capable preset (RFC-0283 judge-of-judges) ───────────────────────────
# masc_fusion topology="judge_of_judges"는 preset에 1차 심판 >= 2명을 요구한다
# (fusion_orchestrator.run_judge_of_judges). trio는 단일 judge라 JoJ 호출이 항상
# "requires >= 2 judges"로 fail-closed된다 → 키퍼가 JoJ topology를 쓸 수 없었다.
# quorum은 서로 다른 렌즈(evidence/coverage)의 1차 심판 2명을 두고, meta judge(judge=)가
# 두 종합을 재조정한다. 키퍼 사용: masc_fusion preset="quorum" topology="judge_of_judges".
# Panel models and Fusion judge/refine/meta paths request provider-native
# structured output, so every panel and judge runtime below must declare
# supports-structured-output=true. Distinct labels preserve lens identity while
# the schema contract prevents config drift back to JSON-mode-only runtimes.
# staged_judge_of_judges는 [fusion].staged_judge_group_size(=3)의 정확한 배수
# 그룹을 요구하므로 quorum(2 judges)은 비대상 — 별도 preset 필요.
[fusion.presets.quorum]
panel = [
  "ollama_cloud.ollama-cloud-devstral-2-123b",
  "ollama_cloud.ollama-cloud-devstral-small-2-24b",
  "ollama_cloud.ollama-cloud-ministral-3-14b",
]
panel_system_prompt = """
You are an expert panelist. Answer the user's question directly and concisely \
with your best independent analysis. Do not defer to other models; give your \
own view.
"""
# meta judge: 1차 심판들의 종합을 재조정하는 최종 reducer (RFC-0283).
judge = "ollama_cloud.ollama-cloud-ministral-3-14b"
judge_system_prompt = """
You are the meta-judge. You are given several independent judge syntheses of the \
same panel of model answers, each produced through a different evaluative lens. \
Reconcile them: where the judges agree, state the consensus; where they diverge, \
adjudicate with reasons; surface any blind spot that a single lens missed. Produce \
one resolved answer. Respond with ONLY the requested JSON object, no prose and no code fences.
"""
panel_timeout_s = 300.0
judge_timeout_s = 300.0
# meta/stage-meta reducer 구조적 타임아웃. 미지정 시 judge_timeout_s와 동일.
meta_timeout_s = 300.0
web_tools = false

# 1차 심판 — 서로 다른 렌즈로 패널을 독립 종합한다 (JoJ requires >= 2; RFC-0283).
# label이 정체성을 주므로 distinct lens는 distinct identity가 된다 (Duplicate_judge 회피).
# Strict structured-output support is mandatory for panel and judge runtimes in
# this seed. Some model families overlap across panel and judge lanes because the
# checked-in schema-capable runtime set is intentionally narrow; distinct labels
# still preserve lens identity for judge-of-judges routing.
[[fusion.presets.quorum.judges]]
model = "ollama_cloud.ollama-cloud-devstral-2-123b"
label = "evidence"
system_prompt = """
You are an impartial first-pass judge. Synthesize the panel of model answers \
through an EVIDENCE lens: weigh each claim by how well it is supported, flag \
unsupported assertions, and prefer conclusions grounded in verifiable reasoning. \
Respond with ONLY the requested JSON object, no prose and no code fences.
"""
timeout_s = 300.0

[[fusion.presets.quorum.judges]]
model = "ollama_cloud.ollama-cloud-devstral-small-2-24b"
label = "coverage"
system_prompt = """
You are an impartial first-pass judge. Synthesize the panel of model answers \
through a COVERAGE lens: map what each answer addresses and omits, surface blind \
spots and unique insights, and prefer the most complete resolution. \
Respond with ONLY the requested JSON object, no prose and no code fences.
"""
timeout_s = 300.0

# ── Staged-JoJ-capable preset (RFC-0283 staged_judge_of_judges) ──────────────
# staged_judge_of_judges는 judge 수가 [fusion].staged_judge_group_size(=3)의
# 정확한 배수이면서 group_size*2(=6) 이상이어야 한다 (fusion_policy.staged_judge_groups).
# 지금까지 충족 preset이 0이라 topology가 도구 스키마에 노출되고도 모든 호출이
# config 에러로 fail-closed되는 죽은 옵션이었다. council은 6개 lens 심판을
# 3개씩 2 stage로 나눈다: stage 1 = evidence/coverage/risk, stage 2 =
# feasibility/simplicity/adversarial. 각 stage meta가 그룹 종합을 만들고 최종
# meta judge(judge=)가 stage 종합들을 재조정한다. label이 정체성을 주므로
# 같은 모델이 다른 lens로 반복 등장해도 Duplicate_judge가 아니다 (quorum 주석과
# 동일 계약). judge/meta 경로는 provider-native structured output을 요구하므로
# 심판 런타임은 전부 supports-structured-output=true 선언 모델만 쓴다.
# 비용/지연: LLM 호출 12회(panel 3 + 1차 심판 6 + stage meta 2 + 최종 meta 1).
# 실행은 4단 순차 파이프라인(panel → 1차 심판 병렬 → stage meta 병렬 → 최종
# meta, fusion_orchestrator run_staged_judge_of_judges)이라 각 단의
# timeout(300s)이 누적된다 — 동시성 캡이 각 단을 한 웨이브로 소화할 때 최악
# ~20분. 빠른 종합이 필요하면 단이 짧은 quorum/judge_of_judges 계열을 쓴다.
# 키퍼 사용: masc_fusion preset="council" topology="staged_judge_of_judges"
# (judge_of_judges topology도 동일 preset으로 사용 가능 — 6 lens 병렬 후 meta).
[fusion.presets.council]
panel = [
  "ollama_cloud.ollama-cloud-devstral-2-123b",
  "ollama_cloud.ollama-cloud-devstral-small-2-24b",
  "ollama_cloud.ollama-cloud-ministral-3-14b",
]
panel_system_prompt = """
You are an expert panelist. Answer the user's question directly and concisely \
with your best independent analysis. Do not defer to other models; give your \
own view.
"""
judge = "ollama_cloud.ollama-cloud-ministral-3-14b"
judge_system_prompt = """
You are the meta-judge. You are given stage syntheses, each produced by a group \
of judges evaluating the same panel of model answers through different lenses. \
Reconcile them: where the stages agree, state the consensus; where they diverge, \
adjudicate with reasons; surface any blind spot that a single stage missed. \
Produce one resolved answer. Respond with ONLY the requested JSON object, no \
prose and no code fences.
"""
panel_timeout_s = 300.0
judge_timeout_s = 300.0
meta_timeout_s = 300.0
web_tools = false

[[fusion.presets.council.judges]]
model = "ollama_cloud.ollama-cloud-devstral-2-123b"
label = "evidence"
system_prompt = """
You are an impartial first-pass judge. Synthesize the panel of model answers \
through an EVIDENCE lens: weigh each claim by how well it is supported, flag \
unsupported assertions, and prefer conclusions grounded in verifiable reasoning. \
Respond with ONLY the requested JSON object, no prose and no code fences.
"""
timeout_s = 300.0

[[fusion.presets.council.judges]]
model = "ollama_cloud.ollama-cloud-devstral-small-2-24b"
label = "coverage"
system_prompt = """
You are an impartial first-pass judge. Synthesize the panel of model answers \
through a COVERAGE lens: map what each answer addresses and omits, surface blind \
spots and unique insights, and prefer the most complete resolution. \
Respond with ONLY the requested JSON object, no prose and no code fences.
"""
timeout_s = 300.0

[[fusion.presets.council.judges]]
model = "ollama_cloud.ollama-cloud-ministral-3-14b"
label = "risk"
system_prompt = """
You are an impartial first-pass judge. Synthesize the panel of model answers \
through a RISK lens: identify failure modes, hidden assumptions, and worst-case \
consequences each answer implies, and prefer the resolution that degrades most \
gracefully. Respond with ONLY the requested JSON object, no prose and no code fences.
"""
timeout_s = 300.0

[[fusion.presets.council.judges]]
model = "ollama_cloud.ollama-cloud-devstral-2-123b"
label = "feasibility"
system_prompt = """
You are an impartial first-pass judge. Synthesize the panel of model answers \
through a FEASIBILITY lens: judge how implementable each proposal is with the \
stated constraints and resources, and prefer the most actionable resolution. \
Respond with ONLY the requested JSON object, no prose and no code fences.
"""
timeout_s = 300.0

[[fusion.presets.council.judges]]
model = "ollama_cloud.ollama-cloud-devstral-small-2-24b"
label = "simplicity"
system_prompt = """
You are an impartial first-pass judge. Synthesize the panel of model answers \
through a SIMPLICITY lens: prefer the resolution with the fewest moving parts \
that still answers the question fully, and flag accidental complexity. \
Respond with ONLY the requested JSON object, no prose and no code fences.
"""
timeout_s = 300.0

[[fusion.presets.council.judges]]
model = "ollama_cloud.ollama-cloud-ministral-3-14b"
label = "adversarial"
system_prompt = """
You are an impartial first-pass judge. Synthesize the panel of model answers \
through an ADVERSARIAL lens: actively try to refute each answer's key claims, \
keep only what survives refutation, and prefer the most defensible resolution. \
Respond with ONLY the requested JSON object, no prose and no code fences.
"""
timeout_s = 300.0
