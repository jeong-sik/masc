# LEGACY / RETIRED CONFIGURATION
# This file (tool_policy.toml) is kept only as a config-root marker.
# Its contents are NOT read at boot or runtime because tool access is now
# fully registry/descriptor-driven. See README.md and docs/TOML-RELOAD-MATRIX.md.
#
# Tool Policy Configuration (LEGACY)
# Defines named tool groups for keeper tool_access lists.
# Each group is a named list of tool names.
#
# Groups with `shard = "..."` resolve tool names from Tool_shard at runtime.
# MASC groups are filtered at runtime: only tools
# that were injected by inject_masc_schemas at startup are included.
#
# To add a reusable tool bundle, add it to a group and reference the tool names
# from keeper tool_access lists.

# ── Tool Groups ─────────────────────────────────────────────────────

[groups.base]
tools = ["keeper_time_now", "keeper_context_status", "keeper_memory_search", "keeper_memory_write", "keeper_tool_search", "keeper_tools_list"]

# Board tools split: core (frequent) vs extended (discoverable via tool_search).
[groups.board_core]
tools = ["keeper_board_get", "keeper_board_post", "keeper_board_comment", "keeper_board_vote", "keeper_board_list", "keeper_board_curation_read", "keeper_board_curation_submit"]

[groups.board_extended]
tools = ["keeper_board_stats", "keeper_board_search"]

# Workspace split: core (task lifecycle) vs extended (audit, force ops).
[groups.workspace_core]
tools = [
  "keeper_tasks_list",
  "keeper_task_claim",
  "keeper_task_create",
  "keeper_task_done",
  "keeper_broadcast",
]

[groups.workspace]
tools = [
  "keeper_tasks_list",
  "keeper_tasks_audit",
  "keeper_task_claim",
  "keeper_task_done",
  "keeper_task_create",
  "keeper_broadcast",
]

[groups.search_files]
tools = ["tool_search_files"]

[groups.execute]
# Execute/tool_execute: typed command execution with 3-layer deterministic guard
#   (validate_command → destructive_guard → write_gate).
tools = ["tool_execute"]

[groups.filesystem]
tools = ["tool_read_file"]

[groups.workspace_write]
tools = ["tool_edit_file", "tool_write_file"]

[groups.library]
tools = ["keeper_library_search", "keeper_library_read"]

# Tools allowed on the keeper's last turn (safety constraint).
# On last turn, allowed tools are intersected with this set.
[groups.last_turn_safe]
tools = [
  "keeper_board_post",
  "keeper_board_comment",
  "keeper_board_curation_submit",
  "keeper_context_status",
  "keeper_time_now",
  "keeper_tool_search",
  "keeper_broadcast",
  "keeper_tasks_list",
  "keeper_task_done",
  "masc_tasks",
  "masc_transition",
  "tool_read_file",
  "tool_search_files",
  "tool_execute",
  "masc_web_search",
  "masc_web_fetch",
]

# Optional tools that require explicit opt-in through a keeper tool_access list.
# Excluded from all built-in groups by default.
[groups.voice]
# Voice session management + TTS/mic via ElevenLabs or local backend.
tools = [
  "keeper_voice_speak",
  "keeper_voice_listen",
  "keeper_voice_agent",
  "keeper_voice_sessions",
  "keeper_voice_session_start",
  "keeper_voice_session_end",
]

# ── MASC Tool Groups ───────────────────────────────────────────────

# Essential: tools every keeper needs (orientation + web search).
[masc.essential]
tools = ["masc_status", "masc_web_search", "masc_web_fetch"]

# Workspace: external agent workspace tools.
# Only needed by keepers that manage tasks across agents.
[masc.workspace]
tools = [
  "masc_tasks", "masc_claim_next", "masc_transition", "masc_add_task",
  "masc_batch_add_tasks", "masc_agents", "masc_dashboard",
  "masc_keeper_waiting_inventory",
  "masc_agent_card", "masc_tool_help",
  "masc_task_history", "masc_plan_get", "masc_plan_get_task",
  "masc_heartbeat",
  "masc_messages", "masc_broadcast",
]

[masc.dispatch]
tools = [
  "masc_tasks",
  "masc_add_task",
  "masc_agents",
  "masc_dashboard",
  "masc_keeper_waiting_inventory",
  "masc_agent_card",
  "masc_tool_help",
]

# Goal lifecycle: Goal Store + FSM proof surface.
[masc.goal]
tools = [
  "masc_goal_list",
  "masc_goal_upsert",
  "masc_goal_transition",
  "masc_goal_verify",
]
