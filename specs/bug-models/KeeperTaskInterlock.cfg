\* Clean model: keepers drain held tasks before transitioning to Dead.
\* Expected: no invariant violation.
\* State space bound: 2 keepers x 2 tasks keeps TLC under ~10k states.
SPECIFICATION Spec
CONSTANTS
  K = {k1, k2}
  T = {t1, t2}
INVARIANT TypeOK
INVARIANT NoDeadKeeperHoldsTask
INVARIANT ClaimerNotDead
CHECK_DEADLOCK FALSE
