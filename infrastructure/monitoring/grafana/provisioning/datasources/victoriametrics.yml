apiVersion: 1

datasources:
  - name: VictoriaMetrics
    type: prometheus
    access: proxy
    url: http://victoriametrics:8428
    isDefault: false
    editable: false
    jsonData:
      httpMethod: POST
      prometheusType: VictoriaMetrics
      manageAlerts: false
      cacheLevel: 'High'
      incrementalQuerying: true
