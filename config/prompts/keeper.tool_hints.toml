# Keeper tool guidance hints.
# Loaded by lib/keeper/keeper_tool_guidance.ml via otoml on first use (lazy).
# Order is significant — render_preferred_tools preserves it.
# Substitution: {{web_fetch_timeout}} -> Tool_misc_web_fetch.default_timeout_sec at load time.

[[hints]]
name = "keeper_task_claim"
call = "`keeper_task_claim` {}"
description = "reserve the next eligible task"

[[hints]]
name = "keeper_tasks_list"
call = "`keeper_tasks_list` {}"
description = "inspect eligible task context"

[[hints]]
name = "keeper_task_create"
call = "`keeper_task_create` { title: \"actionable title\", description: \"acceptance criteria\" }"
description = "create a new backlog task with keeper-native evidence"

[[hints]]
name = "keeper_board_get"
call = "`keeper_board_get` { id: \"POST_ID\" }"
description = "read a board post before replying"

[[hints]]
name = "keeper_board_comment"
call = "`keeper_board_comment` { post_id: \"POST_ID\", content: \"reply\" }"
description = "reply to a board post"

[[hints]]
name = "keeper_board_post"
call = "`keeper_board_post` { content: \"note\" }"
description = "coordinate via board"

[[hints]]
name = "keeper_broadcast"
call = "`keeper_broadcast` { message: \"note\" }"
description = "share broadly in the namespace"

[[hints]]
name = "ReadFile"
call = "`ReadFile` { file_path: \"path/to/file\" }"
description = "read one file before editing or reporting"

[[hints]]
name = "EditFile"
call = "`EditFile` { file_path: \"path/to/file\", old_string: \"...\", new_string: \"...\" }"
description = "patch an existing file inside the keeper workspace"

[[hints]]
name = "WriteFile"
call = "`WriteFile` { file_path: \"path/to/file\", content: \"full file content\" }"
description = "create or overwrite a file inside the keeper workspace"

[[hints]]
name = "SearchFiles"
call = "`SearchFiles` { pattern: \"regex\", path: \"repos/REPO/lib\", glob: \"*.ml\" }"
description = "search files without Execute pipes, redirects, grep/head chains, or repo-wide scans"

[[hints]]
name = "Execute"
call = "`Execute` { executable: \"git\", argv: [\"status\", \"--short\"], cwd: \"repos/REPO\" }"
description = "run one typed argv command; set cwd for git/gh, never type keeper_* names as commands, and use the pipeline field instead of shell syntax"

[[hints]]
name = "SearchWeb"
call = "`SearchWeb` { query: \"current-info query\", limit: 5 }"
description = "look up current public context before time-sensitive claims"

[[hints]]
name = "FetchWeb"
call = "`FetchWeb` { url: \"https://example.com/page\", timeout: {{web_fetch_timeout}} }"
description = "fetch and read a web page before citing it"

[[hints]]
name = "keeper_task_submit_for_verification"
call = "`keeper_task_submit_for_verification` { notes: \"evidence\", pr_url: \"https://github.com/OWNER/REPO/pull/NUMBER\" }"
description = "submit PR/code work for verification"

[[hints]]
name = "masc_transition"
call = "`masc_transition` { task_id: \"TASK_ID\", action: \"approve\", notes: \"verification evidence\" }"
description = "approve or reject an awaiting_verification task after inspecting evidence"

[[hints]]
name = "keeper_task_done"
call = "`keeper_task_done` { notes: \"evidence\" }"
description = "close non-PR task work with evidence"

[[hints]]
name = "keeper_stay_silent"
call = "`keeper_stay_silent` {}"
description = "nothing genuinely actionable fits your role"
