# Tool Policy Configuration
#
# Defines tool groups and presets declaratively.
# Presets are composed from groups. Each group is a named list of tool names.
#
# Groups with `shard = "..."` resolve tool names from Tool_shard at runtime.
# MASC groups are filtered via masc_filter in preset_allowlist: only tools
# that were injected by inject_masc_schemas at startup are included.
#
# To add a tool to a preset: add it to a group, then reference that group
# in the preset's `groups` list.

# ── Tool Groups ─────────────────────────────────────────────────────

[groups.base]
tools = ["keeper_time_now", "keeper_context_status", "keeper_memory_search", "keeper_tool_search"]

# Board tools split: core (frequent) vs extended (discoverable via tool_search).
[groups.board_core]
tools = ["keeper_board_get", "keeper_board_post", "keeper_board_comment", "keeper_board_vote", "keeper_board_list", "keeper_board_curation_read", "keeper_board_curation_submit"]

[groups.board_extended]
tools = ["keeper_board_stats", "keeper_board_search"]

# Full board group: backward compat alias.
[groups.board]
tools = ["keeper_board_get", "keeper_board_post", "keeper_board_comment", "keeper_board_vote", "keeper_board_list", "keeper_board_curation_read", "keeper_board_curation_submit", "keeper_board_stats", "keeper_board_search"]

# Coordination split: core (task lifecycle) vs extended (audit, force ops).
[groups.coordination_core]
tools = ["keeper_tasks_list", "keeper_task_claim", "keeper_task_done", "keeper_broadcast"]

[groups.coordination]
tools = ["keeper_tasks_list", "keeper_tasks_audit", "keeper_task_claim", "keeper_task_done", "keeper_broadcast"]

[groups.shell]
# keeper_bash: full bash with 3-layer deterministic guard
#   (validate_command → destructive_guard → write_gate).
#   Non-coding presets get read-only mode (write_enabled=false).
tools = ["keeper_shell", "keeper_bash"]

[groups.filesystem]
tools = ["keeper_fs_read"]

[groups.filesystem_write]
tools = ["keeper_fs_edit"]

[groups.library]
tools = ["keeper_library_search", "keeper_library_read"]

[groups.github]
# Dedicated PR helpers run keeper-scoped credential preflight before gh.
# keeper_pr_create is draft-only; ready/merge flows remain gated elsewhere.
tools = ["keeper_preflight_check", "keeper_pr_list", "keeper_pr_status", "keeper_pr_create"]

[groups.github_review]
tools = ["keeper_pr_review_read", "keeper_pr_review_comment", "keeper_pr_review_reply"]

# Shard-backed groups: tool names resolved from Tool_shard at runtime.
[groups.coding_shard]
shard = "coding"

[groups.autoresearch]
shard = "autoresearch"

# Code-write tools (masc_code_write, masc_code_edit, etc.)
[groups.coding]
tools = ["masc_code_write", "masc_code_edit", "masc_code_delete", "masc_code_shell", "masc_code_git"]

# Tools allowed on the keeper's last turn (safety constraint).
# On last turn, visible tools are intersected with this set.
[groups.last_turn_safe]
tools = ["keeper_board_post", "keeper_board_comment", "keeper_board_curation_submit", "keeper_context_status", "extend_turns", "keeper_time_now", "keeper_tool_search", "keeper_broadcast", "keeper_task_done", "masc_web_search"]

# Optional tools that require explicit opt-in via also_allow.
# Excluded from all presets by default; a keeper must list them in also_allow.
[groups.voice]
# Voice session management + TTS/mic via ElevenLabs or local backend.
tools = [
  "keeper_voice_speak",
  "keeper_voice_listen",
  "keeper_voice_agent",
  "keeper_voice_sessions",
  "keeper_voice_session_start",
  "keeper_voice_session_end",
]

[groups.optional]
tools = ["keeper_board_delete", "keeper_board_cleanup"]

# ── MASC Tool Groups ───────────────────────────────────────────────

# Essential: tools every keeper needs (orientation + web search).
[masc.essential]
tools = ["masc_status", "masc_web_search"]

# Coordination: external agent coordination tools.
# Only needed by keepers that manage tasks across agents.
[masc.coordination]
tools = [
  "masc_tasks", "masc_claim_next", "masc_transition", "masc_add_task",
  "masc_batch_add_tasks", "masc_agents", "masc_dashboard",
  "masc_agent_card", "masc_tool_help",
  "masc_join", "masc_leave", "masc_who", "masc_heartbeat",
  "masc_messages", "masc_broadcast",
]

# Full core: backward compat alias (essential + coordination).
[masc.core]
tools = [
  "masc_status", "masc_tasks", "masc_claim_next", "masc_transition",
  "masc_add_task", "masc_batch_add_tasks", "masc_agents", "masc_dashboard",
  "masc_agent_card", "masc_tool_help", "masc_web_search",
  "masc_join", "masc_leave", "masc_who", "masc_heartbeat",
  "masc_messages", "masc_broadcast",
]

[masc.dispatch]
tools = [
  "masc_tasks",
  "masc_add_task",
  "masc_agents",
  "masc_dashboard",
  "masc_agent_card",
  "masc_tool_help",
  "masc_keeper_msg",
  "masc_keeper_msg_result",
  "masc_keeper_list",
  "masc_keeper_status",
  "masc_goal_list",
  "masc_goal_upsert",
  "masc_goal_review",
  "masc_goal_transition",
  "masc_goal_verify",
]

[masc.code_observe]
tools = ["masc_code_search", "masc_code_symbols", "masc_code_read"]

[masc.coding]
tools = ["masc_code_search", "masc_code_symbols", "masc_code_read", "masc_worktree_create", "masc_worktree_remove", "masc_worktree_list"]

# ── GitHub Cache ───────────────────────────────────────────────────
# Pre-execution hallucination gate: validates PR/issue numbers
# against a cached list before executing gh CLI commands.
# See lib/keeper/keeper_exec_github.ml for implementation.

[gh_cache]
# Time-to-live for cached PR/issue number lists (seconds).
# 120s keeps entries fresh enough that newly-created PRs appear within
# ~2 minutes, while avoiding a subprocess per validation call.
cache_ttl_sec = 120
# Page size for the gh API REST call (pulls?per_page=N).
# Repos with >N open PRs will miss older numbers — those fall to
# Unknown (fail-open), which is safer than a hard rejection.
fetch_page_size = 100
# Subprocess timeout for the gh API fetch call (seconds).
fetch_timeout_sec = 10
# Maximum number of valid alternatives shown in rejection response.
max_alternatives = 20
# Maximum gh output size in bytes. Responses exceeding this are
# truncated to prevent context window overflow (65KB observed).
max_output_bytes = 8192

# ── Git Clone Policy ────────────────────────────────────────────────
# GitHub org names allowed for masc_code_git clone action.
# URLs not matching any org here are rejected.

[git_clone]
# Org allowlist for `masc_code_git clone`.  Empty list = skip check; the
# keeper may clone any repo reachable through the operator's gh credential
# (subject to denied_repos below).  This matches the operator intent that
# repo/org gating is a soft secondary control — the primary boundary is
# the gh credential surface itself plus denied_repos.  Earlier values
# (#9783: ["jeong-sik", "yousleepwhen"]) only listed the operator's two
# self-owned namespaces and blocked clones referenced from upstream
# workspace trees.
allowed_orgs = []
# Repos blocked even if org is allowed. Format: "org/repo" (lowercase).
denied_repos = ["jeong-sik/me"]
# Clone depth: 0 = full clone, N = shallow --depth N.
default_depth = 0
# Timeouts for git network operations (seconds).
clone_timeout_sec = 120
push_timeout_sec = 60
pr_create_timeout_sec = 30

# ── Keeper Identity ────────────────────────────────────────────────
# Git author/committer identity for keeper operations.
# {name} is replaced with the sanitized keeper name at runtime.

[keeper_identity]
author_pattern = "{name} (MASC Keeper)"
email_pattern = "{name}@masc.local"

# ── Presets ─────────────────────────────────────────────────────────

[presets.minimal]
groups = ["base"]
masc_groups = ["essential"]
masc_tools = ["masc_tool_help"]

# Social: persona keepers that live on the board + web search.
# ~15 tools. Optimal for 9B tool selection accuracy.
[presets.social]
groups = ["base", "board_core", "coordination_core", "filesystem", "voice"]
masc_groups = ["essential", "coordination"]

# Messaging: social + shell, library, github for broader interaction.
# ~25 tools.
[presets.messaging]
groups = ["base", "board_core", "coordination_core", "shell", "filesystem", "library", "voice"]
masc_groups = ["essential", "coordination"]

[presets.dispatch]
groups = ["base", "board_core", "filesystem", "library", "shell"]
masc_groups = ["essential", "dispatch", "code_observe", "coordination"]

[presets.coding]
groups = ["base", "board_core", "filesystem", "filesystem_write", "library", "shell", "coordination", "coding_shard", "coding", "github", "github_review"]
masc_groups = ["essential", "coding"]

# Step 9 (bloodflow restoration plan): the research preset is granted
# delivery-oriented capabilities so analyst/scholar/verifier-tier keepers
# can do real work -- git clone, PR view/diff, PR create -- instead
# of only sharing opinions on the board.  Filesystem writes and code edits
# still flow through the risk-tiered approval gate in
# [keeper_routine_allowlist.ml].
[presets.research]
groups = ["base", "filesystem", "filesystem_write", "library", "shell", "coordination", "board_core", "autoresearch", "coding_shard", "coding", "github", "github_review"]
masc_groups = ["essential", "coordination", "coding"]

# Delivery preset: research + coding for keepers that need to produce code changes.
# Use for keepers whose goal involves PRs, issues, or code fixes.
[presets.delivery]
groups = ["base", "filesystem", "filesystem_write", "library", "shell", "coordination", "board_core", "autoresearch", "coding_shard", "coding", "github", "github_review", "voice"]
masc_groups = ["essential", "coordination", "coding"]

[presets.full]
all_candidates = true
