\* RFC-0313 keeper pacing — bug model (failure-driven pause)
\* Buggy: NoFailureDrivenExistenceChange MUST be violated.
\*
\* BuggyFailureSetsPaused models keeper_unified_turn_failure.ml's streak
\* auto-pause arms: a turn failure flips the paused existence axis. If
\* this cfg passes, the invariant is too weak and must be strengthened.

SPECIFICATION SpecBuggy

CONSTANTS
    Runtimes = {r1, r2}
    MaxTime = 4
    MaxBackoff = 2

INVARIANTS
    NoFailureDrivenExistenceChange

CHECK_DEADLOCK
    FALSE
