\* RFC-0313 keeper pacing — bug model (terminal pacing)
\* Buggy: PacingBounded MUST be violated.
\*
\* BuggyUnboundedBackoff models restart-budget DEAD / wake tombstones:
\* a failure pushes a runtime's revisit deadline past the cap — a
\* de-facto terminal state expressed as pacing. If this cfg passes, the
\* invariant is too weak and must be strengthened.

SPECIFICATION SpecBuggyUnbounded

CONSTANTS
    Runtimes = {r1, r2}
    MaxTime = 4
    MaxBackoff = 2

INVARIANTS
    PacingBounded

CHECK_DEADLOCK
    FALSE
