name: Setup OCaml Dependencies
description: Shared OCaml bootstrap — compiler, external pins, system packages, opam install.

inputs:
  pin-flags:
    description: Extra flags for opam-pin-external-deps.sh (e.g. --with-bisect)
    required: false
    default: ''
  install-flags:
    description: Extra flags for opam install (e.g. --with-test, --with-doc)
    required: false
    default: ''
  os-packages:
    description: Space-separated list of additional apt packages
    required: false
    default: ''

runs:
  using: composite
  steps:
    - name: Setup OCaml
      uses: ocaml/setup-ocaml@v3
      with:
        ocaml-compiler: 5.4.1
        dune-cache: true
        cache-prefix: oas-otel-02

    - name: Pin external dependencies
      shell: bash
      run: |
        chmod +x scripts/opam-pin-external-deps.sh
        scripts/opam-pin-external-deps.sh ${{ inputs.pin-flags }}

    - name: Refresh system package index
      shell: bash
      run: sudo apt-get update -qq

    - name: Install OS dependencies
      if: inputs.os-packages != ''
      shell: bash
      run: sudo apt-get install -y ${{ inputs.os-packages }}

    - name: Install OCaml dependencies
      shell: bash
      run: |
        for attempt in 1 2 3; do
          opam install . --deps-only ${{ inputs.install-flags }} --yes && break
          if [ "$attempt" -eq 3 ]; then
            echo "opam install failed after ${attempt} attempts"
            exit 1
          fi
          echo "opam install failed (attempt ${attempt}); retrying in 15s..."
          sleep 15
        done
