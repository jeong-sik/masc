name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14  # Apple Silicon
            arch: macos-arm64
            may-fail: true   # upstream opam macOS arm64 binary missing (#7475)
          - os: ubuntu-latest
            arch: linux-x64
            may-fail: false

    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.may-fail }}
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v7

      - name: Check version truth
        run: |
          chmod +x scripts/check-version-truth.sh
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            scripts/check-version-truth.sh --tag "${GITHUB_REF_NAME}"
          else
            scripts/check-version-truth.sh
          fi

      - name: Setup OCaml
        uses: ./.github/actions/setup-ocaml-toolchain

      - name: Pin private dependencies
        run: |
          chmod +x scripts/opam-pin-external-deps.sh
          scripts/opam-pin-external-deps.sh --with-compact-protocol


      - name: Install native dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install libpq openssl@3

          libpq_prefix="$(brew --prefix libpq)"
          openssl_prefix="$(brew --prefix openssl@3)"

          {
            echo "$libpq_prefix/bin"
            echo "$openssl_prefix/bin"
          } >> "$GITHUB_PATH"

          {
            echo "PKG_CONFIG_PATH=$openssl_prefix/lib/pkgconfig:$libpq_prefix/lib/pkgconfig:${PKG_CONFIG_PATH:-}"
            echo "CPATH=$openssl_prefix/include:${CPATH:-}"
            echo "LIBRARY_PATH=$openssl_prefix/lib:${LIBRARY_PATH:-}"
            echo "CPPFLAGS=-I$openssl_prefix/include ${CPPFLAGS:-}"
            echo "LDFLAGS=-L$openssl_prefix/lib ${LDFLAGS:-}"
          } >> "$GITHUB_ENV"

      - name: Refresh apt index
        if: runner.os == 'Linux'
        run: bash scripts/ci/apt-refresh.sh

      - name: Install dependencies
        run: |
          for attempt in 1 2 3; do
            opam install . --deps-only -y && break
            if [ "$attempt" -eq 3 ]; then
              echo "opam install failed after ${attempt} attempts"
              exit 1
            fi
            echo "opam install failed (attempt ${attempt}); retrying in 15s..."
            sleep 15
          done

      - name: Build
        run: opam exec -- dune build --release bin/main_eio.exe

      - name: Release binary smoke (boot + README drift)
        run: |
          chmod +x scripts/release-binary-smoke.sh
          scripts/release-binary-smoke.sh _build/default/bin/main_eio.exe

      - name: Generate release evidence bundle
        run: |
          chmod +x scripts/release-evidence.sh
          mkdir -p dist
          scripts/release-evidence.sh \
            _build/default/bin/main_eio.exe \
            dist/release-evidence-${{ matrix.arch }}.md

      - name: Package binary
        run: |
          mkdir -p dist
          cp _build/default/bin/main_eio.exe dist/masc-${{ matrix.arch }}
          chmod +x dist/masc-${{ matrix.arch }}

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: masc-${{ matrix.arch }}
          path: dist/*

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    timeout-minutes: 15

    steps:
      - name: Checkout repo for config seed hashes
        uses: actions/checkout@v7

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Verify advertised release assets
        run: |
          for asset in masc-macos-arm64 masc-linux-x64; do
            if [ ! -f "dist/$asset" ]; then
              echo "required release asset missing: $asset"
              exit 1
            fi
          done

      - name: Generate release checksums
        run: |
          cd dist
          artifact_count="$(find . -maxdepth 1 -type f ! -name SHA256SUMS | wc -l | tr -d ' ')"
          if [ "$artifact_count" -eq 0 ]; then
            echo "no release artifacts found in dist"
            exit 1
          fi
          find . -maxdepth 1 -type f ! -name SHA256SUMS -printf '%P\0' \
            | sort -z \
            | xargs -0 sha256sum > SHA256SUMS
          (cd ../config && sha256sum tool_policy.toml runtime.toml) >> SHA256SUMS
          (cd .. && sha256sum oas-models.toml) >> SHA256SUMS
          cat SHA256SUMS

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*
          generate_release_notes: true
