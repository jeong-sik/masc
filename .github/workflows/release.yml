name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-14  # Apple Silicon
            arch: macos-arm64
          - os: ubuntu-latest
            arch: linux-x64

    runs-on: ${{ matrix.os }}
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Setup OCaml
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: 5.4.x

      - name: Pin private dependencies
        run: |
          opam pin add compact-protocol https://github.com/jeong-sik/compact-protocol.git#main -n -y
          opam pin add mcp_protocol https://github.com/jeong-sik/mcp-protocol-sdk.git#main -n -y
          opam pin add ocaml-webrtc https://github.com/jeong-sik/ocaml-webrtc.git#main -n -y
          opam pin add grpc-direct-core https://github.com/jeong-sik/grpc-direct.git#main -n -y
          opam pin add grpc-direct https://github.com/jeong-sik/grpc-direct.git#main -n -y
          opam pin add neo4j_packstream https://github.com/jeong-sik/ocaml-neo4j-bolt.git#main -n -y
          opam pin add neo4j_bolt https://github.com/jeong-sik/ocaml-neo4j-bolt.git#main -n -y
          opam pin add neo4j_bolt_eio https://github.com/jeong-sik/ocaml-neo4j-bolt.git#main -n -y

      - name: Install libpq (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install libpq
          echo "$(brew --prefix libpq)/bin" >> "$GITHUB_PATH"
          echo "PKG_CONFIG_PATH=$(brew --prefix libpq)/lib/pkgconfig" >> "$GITHUB_ENV"

      - name: Refresh apt index
        if: runner.os == 'Linux'
        run: sudo apt-get update -qq

      - name: Install dependencies
        run: |
          for attempt in 1 2 3; do
            opam install . --deps-only -y && break
            if [ "$attempt" -eq 3 ]; then
              echo "opam install failed after ${attempt} attempts"
              exit 1
            fi
            echo "opam install failed (attempt ${attempt}); retrying in 15s..."
            sleep 15
          done

      - name: Build
        run: opam exec -- dune build --release bin/main_eio.exe

      - name: Package binary
        run: |
          mkdir -p dist
          cp _build/default/bin/main_eio.exe dist/masc-mcp-${{ matrix.arch }}
          chmod +x dist/masc-mcp-${{ matrix.arch }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: masc-mcp-${{ matrix.arch }}
          path: dist/masc-mcp-${{ matrix.arch }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    timeout-minutes: 15

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
