name: Bug report
description: Report a broken behavior, regression, or incorrect result.
title: "[Bug] "
labels:
  - "type:bug"
body:
  - type: markdown
    attributes:
      value: |
        Human reporters, Codex, and internal agents may all file this form.
        Use this for broken or incorrect behavior.
        Choose one planning area and one target lane below.
        Automation mirrors those choices into labels and keeps `triage-required`
        on the issue until it has exactly one `type:*`, one `area:*`, and one `target:*` label.
  - type: dropdown
    id: area
    attributes:
      label: Product area
      options:
        - Repo coordination
        - Team session delivery
        - Dashboard and read models
        - Operator and intervention
        - Transport, auth, and health
        - Config and installation
        - CI and release automation
        - Docs and onboarding
        - Experimental surfaces
    validations:
      required: true
  - type: dropdown
    id: target
    attributes:
      label: Target lane
      description: Use `now` for current product-promise blockers.
      options:
        - now
        - next
        - later
    validations:
      required: true
  - type: dropdown
    id: promise
    attributes:
      label: Promise affected
      options:
        - repo coordination
        - delivery swarm
        - ops visibility
        - experimental or internal
    validations:
      required: true
  - type: checkboxes
    id: product_gap
    attributes:
      label: Product gap
      options:
        - label: Code may already exist, but the product promise is still not trustworthy.
  - type: input
    id: version
    attributes:
      label: Observed version
      description: "Example: v0.2.0, main HEAD, local branch"
      placeholder: v0.2.0
    validations:
      required: true
  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - blocks release or data safety
        - major workflow broken
        - moderate incorrect behavior
        - minor but real bug
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run ...
        2. Open ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: Logs, screenshots, run IDs, failing command, or artifact path
      placeholder: Attach the smallest concrete proof you have.
    validations:
      required: false
  - type: textarea
    id: notes
    attributes:
      label: Scope notes
      description: Say whether this looks like a regression, one-off, or repeat issue.
    validations:
      required: false
