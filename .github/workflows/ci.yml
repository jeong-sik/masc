name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch: {}

permissions:
  contents: read
  actions: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  pr-sync-check:
    name: PR Sync Check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Verify PR sync
        env:
          PR_HEAD_REF: ${{ github.head_ref }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          chmod +x scripts/check-pr-sync.sh
          scripts/check-pr-sync.sh \
            --head-branch "$PR_HEAD_REF" \
            --pr-number "$PR_NUMBER" \
            --expected-head-sha "$PR_HEAD_SHA"

  release-train:
    name: Release Train
    runs-on: ubuntu-latest
    needs: [pr-sync-check]
    if: ${{ !cancelled() && (needs.pr-sync-check.result == 'success' || needs.pr-sync-check.result == 'skipped') }}
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Guard pending release tag on main PRs
        if: github.event_name == 'pull_request' && github.base_ref == 'main'
        env:
          BASE_REF: origin/${{ github.base_ref }}
          HEAD_REF: ${{ github.event.pull_request.head.sha }}
        run: |
          chmod +x scripts/check-release-train-guard.sh
          git fetch origin "${{ github.base_ref }}" --depth=100 --tags
          scripts/check-release-train-guard.sh \
            --base "$BASE_REF" \
            --head "$HEAD_REF"

      - name: Skip outside main PRs
        if: github.event_name != 'pull_request' || github.base_ref != 'main'
        run: echo "::notice::Release train guard only applies to PRs targeting main"

  health:
    name: Health
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [pr-sync-check, release-train]
    if: ${{ !cancelled() && (needs.pr-sync-check.result == 'success' || needs.pr-sync-check.result == 'skipped') && needs.release-train.result == 'success' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Verify OAS pin ratchet
        run: |
          chmod +x scripts/check-oas-pin.sh
          scripts/check-oas-pin.sh

      - name: Setup OCaml toolchain
        uses: ./.github/actions/setup-ocaml-toolchain

      - name: Pin external OCaml dependencies
        uses: ./.github/actions/pin-ocaml-deps
        with:
          pin-flags: --with-bisect

      - name: Install system and OCaml dependencies
        uses: ./.github/actions/install-ocaml-deps
        with:
          install-flags: --with-test
          os-packages: ripgrep bc

      - name: Check front-door doc truth
        run: |
          chmod +x scripts/check-doc-truth.sh scripts/check-version-truth.sh
          scripts/check-doc-truth.sh
          scripts/check-version-truth.sh

      - name: Fetch base branch for health ratchet
        if: github.event_name == 'pull_request'
        run: git fetch origin "${{ github.base_ref }}" --depth=1

      - name: Run health snapshot
        env:
          HEALTH_BASELINE_REF: ${{ github.event_name == 'pull_request' && format('origin/{0}', github.base_ref) || '' }}
        run: |
          chmod +x scripts/health_snapshot.sh scripts/anti-fake-audit.sh
          if [ -n "${HEALTH_BASELINE_REF}" ]; then
            opam exec -- bash scripts/health_snapshot.sh \
              --json-out .health/health-snapshot.json \
              --baseline-ref "${HEALTH_BASELINE_REF}" \
              --fail-on-lib-regression
          else
            opam exec -- bash scripts/health_snapshot.sh \
              --json-out .health/health-snapshot.json \
              --baseline-file .ci/health-baseline.json \
              --fail-on-lib-regression
          fi

      - name: Upload health snapshot
        uses: actions/upload-artifact@v7
        with:
          name: health-snapshot
          path: .health/health-snapshot.json

  pr-hygiene:
    name: PR Hygiene
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs: [pr-sync-check]
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Run PR hygiene guards
        env:
          BASE_REF: origin/${{ github.base_ref }}
          HEAD_REF: ${{ github.event.pull_request.head.sha }}
        run: |
          chmod +x scripts/check-pr-hygiene.sh
          git fetch origin "${{ github.base_ref }}" --depth=100
          scripts/check-pr-hygiene.sh \
            --base "$BASE_REF" \
            --head "$HEAD_REF" \
            --recent-main 50 \
            --duplicate-policy warn
  build:
    name: Build and Test
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: [pr-sync-check, release-train]
    if: ${{ !cancelled() && (needs.pr-sync-check.result == 'success' || needs.pr-sync-check.result == 'skipped') && needs.release-train.result == 'success' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup OCaml toolchain
        uses: ./.github/actions/setup-ocaml-toolchain

      - name: Pin external OCaml dependencies
        uses: ./.github/actions/pin-ocaml-deps
        with:
          pin-flags: --with-bisect

      - name: Install system and OCaml dependencies
        uses: ./.github/actions/install-ocaml-deps
        with:
          install-flags: --with-test
          os-packages: jq

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.22'
          # This workflow only uses Go to install grpcurl and does not
          # carry a repo go.mod/go.sum for module cache restoration.
          cache: false

      - name: Install grpcurl
        run: |
          GOBIN="$HOME/go/bin" go install github.com/fullstorydev/grpcurl/cmd/grpcurl@latest
          echo "$HOME/go/bin" >> "$GITHUB_PATH"

      - name: Build
        run: |
          opam exec -- dune build

      - name: Run tests (quick suite)
        env:
          ME_ROOT: /tmp/me
          ALCOTEST_QUICK_TESTS: "1"
          CI_TEST_TIMEOUT_SEC: 900
          CI_TEST_HEARTBEAT_SEC: 30
          MASC_LOCAL_RUNTIMES_JSON: '[{"base_url":"http://127.0.0.1:8085","max_concurrency":4}]'
          MASC_KEEPER_MSG_TIMEOUT_MAX_SEC: "10"
          MASC_E2E_TESTS: "true"
        run: |
          mkdir -p /tmp/me
          chmod +x scripts/ci-run-tests.sh
          scripts/ci-run-tests.sh "opam exec -- dune test"

      - name: Run SSE reconnect e2e
        env:
          ME_ROOT: /tmp/me
          CI_TEST_TIMEOUT_SEC: 900
          CI_TEST_HEARTBEAT_SEC: 15
        run: |
          mkdir -p /tmp/me
          chmod +x scripts/ci-run-tests.sh
          scripts/ci-run-tests.sh "opam exec -- dune exec ./test/test_sse_storm_e2e.exe"

      - name: Run transport harness suite
        env:
          ME_ROOT: /tmp/me
          CI_TEST_TIMEOUT_SEC: 900
          CI_TEST_HEARTBEAT_SEC: 15
        run: |
          mkdir -p /tmp/me
          chmod +x scripts/ci-run-tests.sh
          chmod +x scripts/harness/transport/run_all.sh
          chmod +x scripts/harness/transport/verify_sse.sh
          chmod +x scripts/harness/transport/verify_grpc_subscribe.sh
          chmod +x scripts/harness/transport/verify_h2c_autodetect.sh
          chmod +x scripts/harness/transport/verify_ws.sh
          chmod +x scripts/harness/transport/verify_webrtc_signaling.sh
          chmod +x scripts/harness/lib/server_bootstrap.sh
          scripts/ci-run-tests.sh "bash scripts/harness/transport/run_all.sh"

      - name: Check formatting
        run: |
          opam exec -- dune fmt 2>&1 || true
          # Note: dune fmt may not be available, skip if so

      - name: Run contract harness suite
        env:
          ME_ROOT: /tmp/me
          CI_TEST_TIMEOUT_SEC: 900
          CI_TEST_HEARTBEAT_SEC: 15
        run: |
          mkdir -p /tmp/me
          chmod +x scripts/ci-run-tests.sh
          chmod +x scripts/harness/contract/run_all.sh
          chmod +x scripts/harness/lib/server_bootstrap.sh
          scripts/ci-run-tests.sh "scripts/harness/contract/run_all.sh"

      - name: Verification matrix summary
        run: |
          echo "::notice::Required CI gates: dune test, test_sse_storm_e2e, transport harness, contract harness"
          echo "::notice::Optional env-gated suites not run here: PostgreSQL tests, live ICE/STUN/TURN/browser interop, viewer-local-e2e-check, swarm/team-session workload harnesses"

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [pr-sync-check]
    if: ${{ !cancelled() && (needs.pr-sync-check.result == 'success' || needs.pr-sync-check.result == 'skipped') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup OCaml toolchain
        uses: ./.github/actions/setup-ocaml-toolchain

      - name: Pin external OCaml dependencies
        uses: ./.github/actions/pin-ocaml-deps

      - name: Install system and OCaml dependencies
        uses: ./.github/actions/install-ocaml-deps
        with:
          os-packages: ripgrep

      - name: Check Eio conventions
        run: |
          chmod +x scripts/check-eio-conventions.sh
          scripts/check-eio-conventions.sh

      - name: Check feature flag consistency
        run: |
          chmod +x scripts/check-feature-flag-consistency.sh
          scripts/check-feature-flag-consistency.sh

      - name: Check TOML syntax
        run: |
          chmod +x scripts/check-toml-syntax.sh
          scripts/check-toml-syntax.sh

      - name: Check MASC/OAS boundary ratchet
        run: |
          chmod +x scripts/check-boundary-guard.sh
          scripts/check-boundary-guard.sh

      - name: Build with warnings as errors
        run: |
          opam exec -- dune build @install --force
        env:
          OCAMLPARAM: "_,warn-error=+a"

      - name: Check gRPC proto descriptor drift
        run: |
          sudo apt-get install -y -qq protobuf-compiler
          chmod +x scripts/gen-grpc-descriptors.sh
          scripts/gen-grpc-descriptors.sh --check

  dashboard:
    name: Dashboard
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [pr-sync-check]
    if: ${{ !cancelled() && (needs.pr-sync-check.result == 'success' || needs.pr-sync-check.result == 'skipped') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Enable corepack and install pnpm
        run: corepack enable && corepack prepare pnpm@10.31.0 --activate

      - name: Install dashboard dependencies
        working-directory: dashboard
        run: pnpm install --frozen-lockfile

      - name: TypeScript typecheck
        working-directory: dashboard
        run: pnpm run typecheck

      - name: Run dashboard tests
        working-directory: dashboard
        run: pnpm test

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup OCaml toolchain
        uses: ./.github/actions/setup-ocaml-toolchain

      - name: Pin external OCaml dependencies
        uses: ./.github/actions/pin-ocaml-deps

      - name: Install system and OCaml dependencies
        uses: ./.github/actions/install-ocaml-deps
        with:
          install-flags: --with-doc

      - name: Install odoc
        run: |
          for attempt in 1 2 3; do
            opam install odoc --yes && break
            if [ "$attempt" -eq 3 ]; then
              echo "opam install odoc failed after ${attempt} attempts"
              exit 1
            fi
            echo "opam install odoc failed (attempt ${attempt}); retrying in 15s..."
            sleep 15
          done

      - name: Build documentation
        run: |
          opam exec -- dune build @doc || echo "Docs build skipped"

  tla-specs:
    name: TLA+ Model Checking
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Run TLA+ model checking
        run: make -C specs check-all
