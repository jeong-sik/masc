\* Clean model: only the legitimate action (CreateInOwnPlayground).
\* Expected: TLC reports "no error" — BOTH invariants hold.
\* Both invariants are listed individually so a future refactor that
\* drops one cannot silently weaken the spec.
SPECIFICATION SpecClean
INVARIANT KeeperWorktreeKind
INVARIANT KeeperWorktreeOwner
INVARIANT TypeOK
CONSTANTS
    Keepers = {a, b}
