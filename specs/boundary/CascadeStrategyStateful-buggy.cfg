\* Expected outcome: NoExpiredEntriesUsable is violated at
\* depth ~5 (safety).  TickBuggy advances the clock without
\* evicting expired entries, so a pinned entry reaches
\* `clock >= expires_at` while still in the table.
\*
\* StickyEventuallyEvicts would also fail under this model
\* (there is no path from HasEntry to ~HasEntry), but TLC stops
\* on the first safety violation, which is cheaper to check in
\* CI than the full liveness branch.

SPECIFICATION SpecBuggy

CONSTANTS
    Keepers     = {k1, k2}
    Cascades    = {c1}
    Candidates  = {a, b}
    MaxClock    = 4
    DefaultTTL  = 2

INVARIANTS
    TypeOK
    StickyDomainBounded
    StickyMembersAreCandidates
    RRBounded
    NoExpiredEntriesUsable

PROPERTIES
    StickyEventuallyEvicts

CHECK_DEADLOCK
    FALSE
