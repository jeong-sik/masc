\* Buggy-unbounded spec — restart-budget DEAD / wake tombstones.
\* TLC must report PacingBounded violated: a failure pushes the revisit
\* deadline past MaxBackoff, creating a de-facto terminal pacing state.

SPECIFICATION SpecBuggyUnbounded

CONSTANTS
    Runtimes = {r1}
    MaxTime = 3
    MaxBackoff = 2

INVARIANTS
    Safety

CHECK_DEADLOCK
    FALSE