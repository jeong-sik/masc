\* KeeperReconcileLiveness — HISTORICAL audit model (clean variant)
\* NOT part of the canonical runtime-truth keeper spec set.
\* Expected: TLC exits 0 (no error)
\*
\* Verifies that manual_reconcile_required is NOT a one-way trap
\* when HeartbeatRecovery dispatches both Turn_succeeded and
\* Manual_reconcile_cleared.

CONSTANTS
    MaxRestarts = 3

SPECIFICATION Spec

\* Terminal states deadlock by design
CHECK_DEADLOCK
    FALSE

\* State invariants
INVARIANTS
    TypeOK

\* Safety + liveness
PROPERTIES
    RunningClearsManualReconcile
    DeadIsForever
    StoppedIsForever
    RunningRequiresFiber
    ManualReconcileLiveness
    FailingRecoveryLiveness
    CompactingResolves
    HandoffResolves
    DrainingResolves
