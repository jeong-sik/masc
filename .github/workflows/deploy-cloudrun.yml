name: Deploy to Cloud Run

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  PROJECT_ID: kn-ax-tf
  REGION: asia-northeast3  # Seoul
  SERVICE: masc-mcp

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup OCaml
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: 5.4.x

      - name: Pin private dependencies
        run: |
          opam pin add compact-protocol https://github.com/jeong-sik/compact-protocol.git#main -n -y
          opam pin add mcp_protocol https://github.com/jeong-sik/mcp-protocol-sdk.git#main -n -y
          opam pin add ocaml-webrtc https://github.com/jeong-sik/ocaml-webrtc.git#main -n -y
          opam pin add grpc-direct-core https://github.com/jeong-sik/grpc-direct.git#main -n -y
          opam pin add grpc-direct https://github.com/jeong-sik/grpc-direct.git#main -n -y

      - name: Install dependencies
        run: opam install . --deps-only -y

      - name: Build release binary
        run: opam exec -- dune build --release bin/main_eio.exe

      - name: Prepare binary for Docker
        run: cp _build/default/bin/main_eio.exe masc-mcp-linux-x64

      - name: Google Auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev

      - name: Build and Push Docker image
        run: |
          docker build -t ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/masc/${{ env.SERVICE }}:${{ github.sha }} .
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/masc/${{ env.SERVICE }}:${{ github.sha }}

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE }} \
            --image ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/masc/${{ env.SERVICE }}:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --port 8080 \
            --memory 512Mi \
            --cpu 1 \
            --min-instances 1 \
            --max-instances 3 \
            --set-env-vars "MASC_BASE_PATH=/app" \
            --set-secrets "MASC_POSTGRES_URL=masc-postgres-url:latest"
