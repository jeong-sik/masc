\* Buggy model A: quarantine-on-bump moves the old-version file aside and the
\* store starts empty at the live path, while boot reports ok.
\* Expected: NoDurableRowLostOnBump VIOLATED (RFC-0344 §1; #25135 4190faacf1).
\* Checked alone so this mode going unreachable cannot be masked by the other;
\* mode B lives in DurableStoreSchemaMigration-buggy-orphan.cfg (the `-buggy`
\* segment is required: specs/Makefile classifies every cfg without it as a
\* clean model that must NOT violate).
SPECIFICATION SpecBuggyQuarantine
INVARIANT NoDurableRowLostOnBump
CONSTANT OldRows = 3
CHECK_DEADLOCK FALSE
