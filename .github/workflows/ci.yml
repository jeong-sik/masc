name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch: {}

permissions:
  contents: read
  actions: write
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  pr-sync-check:
    name: PR Sync Check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Verify PR sync
        env:
          PR_HEAD_REF: ${{ github.head_ref }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          chmod +x scripts/check-pr-sync.sh
          scripts/check-pr-sync.sh \
            --head-branch "$PR_HEAD_REF" \
            --pr-number "$PR_NUMBER" \
            --expected-head-sha "$PR_HEAD_SHA"

  changes:
    name: Detect Changed Surfaces
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [pr-sync-check]
    if: ${{ !cancelled() && (needs.pr-sync-check.result == 'success' || needs.pr-sync-check.result == 'skipped') }}
    outputs:
      build: ${{ steps.scope.outputs.build }}
      lint: ${{ steps.scope.outputs.lint }}
      dashboard: ${{ steps.scope.outputs.dashboard }}
      health: ${{ steps.scope.outputs.health }}
      health_snapshot: ${{ steps.scope.outputs.health_snapshot }}
      lib_deps: ${{ steps.scope.outputs.lib_deps }}
      doc_truth: ${{ steps.scope.outputs.doc_truth }}
      tla: ${{ steps.scope.outputs.tla }}
      oas_pin: ${{ steps.scope.outputs.oas_pin }}
      spec_refs: ${{ steps.scope.outputs.spec_refs }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Detect scope
        id: scope
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_BASE_REF: ${{ github.base_ref }}
          GITHUB_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          GITHUB_BEFORE: ${{ github.event.before }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          emit_all_true() {
            for key in build lint dashboard health health_snapshot lib_deps doc_truth tla oas_pin spec_refs; do
              echo "${key}=true" >> "$GITHUB_OUTPUT"
            done
          }

          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            emit_all_true
            echo "::notice::workflow_dispatch forces every CI surface to run"
            exit 0
          fi

          changed_file_list="$(mktemp)"
          base_ref=""
          head_ref="${GITHUB_SHA}"

          if [ "${GITHUB_EVENT_NAME}" = "pull_request" ]; then
            bash scripts/ci/git-fetch-retry.sh origin "${GITHUB_BASE_REF}" --depth=200
            base_ref="origin/${GITHUB_BASE_REF}"
            head_ref="${GITHUB_HEAD_SHA}"
          elif [ -n "${GITHUB_BEFORE}" ] && [ "${GITHUB_BEFORE}" != "0000000000000000000000000000000000000000" ]; then
            base_ref="${GITHUB_BEFORE}"
          fi

          if [ -n "${base_ref}" ]; then
            git diff --name-only "${base_ref}" "${head_ref}" > "${changed_file_list}"
          else
            git ls-files > "${changed_file_list}"
          fi

          if [ ! -s "${changed_file_list}" ]; then
            git ls-files > "${changed_file_list}"
          fi

          echo "Changed files:"
          sed 's/^/  - /' "${changed_file_list}"

          has_match() {
            grep -Eq "$1" "${changed_file_list}"
          }

          ci_core=false
          build=false
          lint=false
          dashboard=false
          health=false
          health_snapshot=false
          lib_deps=false
          doc_truth=false
          tla=false
          oas_pin=false
          spec_refs=false

          if has_match '^(\.github/workflows/ci\.yml|\.github/actions/)'; then
            ci_core=true
          fi

          if has_match '^(bin/|lib/|test/|proto/|config/|dune-project$|dune-workspace$|.*\.opam$|scripts/ci-run-tests\.sh$|scripts/release-binary-smoke\.sh$|scripts/release-evidence\.sh$|scripts/install\.sh$|scripts/harness/contract/|scripts/harness/transport/|scripts/harness/lib/server_bootstrap\.sh$)'; then
            build=true
          fi

          if has_match '^(bin/|lib/|test/|proto/|config/|dune-project$|dune-workspace$|.*\.opam$|scripts/install\.sh$|scripts/check-eio-conventions\.sh$|scripts/check-feature-flag-consistency\.sh$|scripts/check-toml-syntax\.sh$|scripts/validate-prompt-paths\.sh$|scripts/check-boundary-guard\.sh$|scripts/check-ssot\.sh$|scripts/gen-grpc-descriptors\.sh$|scripts/lint/no-unknown-permissive-default\.sh$|scripts/lint/no-unknown-permissive-default\.allowlist$|scripts/lint/yojson-option-default\.py$|scripts/lint/yojson-option-default\.allowlist$|scripts/ci/)'; then
            lint=true
          fi

          if has_match '^dashboard/'; then
            dashboard=true
          fi

          if has_match '^(bin/|lib/|test/|proto/|config/|\.ci/health-baseline\.json$|dune-project$|.*\.opam$|scripts/health_snapshot\.sh$|scripts/anti-fake-audit\.sh$)'; then
            health=true
          fi

          if has_match '^(bin/|lib/|test/|proto/|config/|\.ci/health-baseline\.json$|dune-project$|.*\.opam$|scripts/health_snapshot\.sh$|scripts/anti-fake-audit\.sh$)'; then
            health_snapshot=true
          fi

          if has_match '^(\.github/workflows/ci\.yml|lib/|dune-project$|dune-workspace$|.*\.opam$|scripts/analyze_lib_deps\.py$|scripts/lib_dep_report\.py$|scripts/lib_dep_delta_ci\.sh$)'; then
            lib_deps=true
          fi

          if has_match '^(docs/|README\.md$|ROADMAP\.md$|CHANGELOG\.md$|dune-project$|.*\.opam$|scripts/check-doc-truth\.sh$|scripts/check-version-truth\.sh$|scripts/check-oas-pin\.sh$|scripts/oas-agent-sdk-pin\.sh$|scripts/sync-oas-pin-docs\.sh$|scripts/release-binary-smoke\.sh$|scripts/release-evidence\.sh$|scripts/install\.sh$)'; then
            doc_truth=true
          fi

          if has_match '^(specs/|lib/keeper/|lib/oas_.*\.ml$|Makefile$)'; then
            tla=true
          fi

          if has_match '^(ci/check-oas-pin\.sh$|scripts/check-oas-pin\.sh$|scripts/oas-agent-sdk-pin\.sh$|scripts/sync-oas-pin-docs\.sh$|dune-project$|masc_mcp\.opam$|docs/KEEPER-USER-MANUAL\.md$|docs/OAS-UTILIZATION-AUDIT\.md$)'; then
            oas_pin=true
          fi

          if has_match '^(specs/.*\.tla$|lib/.*\.mli?$|test/.*\.mli?$|src/.*\.mli?$|scripts/lint/spec-line-refs\.(sh|allowlist)$)'; then
            spec_refs=true
          fi

          if [ "${ci_core}" = true ]; then
            build=true
            lint=true
            health=true
            health_snapshot=true
            lib_deps=true
            doc_truth=true
            oas_pin=true
            # Note: dashboard/spec_refs/tla stay path-scoped. Pure CI
            # workflow/action edits should still validate the core OCaml/repo
            # guard lanes and Health, but they should not fan out into every
            # feature surface.
          fi

          echo "build=${build}" >> "$GITHUB_OUTPUT"
          echo "lint=${lint}" >> "$GITHUB_OUTPUT"
          echo "dashboard=${dashboard}" >> "$GITHUB_OUTPUT"
          echo "health=${health}" >> "$GITHUB_OUTPUT"
          echo "health_snapshot=${health_snapshot}" >> "$GITHUB_OUTPUT"
          echo "lib_deps=${lib_deps}" >> "$GITHUB_OUTPUT"
          echo "doc_truth=${doc_truth}" >> "$GITHUB_OUTPUT"
          echo "tla=${tla}" >> "$GITHUB_OUTPUT"
          echo "oas_pin=${oas_pin}" >> "$GITHUB_OUTPUT"
          echo "spec_refs=${spec_refs}" >> "$GITHUB_OUTPUT"

          printf 'CI scope => build=%s lint=%s dashboard=%s health=%s health_snapshot=%s lib_deps=%s doc_truth=%s tla=%s oas_pin=%s\n' \
            "${build}" "${lint}" "${dashboard}" "${health}" "${health_snapshot}" "${lib_deps}" "${doc_truth}" "${tla}" "${oas_pin}"

  meta:
    name: Meta Guards
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [pr-sync-check, changes]
    if: ${{ !cancelled() && (needs.pr-sync-check.result == 'success' || needs.pr-sync-check.result == 'skipped') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install meta shell dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ripgrep

      - name: Guard pending release tag on main PRs
        if: github.event_name == 'pull_request' && github.base_ref == 'main'
        env:
          BASE_REF: origin/${{ github.base_ref }}
          HEAD_REF: ${{ github.event.pull_request.head.sha }}
        run: |
          chmod +x scripts/check-release-train-guard.sh
          bash scripts/ci/git-fetch-retry.sh origin "${{ github.base_ref }}" --depth=100 --tags
          scripts/check-release-train-guard.sh \
            --base "$BASE_REF" \
            --head "$HEAD_REF"

      - name: Run PR hygiene guards
        if: github.event_name == 'pull_request'
        env:
          BASE_REF: origin/${{ github.base_ref }}
          HEAD_REF: ${{ github.event.pull_request.head.sha }}
        run: |
          chmod +x scripts/check-pr-hygiene.sh
          bash scripts/ci/git-fetch-retry.sh origin "${{ github.base_ref }}" --depth=100
          scripts/check-pr-hygiene.sh \
            --base "$BASE_REF" \
            --head "$HEAD_REF" \
            --recent-main 50 \
            --duplicate-policy warn

      - name: Check doc truth
        if: needs.changes.outputs.doc_truth == 'true'
        run: |
          chmod +x scripts/check-doc-truth.sh scripts/sync-oas-pin-docs.sh
          scripts/check-doc-truth.sh
          scripts/sync-oas-pin-docs.sh --check

      - name: Check OAS pin consistency
        if: needs.changes.outputs.oas_pin == 'true'
        run: |
          chmod +x scripts/check-oas-pin.sh
          scripts/check-oas-pin.sh --local-only

      - name: Run report self-test
        if: needs.changes.outputs.lib_deps == 'true'
        run: python3 scripts/lib_dep_report.py --self-test

      - name: Generate lib dependency delta
        if: needs.changes.outputs.lib_deps == 'true'
        run: bash scripts/lib_dep_delta_ci.sh

      - name: Upload lib dependency reports
        if: needs.changes.outputs.lib_deps == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: lib-dependency-delta
          path: |
            reports/lib-dependency-graph.json
            reports/lib-dependency-graph.baseline.json
            reports/lib-dependency-summary.md
            reports/lib-dependency-summary.json

      - name: Validate spec line refs
        if: needs.changes.outputs.spec_refs == 'true'
        run: bash scripts/lint/spec-line-refs.sh

      - name: Meta bug-class gates (SSOT, SIL, STR, BND)
        run: |
          chmod +x scripts/ci/*.sh
          echo "=== Running meta bug-class gates (see #9516 #9517 #9519 #9521) ==="
          bash scripts/ci/check-ssot-spawn-drift.sh
          bash scripts/ci/check-silent-failure-patterns.sh
          bash scripts/ci/check-enum-string-safety.sh
          bash scripts/ci/check-masc-oas-boundary.sh
          bash scripts/ci/check-tla-variant-sync.sh
          bash scripts/ci/check-tla-harness-coverage.sh
          bash scripts/ci/check-telemetry-coverage.sh
          bash scripts/ci/check-determinism-contract.sh
          bash scripts/audit-hardcoding-truth.sh --fail-on-confirmed
          bash scripts/ci/check-credential-audits.sh
          bash scripts/ci/check-accept-fd-lifecycle.sh
          bash scripts/ci/check-actor-consumer-wired.sh

  health:
    name: Health
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [pr-sync-check, changes]
    if: ${{ !cancelled() && needs.changes.outputs.health == 'true' && (needs.pr-sync-check.result == 'success' || needs.pr-sync-check.result == 'skipped') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install health shell dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ripgrep bc

      - name: Setup OCaml toolchain
        if: needs.changes.outputs.health_snapshot == 'true'
        uses: ./.github/actions/setup-ocaml-toolchain

      - name: Pin external OCaml dependencies
        if: needs.changes.outputs.health_snapshot == 'true'
        uses: ./.github/actions/pin-ocaml-deps
        with:
          pin-flags: --with-bisect

      - name: Install system and OCaml dependencies
        if: needs.changes.outputs.health_snapshot == 'true'
        uses: ./.github/actions/install-ocaml-deps
        with:
          install-flags: --with-test

      - name: Fetch base branch for health ratchet
        if: github.event_name == 'pull_request' && needs.changes.outputs.health_snapshot == 'true'
        run: bash scripts/ci/git-fetch-retry.sh origin "${{ github.base_ref }}" --depth=1

      - name: Run health snapshot
        if: needs.changes.outputs.health_snapshot == 'true'
        env:
          HEALTH_BASELINE_REF: ${{ github.event_name == 'pull_request' && format('origin/{0}', github.base_ref) || '' }}
        run: |
          chmod +x scripts/health_snapshot.sh scripts/anti-fake-audit.sh
          if [ -n "${HEALTH_BASELINE_REF}" ]; then
            opam exec -- bash scripts/health_snapshot.sh \
              --json-out .health/health-snapshot.json \
              --baseline-ref "${HEALTH_BASELINE_REF}" \
              --fail-on-lib-regression
          else
            opam exec -- bash scripts/health_snapshot.sh \
              --json-out .health/health-snapshot.json \
              --baseline-file .ci/health-baseline.json \
              --fail-on-lib-regression
          fi

      - name: Upload health snapshot
        if: needs.changes.outputs.health_snapshot == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: health-snapshot
          path: .health/health-snapshot.json

  build:
    name: Build and Test
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: [pr-sync-check, changes]
    if: ${{ !cancelled() && needs.changes.outputs.build == 'true' && (needs.pr-sync-check.result == 'success' || needs.pr-sync-check.result == 'skipped') }}
    outputs:
      advisory_status: ${{ steps.build_advisory_status.outputs.advisory_status }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup OCaml toolchain
        uses: ./.github/actions/setup-ocaml-toolchain

      - name: Pin external OCaml dependencies
        uses: ./.github/actions/pin-ocaml-deps
        with:
          pin-flags: --with-bisect

      - name: Install system and OCaml dependencies
        uses: ./.github/actions/install-ocaml-deps
        with:
          install-flags: --with-test
          os-packages: jq ripgrep

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.22'
          # This workflow only uses Go to install grpcurl and does not
          # carry a repo go.mod/go.sum for module cache restoration.
          cache: false

      - name: Install grpcurl
        run: |
          GOBIN="$HOME/go/bin" go install github.com/fullstorydev/grpcurl/cmd/grpcurl@latest
          echo "$HOME/go/bin" >> "$GITHUB_PATH"

      - name: Build
        id: build_step
        continue-on-error: true
        run: |
          opam exec -- dune build

      - name: Run tests (quick suite)
        id: quick_suite
        continue-on-error: true
        env:
          ME_ROOT: /tmp/me
          ALCOTEST_QUICK_TESTS: "1"
          MASC_INCLUDE_OPERATOR_CONTROL: "false"
          CI_TEST_TIMEOUT_SEC: 1200
          CI_TEST_HEARTBEAT_SEC: 30
          MASC_LOCAL_RUNTIMES_JSON: '[{"base_url":"http://127.0.0.1:8085","max_concurrency":4}]'
          MASC_KEEPER_MSG_TIMEOUT_MAX_SEC: "10"
          MASC_E2E_TESTS: "true"
        run: |
          mkdir -p /tmp/me
          chmod +x scripts/ci-run-tests.sh
          scripts/ci-run-tests.sh "opam exec -- dune test"

      - name: Run operator control suite
        id: operator_control_suite
        continue-on-error: true
        env:
          ME_ROOT: /tmp/me
          ALCOTEST_QUICK_TESTS: "1"
          CI_TEST_TIMEOUT_SEC: 600
          CI_TEST_HEARTBEAT_SEC: 15
          MASC_LOCAL_RUNTIMES_JSON: '[{"base_url":"http://127.0.0.1:8085","max_concurrency":4}]'
          MASC_KEEPER_MSG_TIMEOUT_MAX_SEC: "10"
          MASC_E2E_TESTS: "true"
        run: |
          mkdir -p /tmp/me
          chmod +x scripts/ci-run-tests.sh
          scripts/ci-run-tests.sh "opam exec -- dune exec ./test/test_operator_control.exe"

      - name: Run SSE reconnect e2e
        id: sse_reconnect_e2e
        continue-on-error: true
        env:
          ME_ROOT: /tmp/me
          CI_TEST_TIMEOUT_SEC: 900
          CI_TEST_HEARTBEAT_SEC: 15
        run: |
          mkdir -p /tmp/me
          chmod +x scripts/ci-run-tests.sh
          scripts/ci-run-tests.sh "opam exec -- dune exec ./test/test_sse_storm_e2e.exe"

      - name: Run transport harness suite
        id: transport_harness_suite
        continue-on-error: true
        env:
          ME_ROOT: /tmp/me
          CI_TEST_TIMEOUT_SEC: 900
          CI_TEST_HEARTBEAT_SEC: 15
        run: |
          mkdir -p /tmp/me
          chmod +x scripts/ci-run-tests.sh
          chmod +x scripts/harness/transport/run_all.sh
          chmod +x scripts/harness/transport/verify_sse.sh
          chmod +x scripts/harness/transport/verify_grpc_subscribe.sh
          chmod +x scripts/harness/transport/verify_h2c_autodetect.sh
          chmod +x scripts/harness/transport/verify_ws.sh
          chmod +x scripts/harness/transport/verify_webrtc_signaling.sh
          chmod +x scripts/harness/lib/server_bootstrap.sh
          scripts/ci-run-tests.sh "bash scripts/harness/transport/run_all.sh"

      - name: Check formatting
        run: |
          opam exec -- dune fmt 2>&1 || true
          # Note: dune fmt may not be available, skip if so

      - name: Run contract harness suite
        id: contract_harness_suite
        continue-on-error: true
        env:
          ME_ROOT: /tmp/me
          CI_TEST_TIMEOUT_SEC: 900
          CI_TEST_HEARTBEAT_SEC: 15
        run: |
          mkdir -p /tmp/me
          chmod +x scripts/ci-run-tests.sh
          chmod +x scripts/harness/contract/run_all.sh
          chmod +x scripts/harness/lib/server_bootstrap.sh
          scripts/ci-run-tests.sh "scripts/harness/contract/run_all.sh"

      - name: Generate main release evidence bundle
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          chmod +x scripts/release-evidence.sh
          mkdir -p .release-evidence
          scripts/release-evidence.sh \
            _build/default/bin/main_eio.exe \
            .release-evidence/main-release-evidence.md

      - name: Upload main release evidence
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v7
        with:
          name: release-evidence-main
          path: .release-evidence/

      - name: Verification matrix summary
        if: ${{ always() }}
        run: |
          echo "::notice::Required CI gates live in CI Gate; Build and Test is advisory and summarizes failures below"
          echo "::notice::Optional env-gated suites not run here: PostgreSQL tests, live ICE/STUN/TURN/browser interop, viewer-local-e2e-check, swarm/team-session workload harnesses"

      - name: Summarize advisory build status
        if: ${{ always() }}
        id: build_advisory_status
        env:
          BUILD_OUTCOME: ${{ steps.build_step.outcome }}
          QUICK_SUITE_OUTCOME: ${{ steps.quick_suite.outcome }}
          OPERATOR_CONTROL_OUTCOME: ${{ steps.operator_control_suite.outcome }}
          SSE_RECONNECT_OUTCOME: ${{ steps.sse_reconnect_e2e.outcome }}
          TRANSPORT_HARNESS_OUTCOME: ${{ steps.transport_harness_suite.outcome }}
          CONTRACT_HARNESS_OUTCOME: ${{ steps.contract_harness_suite.outcome }}
        run: |
          set -euo pipefail
          advisory_failures=()
          add_failure() {
            local label=$1
            local outcome=$2
            if [[ "$outcome" == "failure" ]]; then
              advisory_failures+=("$label")
            fi
          }

          add_failure "build" "$BUILD_OUTCOME"
          add_failure "quick-suite" "$QUICK_SUITE_OUTCOME"
          add_failure "operator-control" "$OPERATOR_CONTROL_OUTCOME"
          add_failure "sse-reconnect-e2e" "$SSE_RECONNECT_OUTCOME"
          add_failure "transport-harness" "$TRANSPORT_HARNESS_OUTCOME"
          add_failure "contract-harness" "$CONTRACT_HARNESS_OUTCOME"

          if [[ ${#advisory_failures[@]} -eq 0 ]]; then
            echo "advisory_status=clean" >> "$GITHUB_OUTPUT"
            echo "Advisory verification status: clean" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          advisory_list=$(IFS=', '; echo "${advisory_failures[*]}")
          echo "advisory_status=warning" >> "$GITHUB_OUTPUT"
          echo "::warning::Build and Test advisory failures: ${advisory_list}"
          {
            echo "### Build and Test advisory failures"
            echo
            echo "- ${advisory_list}"
            echo
            echo "CI Gate remains authoritative for merge blocking. This job is observability-only."
          } >> "$GITHUB_STEP_SUMMARY"

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [pr-sync-check, changes]
    if: ${{ !cancelled() && needs.changes.outputs.lint == 'true' && (needs.pr-sync-check.result == 'success' || needs.pr-sync-check.result == 'skipped') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Run #8605 family detector
        run: bash scripts/lint/no-unknown-permissive-default.sh

      - name: Run yojson option-field [@default None] lint
        run: python3 scripts/lint/yojson-option-default.py

      - name: Setup OCaml toolchain
        uses: ./.github/actions/setup-ocaml-toolchain

      - name: Pin external OCaml dependencies
        uses: ./.github/actions/pin-ocaml-deps

      - name: Install system and OCaml dependencies
        uses: ./.github/actions/install-ocaml-deps
        with:
          os-packages: ripgrep

      - name: Check Eio conventions
        run: |
          chmod +x scripts/check-eio-conventions.sh
          scripts/check-eio-conventions.sh

      - name: Check feature flag consistency
        run: |
          chmod +x scripts/check-feature-flag-consistency.sh
          scripts/check-feature-flag-consistency.sh

      - name: Check TOML syntax
        run: |
          chmod +x scripts/check-toml-syntax.sh
          scripts/check-toml-syntax.sh

      - name: Check keeper prompt paths drift (#6527 iter9)
        run: |
          chmod +x scripts/validate-prompt-paths.sh
          scripts/validate-prompt-paths.sh

      - name: Check MASC/OAS boundary ratchet
        run: |
          chmod +x scripts/check-boundary-guard.sh
          scripts/check-boundary-guard.sh

      - name: Check SSOT bypass ratchet (#8462)
        run: |
          chmod +x scripts/check-ssot.sh
          scripts/check-ssot.sh

      - name: Build with warnings as errors
        run: |
          opam exec -- dune build @install --force
        env:
          OCAMLPARAM: "_,warn-error=+a"

      - name: Check gRPC proto descriptor drift
        run: |
          sudo apt-get install -y -qq protobuf-compiler
          chmod +x scripts/gen-grpc-descriptors.sh
          scripts/gen-grpc-descriptors.sh --check

  dashboard:
    name: Dashboard
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [pr-sync-check, changes]
    if: ${{ !cancelled() && needs.changes.outputs.dashboard == 'true' && (needs.pr-sync-check.result == 'success' || needs.pr-sync-check.result == 'skipped') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Run drift gate
        run: scripts/dashboard-drift-check.sh

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Enable corepack and install pnpm
        run: corepack enable && corepack prepare pnpm@10.31.0 --activate

      - name: Resolve pnpm store path
        id: pnpm-store
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: pnpm-${{ runner.os }}-${{ hashFiles('dashboard/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-${{ runner.os }}-

      - name: Install dashboard dependencies
        working-directory: dashboard
        run: pnpm install --frozen-lockfile

      - name: TypeScript typecheck
        working-directory: dashboard
        run: pnpm run typecheck

      - name: Run dashboard tests
        working-directory: dashboard
        run: pnpm test

  tla-specs:
    name: TLA+ Model Checking
    runs-on: ubuntu-latest
    timeout-minutes: 40
    needs: [pr-sync-check, changes]
    if: ${{ !cancelled() && needs.changes.outputs.tla == 'true' && (needs.pr-sync-check.result == 'success' || needs.pr-sync-check.result == 'skipped') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Download tla2tools.jar (pinned v1.8.0)
        run: |
          curl -fsSL -o specs/keeper-state-machine/tla2tools.jar \
            https://github.com/tlaplus/tlaplus/releases/download/v1.8.0/tla2tools.jar

      - name: Run TLA+ model checking
        run: |
          make -C specs check-clean
          make -C specs check-buggy

  ci-gate:
    name: CI Gate
    runs-on: ubuntu-latest
    needs: [pr-sync-check, changes, meta, build, lint, dashboard, health, tla-specs]
    if: ${{ !cancelled() }}
    timeout-minutes: 2

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Enforce agent draft policy on merge gate
        if: github.event_name == 'pull_request'
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          PR_IS_DRAFT: ${{ github.event.pull_request.draft }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
          PR_LABELS: ${{ join(github.event.pull_request.labels.*.name, ',') }}
          GH_TOKEN: ${{ github.token }}
          AGENT_DRAFT_GUARD_TITLE_RE: ${{ vars.AGENT_DRAFT_GUARD_TITLE_RE }}
          AGENT_DRAFT_GUARD_BRANCH_RE: ${{ vars.AGENT_DRAFT_GUARD_BRANCH_RE }}
          AGENT_DRAFT_GUARD_BYPASS_LABELS: ${{ vars.AGENT_DRAFT_GUARD_BYPASS_LABELS }}
        run: |
          if command -v gh >/dev/null 2>&1 && [ -n "${PR_NUMBER:-}" ]; then
            live_is_draft="$(gh pr view "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --json isDraft --jq '.isDraft' 2>/dev/null || true)"
            if [ "$live_is_draft" = "true" ] || [ "$live_is_draft" = "false" ]; then
              export PR_LIVE_IS_DRAFT="$live_is_draft"
            else
              echo "::warning::Could not resolve live PR draft state; falling back to pull_request event payload."
            fi
            live_labels="$(gh pr view "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --json labels --jq '[.labels[].name] | join(",")' 2>/dev/null || true)"
            if [ -n "$live_labels" ]; then
              export PR_LIVE_LABELS="$live_labels"
            fi
            # #10192: CI Gate runs that fire after auto-merge can
            # see the bypass label cleaned up by post-merge
            # automation; pass live state to the policy script so
            # it skips the check when the PR is no longer open.
            live_state="$(gh pr view "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --json state --jq '.state' 2>/dev/null || true)"
            if [ -n "$live_state" ]; then
              export PR_LIVE_STATE="$live_state"
            fi
          fi
          scripts/ci/check-agent-draft-policy.sh

      - name: Aggregate required check status
        env:
          PR_SYNC_RESULT: ${{ needs.pr-sync-check.result }}
          CHANGES_RESULT: ${{ needs.changes.result }}
          META_RESULT: ${{ needs.meta.result }}
          BUILD_RESULT: ${{ needs.build.result }}
          LINT_RESULT: ${{ needs.lint.result }}
          DASHBOARD_RESULT: ${{ needs.dashboard.result }}
          HEALTH_RESULT: ${{ needs.health.result }}
          TLA_RESULT: ${{ needs.tla-specs.result }}
          BUILD_ADVISORY_STATUS: ${{ needs.build.outputs.advisory_status }}
        run: |
          set -euo pipefail
          fail=0
          # mode=required (default): fail → block merge
          # mode=advisory: fail → log a WARN line, do not block
          #
          # Why `build` is advisory: of 80 PRs merged 2026-04-18..04-20,
          # 22 (27%) landed with CI Gate FAILURE via manual admin merge,
          # and 22/22 had Build and Test as the sole culprit (quick-suite
          # Eio isolation flakes). CI Gate had stopped carrying signal.
          # Build and Test now self-reports warning-only failures while CI Gate
          # blocks only on deterministic lanes.
          check() {
            local name=$1
            local result=$2
            local mode=${3:-required}
            if [[ "$result" == "success" || "$result" == "skipped" ]]; then
              printf 'PASS  %-20s %s\n' "$name" "$result"
            elif [[ "$mode" == "advisory" ]]; then
              printf 'WARN  %-20s %s (advisory, not blocking)\n' "$name" "$result"
            else
              printf 'FAIL  %-20s %s\n' "$name" "$result"
              fail=1
            fi
          }
          warn_if_advisory() {
            local name=$1
            local status=$2
            if [[ "$status" == "warning" ]]; then
              printf 'WARN  %-20s advisory failures logged in Build and Test\n' "$name"
            fi
          }
          check "pr-sync-check"   "$PR_SYNC_RESULT"
          check "changes"         "$CHANGES_RESULT"
          check "meta"            "$META_RESULT"
          check "build"           "$BUILD_RESULT"
          warn_if_advisory "build" "$BUILD_ADVISORY_STATUS"
          check "lint"            "$LINT_RESULT"
          check "dashboard"       "$DASHBOARD_RESULT"
          check "health"          "$HEALTH_RESULT"
          check "tla-specs"       "$TLA_RESULT"
          [ "$fail" -eq 0 ]
