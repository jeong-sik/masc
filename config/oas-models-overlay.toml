# MASC deployment capability overlay (RFC-OAS-036 / RFC-0342 D1).
#
# This file contains only deployment-local serving aliases and locally probed
# model builds. OAS owns the embedded base catalog; copying upstream rows here
# would recreate the full-catalog fork this overlay replaces.

# Z.AI coding-plan endpoint under [providers.glm-coding].
[[models]]
id_prefix = "GLM-5-Turbo"
provider_name = "glm-coding"
base = "glm"
max_context_tokens = 200000
max_output_tokens = 128000
supports_tools = true
supports_tool_choice = true
supports_named_tool_choice = false
supports_reasoning = true
supports_extended_thinking = true
supports_response_format_json = true
supports_native_streaming = true
input_per_million = 1.2
output_per_million = 4.0
cache_write_multiplier = 1.0
cache_read_multiplier = 0.2

