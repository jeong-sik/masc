name: Issue Triage

on:
  issues:
    types: [opened, edited, reopened]

permissions:
  contents: read
  issues: write

jobs:
  enforce-triage:
    runs-on: ubuntu-latest
    steps:
      - name: Enforce type/area/target planning labels
        uses: actions/github-script@v9
        env:
          TRIAGE_LABEL: triage-required
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue = context.payload.issue;
            const issueNumber = issue.number;
            const body = issue.body || "";
            const areaMap = {
              "Repo coordination": "area:coordination",
              "Team session delivery": "area:team-session",
              "Dashboard and read models": "area:dashboard",
              "Operator and intervention": "area:operator",
              "Transport, auth, and health": "area:transport",
              "Config and installation": "area:config",
              "CI and release automation": "area:ci",
              "Docs and onboarding": "area:docs",
              "Experimental surfaces": "area:experimental"
            };
            const targetMap = {
              "now": "target:now",
              "next": "target:next",
              "later": "target:later"
            };
            const extraLabels = {
              "type:architecture": { color: "5319e7", description: "Architecture or structural change" },
              "type:docs": { color: "0052cc", description: "Documentation or product explanation work" },
              "area:coordination": { color: "1d76db", description: "Repo coordination and room/task flows" },
              "area:team-session": { color: "0052cc", description: "Team Session and supervised delivery" },
              "area:dashboard": { color: "0e8a16", description: "Dashboard and read-model surfaces" },
              "area:operator": { color: "5319e7", description: "Operator and intervention surfaces" },
              "area:transport": { color: "d93f0b", description: "Transport, auth, health, and protocol truth" },
              "area:config": { color: "fbca04", description: "Config, install, and runtime shape" },
              "area:ci": { color: "b60205", description: "CI, release, and automation flows" },
              "area:docs": { color: "006b75", description: "Docs, onboarding, and product framing" },
              "area:experimental": { color: "c5def5", description: "Experimental or research surfaces" },
              "target:now": { color: "b60205", description: "Current product-promise blocker" },
              "target:next": { color: "d4c5f9", description: "Next advanced workflow slice" },
              "target:later": { color: "ededed", description: "Visible, but deferred" },
              "product-gap": { color: "f9d0c4", description: "Code exists, but the product promise is still weak" }
            };

            async function ensureLabel(name, color, description) {
              try {
                await github.rest.issues.getLabel({ owner, repo, name });
              } catch (err) {
                if (err.status !== 404) throw err;
                await github.rest.issues.createLabel({
                  owner,
                  repo,
                  name,
                  color,
                  description
                });
              }
            }

            function getLabelNames(labels) {
              return labels.map((label) => (typeof label === "string" ? label : label.name));
            }

            function extractHeadingValue(markdown, heading) {
              const escaped = heading.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
              const match = markdown.match(new RegExp(`### ${escaped}\\r?\\n\\r?\\n([\\s\\S]*?)(?=\\r?\\n### |$)`, "i"));
              if (!match) return "";
              return match[1]
                .split(/\r?\n/)
                .map((line) => line.trim())
                .find(Boolean) || "";
            }

            function headingHasCheckedBox(markdown, heading) {
              const escaped = heading.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
              const match = markdown.match(new RegExp(`### ${escaped}\\r?\\n\\r?\\n([\\s\\S]*?)(?=\\r?\\n### |$)`, "i"));
              if (!match) return false;
              return /- \[x\]/i.test(match[1]);
            }

            await ensureLabel(
              process.env.TRIAGE_LABEL,
              "BFDADC",
              "Issue is missing exactly one planning type/area/target label."
            );
            for (const [name, meta] of Object.entries(extraLabels)) {
              await ensureLabel(name, meta.color, meta.description);
            }

            const labelNames = new Set(getLabelNames(issue.labels));
            const selectedArea = areaMap[extractHeadingValue(body, "Product area")];
            const selectedTarget = targetMap[extractHeadingValue(body, "Target lane").toLowerCase()];
            const hasProductGap = headingHasCheckedBox(body, "Product gap");

            const existingAreas = [...labelNames].filter((n) => n.startsWith("area:"));
            const existingTargets = [...labelNames].filter((n) => n.startsWith("target:"));

            const nextLabels = new Set(
              [...labelNames].filter((name) =>
                !name.startsWith("area:") &&
                !name.startsWith("target:") &&
                name !== "product-gap" &&
                name !== process.env.TRIAGE_LABEL
              )
            );

            if (selectedArea) {
              nextLabels.add(selectedArea);
            } else {
              existingAreas.forEach((a) => nextLabels.add(a));
            }
            if (selectedTarget) {
              nextLabels.add(selectedTarget);
            } else {
              existingTargets.forEach((t) => nextLabels.add(t));
            }
            if (hasProductGap) nextLabels.add("product-gap");

            const typeMatches = [...nextLabels].filter((name) => name.startsWith("type:"));
            const areaMatches = [...nextLabels].filter((name) => name.startsWith("area:"));
            const targetMatches = [...nextLabels].filter((name) => name.startsWith("target:"));

            // Epics are trackers — they don't need area/target labels
            const isEpic = typeMatches.includes("type:epic");
            const needsTriage = isEpic
              ? false
              : typeMatches.length !== 1 || areaMatches.length !== 1 || targetMatches.length !== 1;

            if (needsTriage) {
              nextLabels.add(process.env.TRIAGE_LABEL);
            }

            await github.rest.issues.setLabels({
              owner,
              repo,
              issue_number: issueNumber,
              labels: [...nextLabels]
            });
