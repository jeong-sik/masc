name: Branch Protection Watchdog

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "17 * * * *"

permissions:
  contents: read

jobs:
  branch-protection-watchdog:
    name: Branch Protection Watchdog
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Require branch protection audit token
        id: audit_token
        env:
          BRANCH_PROTECTION_AUDIT_TOKEN: ${{ secrets.BRANCH_PROTECTION_AUDIT_TOKEN }}
        run: |
          if [[ -z "${BRANCH_PROTECTION_AUDIT_TOKEN:-}" ]]; then
            # The audit reads branch protection settings. Missing credentials are
            # a repo-configuration gap, not a source-build failure, so PR and
            # main push runs skip with a warning. Schedule/manual runs still fail
            # hard to keep the missing secret visible until repository settings
            # are fixed.
            if [[ "${{ github.event_name }}" == "pull_request" || "${{ github.event_name }}" == "push" ]]; then
              echo "::warning title=Branch protection audit skipped::No BRANCH_PROTECTION_AUDIT_TOKEN secret configured. Skipping the branch-protection drift audit for this ${{ github.event_name }} run; schedule and manual runs still fail until the secret is configured."
              echo "skip_audit=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "::error title=Branch protection watchdog missing audit token::Configure repository secret BRANCH_PROTECTION_AUDIT_TOKEN with a token that can read branch protection. The default GITHUB_TOKEN cannot read branch protection and must not be used as a fallback."
            exit 1
          fi

      - name: Verify main branch protection drift
        if: steps.audit_token.outputs.skip_audit != 'true'
        env:
          GH_TOKEN: ${{ secrets.BRANCH_PROTECTION_AUDIT_TOKEN }}
          BRANCH_PROTECTION_REPOSITORY: ${{ github.repository }}
          BRANCH_PROTECTION_BRANCH: main
          BRANCH_PROTECTION_REQUIRED_CONTEXTS: CI Gate
        run: bash scripts/ci/check-main-branch-protection.sh
