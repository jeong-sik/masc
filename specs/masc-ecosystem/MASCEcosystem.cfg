SPECIFICATION Spec

CONSTANTS
    Agents = {"A1", "A2"}
    Keepers = {"K1", "K2"}
    Tasks = {"T1"}
    MaxContext = 100

\* Safety properties are state predicates and must be checked as invariants.
INVARIANTS
    NoContextOverflow
    SingleTaskPerAgent
    AtMostOneAgentPerTask

\* Liveness properties remain temporal.
PROPERTIES
    AllTasksEventuallyCompleted
    MemoryManagementWorks
