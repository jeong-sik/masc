# ── Layer 3: Provider×Model Bindings ───────────────────────────
#
# `max-concurrent` is REQUIRED (RFC-0058 §3.4). Defaults reflect
# observed CLI/HTTP capacity ceilings — CLI providers serialize at
# the binary level (1 concurrent invocation per credential), HTTP
# providers tolerate small fan-out before upstream throttling.
# `price-input` / `price-output` are USD per 1M tokens.

[codex_cli.codex-spark]
is-default = true
max-concurrent = 1


[gemini_cli.gemini-flash]
is-default = true
max-concurrent = 1

[gemini_cli.gemini-flash-lite]
is-default = false
max-concurrent = 1

[glm-coding.glm-5-turbo]
is-default = true
max-concurrent = 2

[glm-coding.glm-flashx]
is-default = false
max-concurrent = 2

[openai_compat.deepseek-v4-pro]
is-default = true
max-concurrent = 4

[openai_compat.deepseek-v4-flash]
is-default = false
max-concurrent = 4

[openai_compat.qwen3-5]
is-default = false
max-concurrent = 4

# ── Layer 4: Aliases (per-use overrides) ───────────────────────
#
# Aliases give logical names to (provider, model) pairs with
# call-site specific overrides. Code MUST reference aliases here
# rather than raw `<provider>.<model>` pairs — that is how RFC-0058
# §2.4 keeps vendor/model identifiers out of OCaml source.


[codex_cli.codex-spark.for-scoring]
max-output = 1024
temperature = 0.1


[codex_cli.codex-spark.for-keeper-turn]
max-output = 32768

[openai_compat.deepseek-v4-pro.for-keeper-turn]
max-output = 32768

[openai_compat.deepseek-v4-flash.for-keeper-turn]
max-output = 32768

[openai_compat.qwen3-5.for-keeper-turn]
max-output = 32768


# ── Layer 5: Tiers ─────────────────────────────────────────────

[tier.primary]
# Canonical keeper/workflow tier.
members = [
  "codex_cli.codex-spark.for-keeper-turn",
  "glm-coding.glm-flashx",
  "openai_compat.deepseek-v4-pro.for-keeper-turn",
  "openai_compat.deepseek-v4-flash.for-keeper-turn",
]
strategy = "failover"

[tier.keeper_diverse]
# Fallback tier for contract violation retry. Different model
# composition from primary to break correlated failure.
members = ["gemini_cli.gemini-flash", "codex_cli.codex-spark", "openai_compat.qwen3-5.for-keeper-turn"]
strategy = "failover"

[tier.scoring]
# System-only short-output tier for rerank/scoring calls.
# Members are aliases (Layer 4) with reduced max-output.
keeper-assignable = false
members = [
  "codex_cli.codex-spark.for-scoring",
]
strategy = "failover"

[tier.governance]
# System-only baseline for governance / judge calls.
keeper-assignable = false
members = ["glm-coding.glm-flashx", "openai_compat.deepseek-v4-flash.for-keeper-turn"]
strategy = "failover"

[tier.tier_small]
# Operator opt-in slot for 4B-class local models. Empty by default;
# routes fall through to tier_medium via tier-group fallback.
members = []
strategy = "failover"

[tier.tier_medium]
# 9B-class cloud-coding models for moderate tasks.
members = ["glm-coding.glm-flashx", "openai_compat.deepseek-v4-flash.for-keeper-turn"]
strategy = "failover"

[tier.__safe_lane]
# System-only baseline tier (RFC-0027 PR-4). Last-resort fallback
# target that satisfies every capability profile. Not keeper-assignable.
keeper-assignable = false
members = ["glm-coding.glm-flashx", "openai_compat.deepseek-v4-flash.for-keeper-turn"]
strategy = "failover"

[tier.local_recovery]
# Recovery tier for fallback_cascade = "local_recovery".
members = ["codex_cli.codex-spark.for-keeper-turn"]
strategy = "failover"

# ── Tier-Groups (fallback chains) ──────────────────────────────

[tier-group.primary]
tiers = ["primary", "keeper_diverse", "__safe_lane"]
strategy = "priority_tier"
fallback = true

[tier-group.tier_small]
tiers = ["tier_small", "tier_medium", "primary"]
strategy = "priority_tier"
fallback = true

[tier-group.tier_medium]
tiers = ["tier_medium", "primary"]
strategy = "priority_tier"
fallback = true

[tier-group.local_recovery]
tiers = ["local_recovery", "primary"]
strategy = "priority_tier"
fallback = true

[tier-group.scoring]
tiers = ["scoring", "__safe_lane"]
strategy = "priority_tier"
fallback = true
keeper-assignable = false

[tier-group.ollama_cloud_stable]
tiers = ["tier_medium", "primary", "__safe_lane"]
strategy = "priority_tier"
fallback = true

[tier-group.governance]
tiers = ["governance", "__safe_lane"]
strategy = "priority_tier"
fallback = true
keeper-assignable = false

[tier-group.strict_tool_candidates]
# Tier-group for routes requiring tool_strict profile capabilities
# (runtime_mcp_tools, runtime_tool_events, runtime_mcp_http_headers).
# Falls through primary → keeper_diverse → __safe_lane (satisfies all profiles).
tiers = ["primary", "keeper_diverse", "__safe_lane"]
strategy = "priority_tier"
fallback = true

[tier-group.glm-coding-with-spark]
# Tier-group for GLM-coding-first cascade with spark fallback.
# Primary GLM members + codex-spark as fallback for resilience.
tiers = ["primary", "keeper_diverse", "__safe_lane"]
strategy = "priority_tier"
fallback = true

[tier-group.runpod_mtp]
# Tier-group for runpod multi-tier-provider route.
# Falls through primary → keeper_diverse → __safe_lane.
tiers = ["primary", "keeper_diverse", "__safe_lane"]
strategy = "priority_tier"
fallback = true

# ── Routes (logical usage → tier-group) ────────────────────────
#
# RFC-0058 §4 R6: route targets resolve to tier-groups, tiers,
# bindings, or aliases (validated by `Cascade_declarative_validator`
# rule R7). The seed below targets tier-groups exclusively because
# routing through a tier-group keeps fallback chains explicit and
# discourages callers from depending on a single tier without a
# documented degradation path.

[routes.keeper_turn]
target = "tier-group.primary"

[routes.phase_recovery]
target = "tier-group.primary"

[routes.phase_buffer]
target = "tier-group.primary"

[routes.tool_required]
target = "tier-group.primary"

[routes.governance_judge]
target = "tier-group.governance"

[routes.operator_judge]
target = "tier-group.governance"

[routes.cross_verifier]
