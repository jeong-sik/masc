name: ocamlformat (changed files)

on:
  pull_request:
    paths:
      - '**/*.ml'
      - '**/*.mli'
      - '.ocamlformat'
      - '.github/workflows/ocamlformat.yml'

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ocamlformat-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  ocamlformat-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      # Move changed-file detection BEFORE OCaml setup so 0-file PRs skip the
      # ~120s setup-ocaml + opam install entirely (paths filter already triggers
      # on .ocamlformat or workflow yaml changes, where there may be no .ml diff).
      - name: Identify changed OCaml files
        id: changed
        run: |
          set -euo pipefail
          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.event.pull_request.head.sha }}"
          if ! git cat-file -e "$base" 2>/dev/null; then
            git fetch --no-tags --depth=1 origin "$base" || true
          fi
          files=$(git diff --name-only --diff-filter=AMR "$base...$head" -- '*.ml' '*.mli' || true)
          if [ -z "$files" ]; then
            echo "no_files=true" >> "$GITHUB_OUTPUT"
            echo "No OCaml files changed in this PR; skipping ocamlformat check."
          else
            printf '%s\n' "$files" > /tmp/changed-ocaml-files.txt
            echo "no_files=false" >> "$GITHUB_OUTPUT"
            echo "Changed OCaml files:"
            cat /tmp/changed-ocaml-files.txt
          fi

      - name: Read ocamlformat version pin
        id: pin
        if: steps.changed.outputs.no_files != 'true'
        run: |
          set -euo pipefail
          version=$(grep -E '^version' .ocamlformat | head -1 | awk -F= '{gsub(/[ \t]/,"",$2); print $2}')
          if [ -z "$version" ]; then
            echo "::error::no version pin in .ocamlformat"
            exit 1
          fi
          echo "ocamlformat_version=$version" >> "$GITHUB_OUTPUT"

      # Explicit cache scoped to ocamlformat version + ocaml-compiler + OS so a
      # second run of any PR (or a PR after a previous PR populated the same
      # ocamlformat version) reuses the opam switch instead of rebuilding it.
      # Namespace is distinct from setup-ocaml-toolchain composite (different
      # cache prefix), so no cross-contamination.
      - name: Cache opam (ocamlformat)
        if: steps.changed.outputs.no_files != 'true'
        uses: actions/cache@v6
        with:
          path: |
            ~/.opam
            ~/.local/share/opam
          key: opam-ocamlformat-${{ steps.pin.outputs.ocamlformat_version }}-ocaml-5.2-${{ runner.os }}-v1
          restore-keys: |
            opam-ocamlformat-${{ steps.pin.outputs.ocamlformat_version }}-ocaml-5.2-${{ runner.os }}-

      - name: Set up OCaml
        if: steps.changed.outputs.no_files != 'true'
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: '5.2'

      - name: Install ocamlformat
        if: steps.changed.outputs.no_files != 'true'
        run: |
          # Formatter-only CI. Install with checksum verification first so the
          # whole formatter toolchain (ocamlformat included) is integrity-checked
          # in the normal path. GitLab-generated archives for the fix/menhir
          # date tags can drift or be served as a non-archive by GitLab; only
          # when that actually fails do we pin those exact tags via git and
          # retry, leaving ocamlformat itself checksum-verified from opam.
          fmt_pkgs=(
            "fix.20250428"
            "menhir.20250912"
            "ocamlformat.${{ steps.pin.outputs.ocamlformat_version }}"
          )
          install_from_opam_archives() {
            opam install -y "${fmt_pkgs[@]}"
          }
          install_from_git_tags() {
            opam pin add -n -y fix.20250428 \
              "git+https://gitlab.inria.fr/fpottier/fix.git#20250428"
            for pkg in menhir menhirCST menhirLib menhirSdk; do
              opam pin add -n -y "${pkg}.20250912" \
                "git+https://gitlab.inria.fr/fpottier/menhir.git#20250912"
            done
            opam install -y "${fmt_pkgs[@]}"
          }
          if ! install_from_opam_archives; then install_from_git_tags; fi

      - name: Check formatting (changed files only)
        if: steps.changed.outputs.no_files != 'true'
        run: |
          set -euo pipefail
          violations=0
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            [ -f "$f" ] || continue
            if ! opam exec -- ocamlformat --check "$f" >/dev/null 2>&1; then
              echo "::error file=$f::ocamlformat violation. Local fix: opam exec -- ocamlformat -i $f"
              violations=$((violations+1))
            fi
          done < /tmp/changed-ocaml-files.txt
          if [ "$violations" -gt 0 ]; then
            echo "::error::$violations file(s) violate ocamlformat ($(opam exec -- ocamlformat --version))"
            exit 1
          fi
          echo "All changed OCaml files match ocamlformat profile."
