# ollama_cloud kimi provider-scoped rows. Capabilities mirror the
# ollama_cloud/kimi-* rows above, which are retained (provider_name absent) so
# the native-vs-cloud bare lookups in the preserve-axes gate keep resolving.
# modality_priority is intentionally omitted here: the modality gate resolves
# each provider-scoped id_prefix through the bare catalog, and the bare kimi rows
# are native Kimi (no visual_first), so declaring visual_first on these
