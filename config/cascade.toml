# Declarative cascade configuration (RFC-0058 v2 5-layer schema).
# Checked-in seed. Logical usage names are configured under [routes].

# ── Layer 1: Providers ──────────────────────────────────────────

[providers.claude_code]
provider-name = "Anthropic Claude Code CLI"
protocol = "anthropic-cli"
command = "claude"
is-non-interactive = true

[providers.codex_cli]
provider-name = "OpenAI Codex CLI"
protocol = "openai-http"
command = "codex"
is-non-interactive = true

[providers.gemini_cli]
provider-name = "Google Gemini CLI"
protocol = "google-cli"
command = "gemini"
is-non-interactive = true

[providers.kimi_cli]
provider-name = "Moonshot Kimi CLI"
protocol = "kimi-cli"
command = "kimi"
is-non-interactive = true

[providers.glm-coding]
provider-name = "Zhipu GLM Coding"
protocol = "openai-http"
endpoint = "https://open.bigmodel.cn/api/paas/v4"

[providers.ollama]
provider-name = "Ollama Local"
protocol = "ollama-http"
endpoint = "http://localhost:11434"

# ── Layer 2: Models ────────────────────────────────────────────

[models.codex-spark]
api-name = "gpt-5.3-codex-spark"
max-context = 128000
tools-support = true

[models.kimi-coding]
api-name = "kimi-for-coding"
max-context = 128000
tools-support = true

[models.sonnet]
api-name = "claude-sonnet-4-6"
max-context = 200000
tools-support = true

[models.haiku]
api-name = "claude-haiku-4-5-20251001"
max-context = 200000
tools-support = true

[models.gemini-flash]
api-name = "gemini-3-flash-preview"
max-context = 128000
tools-support = true

[models.gemini-flash-lite]
api-name = "gemini-3.1-flash-lite-preview"
max-context = 128000
tools-support = true

[models.glm-5-turbo]
api-name = "glm-5-turbo"
max-context = 128000
tools-support = true

[models.glm-flashx]
api-name = "glm-4.7-flashx"
max-context = 128000
tools-support = true

# ── Layer 3: Provider×Model Bindings ───────────────────────────

[codex_cli.codex-spark]
is-default = true

[kimi_cli.kimi-coding]
is-default = true

[claude_code.sonnet]
is-default = true

[claude_code.haiku]
is-default = false

[gemini_cli.gemini-flash]
is-default = true

[gemini_cli.gemini-flash-lite]
is-default = false

[glm-coding.glm-5-turbo]
is-default = true

[glm-coding.glm-flashx]
is-default = false

# ── Layer 4: Aliases ───────────────────────────────────────────
# (none yet)

# ── Layer 5: Tiers ─────────────────────────────────────────────

[tier.big_three]
# Canonical keeper/workflow tier. Keep operator-chosen providers here;
# code must route logical usages through [routes] instead of hardcoding.
members = ["codex_cli.codex-spark", "kimi_cli.kimi-coding"]
strategy = "failover"

[tier.keeper_diverse]
# Fallback tier for contract violation retry. Different model composition
# from big_three to break correlated failure.
members = ["claude_code.sonnet", "gemini_cli.gemini-flash", "codex_cli.codex-spark"]
strategy = "failover"

[tier.tool_rerank]
# System-only short-output tier for rerank/scoring calls.
members = ["codex_cli.codex-spark", "kimi_cli.kimi-coding"]
strategy = "failover"

[tier.tier_small]
# Operator opt-in slot for 4B-class local models. Empty by default.
# Routes fall through to tier_medium via tier-group fallback.
members = []
strategy = "failover"

[tier.tier_medium]
# 9B-class models for moderate tasks. Falls back to big_three on exhaustion.
members = ["glm-coding.glm-flashx"]
strategy = "failover"

[tier.__safe_lane]
# System-only baseline tier. Satisfies every capability profile.
# Used as last-resort fallback target. Not keeper-assignable.
members = ["kimi_cli.kimi-coding"]
strategy = "failover"

[tier.local_recovery]
# Recovery tier for fallback_cascade = "local_recovery".
# Falls back to big_three on exhaustion.
members = ["codex_cli.codex-spark"]
strategy = "failover"

[tier.tier_fast]
# Cheap+fast tool-capable cloud models for keeper turns.
# Falls back to big_three on exhaustion.
members = [
  "claude_code.haiku",
  "codex_cli.codex-spark",
  "gemini_cli.gemini-flash",
  "gemini_cli.gemini-flash-lite",
  "glm-coding.glm-5-turbo",
  "glm-coding.glm-flashx",
]
strategy = "failover"

# ── Tier-Groups ─────────────────────────────────────────────────

[tier-group.big_three-with-keeper_diverse]
tiers = ["big_three", "keeper_diverse"]
strategy = "priority_tier"
fallback = true

[tier-group.tier_small-with-tier_medium]
tiers = ["tier_small", "tier_medium"]
strategy = "priority_tier"
fallback = true

[tier-group.tier_medium-with-big_three]
tiers = ["tier_medium", "big_three"]
strategy = "priority_tier"
fallback = true

[tier-group.local_recovery-with-big_three]
tiers = ["local_recovery", "big_three"]
strategy = "priority_tier"
fallback = true

[tier-group.tier_fast-with-big_three]
tiers = ["tier_fast", "big_three"]
strategy = "priority_tier"
fallback = true

# ── Routes ──────────────────────────────────────────────────────

[routes.keeper_turn]
target = "tier.big_three"

[routes.phase_recovery]
target = "tier.big_three"

[routes.phase_buffer]
target = "tier.big_three"

[routes.tool_required]
target = "tier.big_three"

[routes.governance_judge]
target = "tier.big_three"

[routes.operator_judge]
target = "tier.big_three"

[routes.cross_verifier]
target = "tier.big_three"

[routes.verifier]
target = "tier.big_three"

[routes.autoresearch]
target = "tier.big_three"

[routes.adversarial_reviewer]
target = "tier.big_three"

[routes.auto_responder]
target = "tier.big_three"

[routes.routing]
target = "tier.big_three"

[routes.openai_compat]
target = "tier.big_three"

[routes.persona_generation]
target = "tier.big_three"

[routes.provider_benchmark]
target = "tier.big_three"

[routes.llm_rerank]
target = "tier.tool_rerank"

[routes.simple_task]
target = "tier.tier_small"

[routes.moderate_task]
target = "tier.tier_medium"

[routes.complex_task]
target = "tier.big_three"

# ── Profiles ────────────────────────────────────────────────────

[profiles.tool_strict]
required_capabilities = [
  "runtime_mcp_tools",
  "runtime_tool_events",
  "runtime_mcp_http_headers",
]

[profiles.inline_tools]
required_capabilities = ["inline_tools", "inline_tool_choice"]

[profiles.lite]
required_capabilities = ["runtime_mcp_tools", "runtime_tool_events"]

[profiles.local]
required_capabilities = []
