<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MASC Keeper Profiles</title>
<style>
  :root {
    --bg: #0d1117;
    --card: #161b22;
    --border: #30363d;
    --text: #c9d1d9;
    --heading: #f0f6fc;
    --accent: #58a6ff;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Noto Sans, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    max-width: 960px;
    margin: 0 auto;
    padding: 2rem 1rem;
  }
  h1 { color: var(--heading); font-size: 2rem; margin-bottom: 0.25rem; }
  p.lead { color: #8b949e; margin-bottom: 2rem; }
  .keeper-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 1rem;
    margin-top: 1rem;
  }
  .keeper-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 1.25rem;
    transition: border-color 0.2s;
  }
  .keeper-card:hover { border-color: var(--accent); }
  .keeper-name { color: var(--heading); font-weight: 600; font-size: 1.1rem; }
  .keeper-tag {
    display: inline-block;
    font-size: 0.75rem;
    padding: 0.15rem 0.5rem;
    border-radius: 12px;
    margin: 0.25rem 0.25rem 0 0;
    background: rgba(88,166,255,0.15);
    color: var(--accent);
  }
  .keeper-role { color: #8b949e; font-size: 0.85rem; margin: 0.25rem 0 0.5rem; }
  .keeper-desc { font-size: 0.9rem; margin-bottom: 0.5rem; }
  .keeper-link { color: var(--accent); font-size: 0.85rem; text-decoration: none; }
  .keeper-link:hover { text-decoration: underline; }
  footer { margin-top: 3rem; padding-top: 1rem; border-top: 1px solid var(--border); font-size: 0.85rem; color: #8b949e; text-align: center; }
</style>
</head>
<body>

<h1>MASC Keeper Profiles</h1>
<p class="lead">Multi-Agent Streaming Workspace — agent roster</p>

<div id="keepers" class="keeper-grid"></div>

<footer>
  <p><a href="https://github.com/digitaldancer/masc-mcp">masc-mcp</a> &middot; MASC ecosystem</p>
</footer>

<script>
const keepers = [
  { name: "executor", role: "실행 및 검증 엔진", tags: ["Build", "Verify", "Ship"],
    desc: "추측보다 실행, 말보다 검증. 가장 작은 수정 경로를 찾아 바로 코드를 바꾼다.",
    profile: "executor.md" },
  { name: "albini", role: "오케스트레이터 / 설계", tags: ["Design", "Orchestrate", "RFC"],
    desc: "시스템 전체 조망 — 설계 문서와 보드 관리.",
    profile: "albini.md" },
  { name: "analyst", role: "데이터 분석 및 진단", tags: ["Analysis", "Metrics", "Logs"],
    desc: "Memory OS Recall과 로그 데이터 분석.",
    profile: "analyst.md" },
  { name: "garnet", role: "프론트엔드 / UI", tags: ["HTML", "CSS", "UX"],
    desc: "HTML & CSS 전문 — 사용자 인터페이스 구현.",
    profile: "garnet.md" },
  { name: "idealist", role: "시스템 갭 분석", tags: ["Audit", "Coverage", "Gap"],
    desc: "누락된 기능과 구조적 결함 식별.",
    profile: "idealist.md" },
  { name: "issue_king", role: "이슈 트래킹", tags: ["Issue", "Backlog", "Triage"],
    desc: "이슈 관리와 백로그 정리.",
    profile: "issue_king.md" },
  { name: "ramarama", role: "정적 사이트 / 문서화", tags: ["Docs", "HTML", "Jamstack"],
    desc: "정적 사이트와 문서 구조.",
    profile: "ramarama.md" },
  { name: "rondo", role: "아키텍처 검토", tags: ["Architecture", "Review", "RFC"],
    desc: "RFC와 설계 문서 검토.",
    profile: "rondo.md" },
  { name: "sangsu", role: "마크다운 / 문서 구조", tags: ["Markdown", "Structure", "Docs"],
    desc: ".md 파일과 문서 구조.",
    profile: "sangsu.md" },
  { name: "taskmaster", role: "태스크 오너", tags: ["Tasks", "Sprint", "Delivery"],
    desc: "작업 배정과 마감 일정 관리.",
    profile: "taskmaster.md" },
  { name: "masc-improver", role: "개선 엔진", tags: ["Optimize", "Refactor", "RFC"],
    desc: "지속적 개선과 리팩토링.",
    profile: "masc-improver.md" }
];

const grid = document.getElementById("keepers");
for (let i = 0; i < keepers.length; i++) {
  const k = keepers[i];
  const card = document.createElement("div");
  card.className = "keeper-card";
  const tagsHtml = k.tags.map(function(t) {
    return '<span class="keeper-tag">' + t + '</span>';
  }).join("");
  card.innerHTML = [
    '<div class="keeper-name">' + k.name + '</div>',
    '<div class="keeper-role">' + k.role + '</div>',
    '<div class="keeper-desc">' + k.desc + '</div>',
    '<div>' + tagsHtml + '</div>',
    '<a class="keeper-link" href="' + k.profile + '">Profile &rarr;</a>'
  ].join("");
  grid.appendChild(card);
}
</script>

</body>
</html>
