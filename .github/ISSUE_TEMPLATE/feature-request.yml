name: Feature request
description: Propose a new capability, workflow, or public surface.
title: "[Feature] "
labels:
  - "type:feature"
body:
  - type: markdown
    attributes:
      value: |
        Use this for net-new capability work.
        Human reporters, Codex, and internal agents may all file this form.
        Choose exactly one target train below. Automation will keep `triage-required`
        on the issue until it has exactly one `type:*` and one `target:*` label.
  - type: input
    id: outcome
    attributes:
      label: Desired outcome
      placeholder: What becomes possible if this exists?
    validations:
      required: true
  - type: dropdown
    id: target
    attributes:
      label: Target train
      description: Choose the smallest plausible release lane. Triage can retarget later.
      options:
        - "target:v2.86.1"
        - "target:v2.87.0"
        - "target:v2.88.0"
        - "target:v2.89.0"
        - "target:v2.90.0"
        - "target:v2.91.0"
        - "target:v2.92.0"
        - "target:v2.93+"
        - "target:v2.148+"
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      placeholder: What is currently missing or too expensive?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed approach
      description: Rough ideas are enough. This can stay incomplete.
    validations:
      required: false
  - type: textarea
    id: non_goals
    attributes:
      label: Non-goals
      description: What should this request explicitly not try to solve?
    validations:
      required: false
