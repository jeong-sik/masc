name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
    types: [opened, synchronize, reopened]
  workflow_dispatch: {}

permissions:
  contents: read
  actions: write
  pull-requests: read

concurrency:
  # On main pushes each commit gets its own group (keyed by sha) so successive
  # merges do not abort each other's CI — every commit gets a verification
  # window. On PRs and non-main pushes, supersede outdated runs as before
  # (group keyed by ref so synchronize cancels the older run).
  group: >-
    ${{ github.workflow }}-${{ github.event.pull_request.head.repo.full_name || github.repository }}-${{
      github.event_name == 'push' && github.ref_name == 'main' && github.sha
      || github.head_ref || github.ref_name || github.run_id
    }}
  # Code-changing PR events supersede older CI for the same PR. Pushes to the
  # same branch also supersede older post-merge CI EXCEPT for main pushes —
  # main commits are independent state that must each be verified (background:
  # #14668 / #14670, 30+ main runs cancelled before TLA could complete on
  # 2026-05-11). State-only readiness is enforced by PR Automation against the
  # existing head CI Gate; it must not create a fresh required CI Gate context.
  cancel-in-progress: ${{ (github.event_name == 'push' && github.ref_name != 'main') || (github.event_name == 'pull_request' && contains(fromJSON('["opened","synchronize","reopened"]'), github.event.action)) }}

jobs:
  pr-sync-check:
    name: PR Sync Check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Verify PR sync
        env:
          PR_HEAD_REF: ${{ github.head_ref }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          chmod +x scripts/check-pr-sync.sh
          scripts/check-pr-sync.sh \
            --head-branch "$PR_HEAD_REF" \
            --pr-number "$PR_NUMBER" \
            --expected-head-sha "$PR_HEAD_SHA"

  pr-live-gate:
    name: PR Live Gate
    runs-on: ubuntu-latest
    needs: [pr-sync-check]
    if: ${{ always() && !cancelled() && (needs.pr-sync-check.result == 'success' || needs.pr-sync-check.result == 'skipped') }}
    timeout-minutes: 2
    permissions:
      pull-requests: read
    outputs:
      run_heavy: ${{ steps.live.outputs.run_heavy }}
      live_is_draft: ${{ steps.live.outputs.live_is_draft }}
      live_state: ${{ steps.live.outputs.live_state }}

    steps:
      - name: Resolve live PR state before heavy CI
        id: live
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail

          if [ "${GITHUB_EVENT_NAME}" != "pull_request" ]; then
            # This workflow only listens to branch pushes for main/develop
            # (`on.push.branches` above) plus workflow_dispatch. Tag pushes do
            # not start this workflow, so NON_PR here cannot force Build and
            # Test for tags.
            echo "run_heavy=true" >> "$GITHUB_OUTPUT"
            echo "live_is_draft=false" >> "$GITHUB_OUTPUT"
            echo "live_state=NON_PR" >> "$GITHUB_OUTPUT"
            echo "::notice::PR live gate: non-PR event=${GITHUB_EVENT_NAME}; run_heavy=true"
            exit 0
          fi

          # Retry-based PR state resolution: instead of a fixed sleep, poll
          # gh pr view with short intervals. This catches draft restoration
          # within ~3s on fast APIs while avoiding unnecessary delay on
          # non-PR events or already-settled states. Capture stderr from each
          # attempt so a persistent failure reports the underlying gh error
          # (a silent "after 3 attempts" is undebuggable).
          err_log="${RUNNER_TEMP:-/tmp}/live-pr-gate.err"
          : > "$err_log"
          for _attempt in 1 2 3; do
            if live_fields="$(gh pr view "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --json state,isDraft --jq '.state + " " + (.isDraft | tostring)' 2>"$err_log")"; then
              break
            fi
            sleep 1
          done

          if [ -z "${live_fields:-}" ]; then
            echo "::error::Could not resolve live PR state for #${PR_NUMBER} after 3 attempts: $(cat "$err_log")"
            exit 1
          fi
          live_state="${live_fields%% *}"
          live_is_draft="${live_fields#* }"

          if [ -z "$live_state" ] || { [ "$live_is_draft" != "true" ] && [ "$live_is_draft" != "false" ]; }; then
            echo "::error::Could not resolve live PR state for #${PR_NUMBER}: ${live_fields}"
            exit 1
          fi

          # Heavy CI runs whenever the PR is live (OPEN), regardless of draft
          # status. Earlier we skipped draft PRs to save CI minutes, but the
          # masc fast-track pattern (open Draft → mark ready → admin-merge
          # within seconds) means the build/lint/test surfaces almost never
          # got a chance to run. Two visible failures from that gap this week:
          # - masc #15531 (Tool_args / Tool_result sub-lib extract) merged
          #   main in a non-building state; recovered by #15540.
          # - oas #1596 (turn_ready_tool_names signature narrow) — same shape,
          #   recovered by oas #1599.
          # Running heavy CI on draft PRs costs minutes but catches both
          # classes of regression *before* the admin-merge decision instead
          # of after, when the only remaining lever is fix-forward.
          # Closed/merged PRs still skip — there is nothing to verify there.
          run_heavy=true
          if [ "$live_state" != "OPEN" ]; then
            run_heavy=false
          fi

          echo "run_heavy=${run_heavy}" >> "$GITHUB_OUTPUT"
          echo "live_is_draft=${live_is_draft}" >> "$GITHUB_OUTPUT"
          echo "live_state=${live_state}" >> "$GITHUB_OUTPUT"
          echo "::notice::PR live gate: state=${live_state:-unknown} draft=${live_is_draft:-unknown} run_heavy=${run_heavy}"

  changes:
    name: Detect Changed Surfaces
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [pr-live-gate]
    if: ${{ always() && !cancelled() && needs.pr-live-gate.outputs.run_heavy == 'true' }}
    outputs:
      build: ${{ steps.scope.outputs.build }}
      lint: ${{ steps.scope.outputs.lint }}
      dashboard: ${{ steps.scope.outputs.dashboard }}
      health: ${{ steps.scope.outputs.health }}
      health_snapshot: ${{ steps.scope.outputs.health_snapshot }}
      lib_deps: ${{ steps.scope.outputs.lib_deps }}
      doc_truth: ${{ steps.scope.outputs.doc_truth }}
      tla: ${{ steps.scope.outputs.tla }}
      oas_pin: ${{ steps.scope.outputs.oas_pin }}
      spec_refs: ${{ steps.scope.outputs.spec_refs }}
      nav_event_parity: ${{ steps.scope.outputs.nav_event_parity }}
      shell_ir: ${{ steps.scope.outputs.shell_ir }}
      keeper_cwd: ${{ steps.scope.outputs.keeper_cwd }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Detect scope
        id: scope
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_BASE_REF: ${{ github.base_ref }}
          GITHUB_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          GITHUB_BEFORE: ${{ github.event.before }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          emit_all_true() {
            for key in build lint dashboard health health_snapshot lib_deps doc_truth tla oas_pin spec_refs nav_event_parity shell_ir keeper_cwd; do
              echo "${key}=true" >> "$GITHUB_OUTPUT"
            done
          }

          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            emit_all_true
            echo "::notice::workflow_dispatch forces every CI surface to run"
            exit 0
          fi

          changed_file_list="$(mktemp)"
          base_ref=""
          head_ref="${GITHUB_SHA}"

          if [ "${GITHUB_EVENT_NAME}" = "pull_request" ]; then
            bash scripts/ci/git-fetch-retry.sh origin "${GITHUB_BASE_REF}" --depth=200
            head_ref="${GITHUB_HEAD_SHA}"
            base_branch_ref="origin/${GITHUB_BASE_REF}"
            if ! merge_base="$(git merge-base "${base_branch_ref}" "${head_ref}")"; then
              echo "::warning::Unable to resolve PR merge-base at depth=200; deepening ${GITHUB_BASE_REF} history"
              bash scripts/ci/git-fetch-retry.sh origin "${GITHUB_BASE_REF}" --deepen=1000
              merge_base="$(git merge-base "${base_branch_ref}" "${head_ref}")"
            fi
            base_ref="${merge_base}"
          elif [ -n "${GITHUB_BEFORE}" ] && [ "${GITHUB_BEFORE}" != "0000000000000000000000000000000000000000" ]; then
            base_ref="${GITHUB_BEFORE}"
          fi

          if [ -n "${base_ref}" ]; then
            git diff --name-only "${base_ref}" "${head_ref}" > "${changed_file_list}"
          else
            git ls-files > "${changed_file_list}"
          fi

          if [ ! -s "${changed_file_list}" ]; then
            git ls-files > "${changed_file_list}"
          fi

          echo "Changed files:"
          sed 's/^/  - /' "${changed_file_list}"

          has_match() {
            grep -Eq "$1" "${changed_file_list}"
          }

          ci_core=false
          build=false
          lint=false
          dashboard=false
          health=false
          health_snapshot=false
          lib_deps=false
          doc_truth=false
          tla=false
          oas_pin=false
          spec_refs=false
          nav_event_parity=false
          shell_ir=false
          keeper_cwd=false

          if has_match '^(\.github/workflows/ci\.yml|\.github/actions/)'; then
            ci_core=true
          fi

          # The build trigger must stay a SUPERSET of the dune build graph.
          # ci-gate treats a skipped required job as PASS (see check() near
          # line 1206), so any code-bearing PR that does NOT set build=true
          # merges with a green "CI Gate" while the Build job (dune compile)
          # never ran. The prefix list below (bin/ lib/ test/ proto/ config/)
          # missed build-graph dirs examples/ ppx/ ppx_tla/ test_lib/ tools/
          # and the root dune file, so a PR touching only those compiled
          # nowhere yet reported success. Match any OCaml/dune source plus C
          # foreign stubs by suffix so new source dirs are covered without
          # editing this list, and keep explicit prefixes for Dune-declared
          # non-source deps (e.g. tools/tlc_test_gen/test/fixtures/*.tla).
          # Over-triggering on dune-excluded dirs (archive/, dashboard_bonsai/
          # per the root dune (dirs ...) stanza) is harmless: the Build job
          # runs but dune build skips those dirs.
          if has_match '^(bin/|lib/|test/|proto/|config/|tools/tlc_test_gen/|dune-project$|dune-workspace$|.*\.opam$|.*\.ml$|.*\.mli$|.*\.mll$|.*\.mly$|.*\.c$|.*\.h$|(.*/)?dune$|scripts/ci-run-tests\.sh$|scripts/release-binary-smoke\.sh$|scripts/release-evidence\.sh$|scripts/install\.sh$|scripts/harness/contract/|scripts/harness/transport/|scripts/harness/lib/server_bootstrap\.sh$)'; then
            build=true
          fi

          # The lint trigger set must stay a superset of every path the Lint
          # job reads. scripts/check-ssot.sh R6 scans bin/ lib/ scripts/ docs/,
          # so docs/ and scripts/ (whole tree, not just the curated entries)
          # must trigger Lint — otherwise a docs-only or scripts-only PR can
          # merge gate-skipped while pushing an R6 count past its baseline,
          # breaking Lint for every subsequent PR (#20729: RFC docs #20717 /
          # #20718 landed bare ~/.masc paths and took main's Lint red).
          # scripts/ subsumes the previously enumerated scripts/* entries.
          if has_match '^(bin/|lib/|test/|proto/|config/|docs/|scripts/|dune-project$|dune-workspace$|.*\.opam$|dashboard/src/)'; then
            lint=true
          fi

          if has_match '^dashboard/'; then
            dashboard=true
          fi

          if has_match '^(bin/|lib/|test/|proto/|config/|\.ci/health-baseline\.json$|dune-project$|.*\.opam$|scripts/health_snapshot\.sh$|scripts/anti-fake-audit\.sh$|scripts/base-policy-audit\.sh$)'; then
            health=true
          fi

          if has_match '^(bin/|lib/|test/|proto/|config/|\.ci/health-baseline\.json$|dune-project$|.*\.opam$|scripts/health_snapshot\.sh$|scripts/anti-fake-audit\.sh$|scripts/base-policy-audit\.sh$)'; then
            health_snapshot=true
          fi

          if has_match '^(\.github/workflows/ci\.yml|lib/|dune-project$|dune-workspace$|.*\.opam$|scripts/analyze_lib_deps\.py$|scripts/lib_dep_report\.py$|scripts/lib_dep_delta_ci\.sh$|scripts/audit-sublib-cycle\.py$)'; then
            lib_deps=true
          fi

          if has_match '^(docs/|README\.md$|ROADMAP\.md$|CHANGELOG\.md$|dune-project$|.*\.opam$|scripts/check-doc-truth\.sh$|scripts/check-version-truth\.sh$|scripts/check-oas-pin\.sh$|scripts/oas-agent-sdk-pin\.sh$|scripts/sync-oas-pin-docs\.sh$|scripts/sync-oas-pin-manifests\.sh$|scripts/release-binary-smoke\.sh$|scripts/release-evidence\.sh$|scripts/install\.sh$)'; then
            doc_truth=true
          fi

          if has_match '^(specs/.*\.(tla|cfg)$|specs/Makefile$|lib/keeper/|lib/keeper_registry/|lib/oas_.*\.ml$|Makefile$)'; then
            tla=true
          fi

          if has_match '^(ci/check-oas-pin\.sh$|scripts/check-oas-pin\.sh$|scripts/oas-agent-sdk-pin\.sh$|scripts/sync-oas-pin-docs\.sh$|scripts/sync-oas-pin-manifests\.sh$|dune-project$|.*\.opam$|masc\.opam\.locked$|docs/KEEPER-USER-MANUAL\.md$|docs/OAS-UTILIZATION-AUDIT\.md$)'; then
            oas_pin=true
          fi

          if has_match '^(specs/.*\.tla$|lib/.*\.mli?$|test/.*\.mli?$|src/.*\.mli?$|scripts/lint/spec-line-refs\.(sh|allowlist)$)'; then
            spec_refs=true
          fi

          if has_match '^(dashboard/src/config/navigation\.ts|dashboard/src/types/sse\.ts|lib/dashboard/dashboard_nav_event\.ml|scripts/check-dashboard-nav-event-parity\.sh)$'; then
            nav_event_parity=true
          fi

          if has_match '^(lib/|scripts/audit-shell-ir-consumption\.sh$|scripts/shell-ir-consumption-baseline\.json$|\.github/workflows/ci\.yml$)'; then
            shell_ir=true
          fi

          if has_match '^(lib/keeper/|scripts/keeper-cwd-leak-gate\.sh$|\.github/workflows/ci\.yml$)'; then
            keeper_cwd=true
          fi

          if [ "${ci_core}" = true ]; then
            # Self-reference guard: edits to this workflow or local actions
            # set ci_core=true above, then force the core CI surfaces below.
            # Therefore a PR changing ci.yml cannot avoid Build and Test via
            # the path classifier it is editing.
            build=true
            lint=true
            health=true
            health_snapshot=true
            lib_deps=true
            doc_truth=true
            oas_pin=true
            shell_ir=true
            keeper_cwd=true
            # Note: dashboard/spec_refs/tla stay path-scoped. Pure CI
            # workflow/action edits should still validate the core OCaml/repo
            # guard lanes and Health, but they should not fan out into every
            # feature surface.
          fi

          echo "build=${build}" >> "$GITHUB_OUTPUT"
          echo "lint=${lint}" >> "$GITHUB_OUTPUT"
          echo "dashboard=${dashboard}" >> "$GITHUB_OUTPUT"
          echo "health=${health}" >> "$GITHUB_OUTPUT"
          echo "health_snapshot=${health_snapshot}" >> "$GITHUB_OUTPUT"
          echo "lib_deps=${lib_deps}" >> "$GITHUB_OUTPUT"
          echo "doc_truth=${doc_truth}" >> "$GITHUB_OUTPUT"
          echo "tla=${tla}" >> "$GITHUB_OUTPUT"
          echo "oas_pin=${oas_pin}" >> "$GITHUB_OUTPUT"
          echo "spec_refs=${spec_refs}" >> "$GITHUB_OUTPUT"
          echo "nav_event_parity=${nav_event_parity}" >> "$GITHUB_OUTPUT"
          echo "shell_ir=${shell_ir}" >> "$GITHUB_OUTPUT"
          echo "keeper_cwd=${keeper_cwd}" >> "$GITHUB_OUTPUT"

          printf 'CI scope => build=%s lint=%s dashboard=%s health=%s health_snapshot=%s lib_deps=%s doc_truth=%s tla=%s oas_pin=%s nav_event_parity=%s shell_ir=%s keeper_cwd=%s\n' \
            "${build}" "${lint}" "${dashboard}" "${health}" "${health_snapshot}" "${lib_deps}" "${doc_truth}" "${tla}" "${oas_pin}" "${nav_event_parity}" "${shell_ir}" "${keeper_cwd}"

  meta:
    name: Meta Guards
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [pr-live-gate, changes]
    if: ${{ always() && !cancelled() && needs.pr-live-gate.outputs.run_heavy == 'true' && needs.changes.result == 'success' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Install meta shell dependencies
        run: |
          bash scripts/ci/apt-refresh.sh
          sudo apt-get install -y -qq ripgrep

      - name: Guard pending release tag on main PRs
        if: github.event_name == 'pull_request' && github.base_ref == 'main'
        env:
          BASE_REF: origin/${{ github.base_ref }}
          HEAD_REF: ${{ github.event.pull_request.head.sha }}
        run: |
          chmod +x scripts/check-release-train-guard.sh
          bash scripts/ci/git-fetch-retry.sh origin "${{ github.base_ref }}" --depth=100 --tags
          scripts/check-release-train-guard.sh \
            --base "$BASE_REF" \
            --head "$HEAD_REF"

      - name: Run PR hygiene guards
        if: github.event_name == 'pull_request'
        env:
          BASE_REF: origin/${{ github.base_ref }}
          HEAD_REF: ${{ github.event.pull_request.head.sha }}
        run: |
          chmod +x scripts/check-pr-hygiene.sh
          bash scripts/ci/git-fetch-retry.sh origin "${{ github.base_ref }}" --depth=100
          scripts/check-pr-hygiene.sh \
            --base "$BASE_REF" \
            --head "$HEAD_REF" \
            --recent-main 50 \
            --duplicate-policy warn

      - name: Check doc truth
        if: needs.changes.outputs.doc_truth == 'true'
        run: |
          chmod +x scripts/check-doc-truth.sh scripts/sync-oas-pin-docs.sh scripts/audit-keeper-tool-boundary-matrix.sh
          scripts/check-doc-truth.sh
          scripts/sync-oas-pin-docs.sh --check
          scripts/audit-keeper-tool-boundary-matrix.sh

      - name: Check OAS pin consistency
        if: needs.changes.outputs.oas_pin == 'true'
        run: |
          chmod +x scripts/check-oas-pin.sh
          scripts/check-oas-pin.sh --local-only

      - name: Run report self-test
        if: needs.changes.outputs.lib_deps == 'true'
        run: python3 scripts/lib_dep_report.py --self-test

      - name: Check Execute async surface contract
        run: bash scripts/check-execute-async-surface.sh

      - name: Sublib boundary gate self-test (RFC-0056 G1)
        if: needs.changes.outputs.lib_deps == 'true'
        run: python3 scripts/audit-sublib-cycle.py --self-test

      - name: Generate lib dependency delta
        if: needs.changes.outputs.lib_deps == 'true'
        run: bash scripts/lib_dep_delta_ci.sh

      - name: Upload lib dependency reports
        if: needs.changes.outputs.lib_deps == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: lib-dependency-delta
          path: |
            reports/lib-dependency-graph.json
            reports/lib-dependency-graph.baseline.json
            reports/lib-dependency-summary.md
            reports/lib-dependency-summary.json

      - name: Validate spec line refs
        if: needs.changes.outputs.spec_refs == 'true'
        run: bash scripts/lint/spec-line-refs.sh

      - name: Check dashboard nav-event allowlist parity
        if: needs.changes.outputs.nav_event_parity == 'true'
        run: |
          chmod +x scripts/check-dashboard-nav-event-parity.sh
          scripts/check-dashboard-nav-event-parity.sh --check

      - name: Check sandbox dune version alignment
        run: |
          chmod +x scripts/check-sandbox-dune-version.sh
          scripts/check-sandbox-dune-version.sh

      - name: Meta bug-class gates (SSOT, SIL, STR, BND)
        run: |
          chmod +x scripts/ci/*.sh
          echo "=== Running meta bug-class gates (see #9516 #9517 #9519 #9521) ==="
          bash scripts/ci/check-ssot-spawn-drift.sh
          bash scripts/check-spec-truth.sh
          bash scripts/ci/check-silent-failure-patterns.sh
          bash scripts/ci/check-enum-string-safety.sh
          bash scripts/ci/check-masc-oas-boundary.sh
          bash scripts/ci/check-publication-recovery-test-boundary.sh
          bash scripts/ci/check-tla-variant-sync.sh
          bash scripts/ci/check-tla-harness-coverage.sh
          bash scripts/ci/check-telemetry-coverage.sh
          bash scripts/ci/check-determinism-contract.sh
          bash scripts/audit-hardcoding-truth.sh --fail-on-confirmed
          bash scripts/ci/check-credential-audits.sh
          bash scripts/ci/check-persona-profile-placeholders.sh
          bash scripts/ci/check-accept-fd-lifecycle.sh
          bash scripts/ci/check-actor-consumer-wired.sh
          bash scripts/ci/check-log-severity-anti-patterns.sh
          bash scripts/ci/check-stream-create-bounded.sh
          bash scripts/ci/check-drain-loop-yields.sh

      - name: Hardening ratchet (P0 evidence gate)
        run: |
          mkdir -p reports
          bash scripts/hardening-ratchet.sh \
            --check \
            --fail-on-critical \
            --json-out reports/hardening-ratchet.json

      - name: Upload hardening ratchet report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: hardening-ratchet
          path: reports/hardening-ratchet.json

  health:
    name: Health
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [pr-live-gate, changes]
    if: ${{ always() && !cancelled() && needs.pr-live-gate.outputs.run_heavy == 'true' && needs.changes.result == 'success' && needs.changes.outputs.health == 'true' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install health shell dependencies
        run: |
          bash scripts/ci/apt-refresh.sh
          sudo apt-get install -y -qq ripgrep bc

      - name: Setup OCaml toolchain
        if: needs.changes.outputs.health_snapshot == 'true'
        uses: ./.github/actions/setup-ocaml-toolchain

      - name: Pin external OCaml dependencies
        if: needs.changes.outputs.health_snapshot == 'true'
        uses: ./.github/actions/pin-ocaml-deps
        with:
          pin-flags: --with-bisect

      - name: Install system and OCaml dependencies
        if: needs.changes.outputs.health_snapshot == 'true'
        uses: ./.github/actions/install-ocaml-deps
        with:
          install-flags: --with-test

      - name: Fetch baseline for health ratchet
        if: needs.changes.outputs.health_snapshot == 'true'
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_BASE_REF: ${{ github.base_ref }}
          GITHUB_BEFORE: ${{ github.event.before }}
        run: |
          set -euo pipefail
          zero_sha="0000000000000000000000000000000000000000"
          if [ "${GITHUB_EVENT_NAME}" = "pull_request" ]; then
            bash scripts/ci/git-fetch-retry.sh origin "${GITHUB_BASE_REF}" --depth=1
          elif [ "${GITHUB_EVENT_NAME}" = "push" ] && [ -n "${GITHUB_BEFORE}" ] && [ "${GITHUB_BEFORE}" != "${zero_sha}" ]; then
            bash scripts/ci/git-fetch-retry.sh origin "${GITHUB_BEFORE}" --depth=1
          else
            echo "No health baseline ref for ${GITHUB_EVENT_NAME}; snapshot will run without ratchet gating"
          fi

      - name: Run health snapshot
        if: needs.changes.outputs.health_snapshot == 'true'
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_BASE_REF: ${{ github.base_ref }}
          GITHUB_BEFORE: ${{ github.event.before }}
        run: |
          set -euo pipefail
          chmod +x scripts/health_snapshot.sh scripts/anti-fake-audit.sh scripts/base-policy-audit.sh
          zero_sha="0000000000000000000000000000000000000000"
          baseline_ref=""
          if [ "${GITHUB_EVENT_NAME}" = "pull_request" ]; then
            baseline_ref="origin/${GITHUB_BASE_REF}"
          elif [ "${GITHUB_EVENT_NAME}" = "push" ] && [ -n "${GITHUB_BEFORE}" ] && [ "${GITHUB_BEFORE}" != "${zero_sha}" ]; then
            baseline_ref="${GITHUB_BEFORE}"
          fi

          if [ -n "${baseline_ref}" ]; then
            opam exec -- bash scripts/health_snapshot.sh \
              --json-out .health/health-snapshot.json \
              --baseline-ref "${baseline_ref}" \
              --fail-on-lib-regression
          else
            opam exec -- bash scripts/health_snapshot.sh \
              --json-out .health/health-snapshot.json \
              --baseline-file .ci/health-baseline.json
          fi

      - name: Upload health snapshot
        if: needs.changes.outputs.health_snapshot == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: health-snapshot
          path: .health/health-snapshot.json

  build:
    name: Build and Test
    runs-on: ubuntu-latest
    timeout-minutes: 90
    needs: [pr-live-gate, changes]
    # Main-push safety-net (mirrors `dashboard` job below). Non-PR events
    # (branch push to main/develop, workflow_dispatch) always run Build and Test
    # so a lib/ regression introduced by a non-build-path change (e.g. a dashboard-only
    # merge) is detected on the next main push instead of persisting silently
    # behind a green "CI Gate" — ci-gate check() treats a skipped required job as
    # PASS. Tag pushes do not start this workflow because `on.push.branches`
    # excludes tags. PR events keep the build-scope gate (cost saving)
    # unchanged. The `needs.changes.result == 'success'` clause is intentional:
    # Build consumes `changes` outputs, so a failed/skipped changes job should
    # not synthesize default build inputs even though `always()` keeps this
    # condition evaluable.
    if: ${{ always() && !cancelled() && needs.pr-live-gate.outputs.run_heavy == 'true' && needs.changes.result == 'success' && (needs.changes.outputs.build == 'true' || needs.pr-live-gate.outputs.live_state == 'NON_PR') }}
    # Flake-handling policy (hard-required tests):
    #   - `continue-on-error` is intentionally absent: compile failures and
    #     every test suite are merge-blocking.
    #   - Dune-based test commands (quick suite, operator-control, SSE e2e) are
    #     run through scripts/ci-run-tests.sh, which performs one isolated-
    #     build-dir retry for CI-only flakes (RPC lock, interface mismatch,
    #     resource exhaustion) when CI_TEST_ALLOW_FLAKY_RETRY=1.
    #   - Non-dune harness suites (transport, contract) get a workflow-level
    #     shell retry wrapper below so they are not left without mitigation.
    #   - Disk-exhaustion failures are non-retryable; the script emits explicit
    #     repair guidance instead of masking the error.
    # See: https://github.com/jeong-sik/masc/issues/2957
    steps:
      - name: Free disk space
        # ubuntu-latest starts with roughly 14 GB free but preinstalls the
        # Android SDK (~9 GB), .NET (~1.6 GB), GHC/Haskell (~1 GB) and the
        # CodeQL bundle (~5 GB) that this OCaml build never uses. Removing them
        # reclaims about 15 GB and prevents the recurring "No space left on
        # device" failures in this job (heavy dune build, _build artifacts and
        # test runners exceed the default free space; runs 28638901622 /
        # 28644587505 / 28652695346 all died this way on 2026-07-03). This is a
        # preventive measure that complements the non-retryable repair guidance
        # emitted by scripts/ci-run-tests.sh. Alternative considered and
        # rejected for cost: a paid larger runner.
        # See: https://github.com/jeong-sik/masc/issues/22954
        run: |
          set -euo pipefail
          echo "Disk before cleanup:"
          df -h /
          sudo rm -rf /usr/local/lib/android || true
          sudo rm -rf /usr/share/dotnet || true
          sudo rm -rf /opt/ghc /usr/local/.ghcup || true
          sudo rm -rf /opt/hostedtoolcache/CodeQL || true
          sudo docker image prune --all --force || true
          echo "Disk after cleanup:"
          df -h /

      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup OCaml toolchain
        uses: ./.github/actions/setup-ocaml-toolchain
        with:
          dune-cache-save: "true"

      - name: Pin external OCaml dependencies
        uses: ./.github/actions/pin-ocaml-deps
        with:
          pin-flags: --with-bisect

      - name: Install system and OCaml dependencies
        uses: ./.github/actions/install-ocaml-deps
        with:
          install-flags: --with-test
          os-packages: jq ripgrep

      - name: Install grpcurl
        env:
          GRPCURL_VERSION: "1.9.3"
          GRPCURL_SHA256: "a926b62a85787ccf73ef8736b3ae554f1242e39d92bb8767a79d6dd23b11d1d5"
        run: |
          set -euo pipefail

          asset="grpcurl_${GRPCURL_VERSION}_linux_x86_64.tar.gz"
          url="https://github.com/fullstorydev/grpcurl/releases/download/v${GRPCURL_VERSION}/${asset}"
          archive="${RUNNER_TEMP}/${asset}"
          bin_dir="${RUNNER_TEMP}/grpcurl-bin"

          curl -fsSL --retry 3 --retry-delay 5 --retry-all-errors "${url}" -o "${archive}"
          (cd "${RUNNER_TEMP}" && printf '%s  %s\n' "${GRPCURL_SHA256}" "${asset}" | sha256sum -c -)

          mkdir -p "${bin_dir}"
          tar -xzf "${archive}" -C "${bin_dir}" grpcurl
          chmod +x "${bin_dir}/grpcurl"
          echo "${bin_dir}" >> "$GITHUB_PATH"
          "${bin_dir}/grpcurl" -version

      - name: Build
        id: build_step
        env:
          # Group 1 links hundreds of native test executables against the full
          # masc_test_deps graph. Serializing this build bounds concurrent
          # native-link disk pressure without changing the test backend or
          # dropping native Domain/C-stub coverage.
          DUNE_JOBS: "1"
        # NO continue-on-error: dune build is deterministic and must hard-fail.
        # Test execution steps below are also required: any failing test suite
        # now fails the Build and Test job and blocks merge via the CI Gate.
        # See: PR #11721 followup, memory feedback_admin_merge_can_bypass_build_ci.md.
        run: |
          set -euo pipefail

          # @default alone does not compile test dirs outside the executed
          # runtest subset, so a PR that breaks test compilation can land
          # green (#23196/#23211/#23353 landed that way on 2026-07-04~06).
          # @check compiles every library/executable/test without running.
          opam exec -- dune build --root . @default @check &
          build_pid=$!

          (
            elapsed=0
            while kill -0 "${build_pid}" 2>/dev/null; do
              sleep 60
              elapsed=$((elapsed + 60))
              if kill -0 "${build_pid}" 2>/dev/null; then
                echo "[ci-heartbeat] dune build still running (${elapsed}s elapsed)"
              fi
            done
          ) &
          heartbeat_pid=$!

          set +e
          wait "${build_pid}"
          build_status=$?
          set -e

          kill "${heartbeat_pid}" 2>/dev/null || true
          wait "${heartbeat_pid}" 2>/dev/null || true
          exit "${build_status}"

      - name: Sublib boundary gate against real dune graph (RFC-0056 G1)
        # The self-test (in the Meta Guards job) only validates the checker
        # against synthetic fixtures. This step runs the SAME checker against
        # the REAL dependency graph emitted by `dune describe`, asserting that
        # the extracted leaf libraries (masc_goal, attribution, exec_policy,
        # keeper_state, masc_tool_dispatch) never re-acquire a transitive
        # `requires` edge back into the flat mega-library `masc`.
        #
        # Hard-fail (no continue-on-error): a future PR that re-couples a leaf
        # to the mega-lib via its dune (libraries ...) must block merge. As of
        # wiring (2026-06-04) the real graph is CLEAN, so --fail mode is safe.
        #
        # Why here and not next to the self-test (Meta Guards, ~L385): that job
        # is shell-only (ripgrep, no OCaml toolchain). `dune describe` requires
        # the toolchain that only this Build job sets up. We invoke dune through
        # `opam exec` (bare `dune` is not on PATH in CI) and feed the captured
        # describe sexp to the pure-python checker via --describe-file.
        # See: docs/rfc/RFC-0056-incremental-sublib-extraction.md G1, #19824.
        run: |
          opam exec -- dune describe --root . > "$RUNNER_TEMP/sublib-describe.sexp"
          python3 scripts/audit-sublib-cycle.py --describe-file "$RUNNER_TEMP/sublib-describe.sexp"

      - name: Runtime TOML validity gate
        # RFC-0058 §9: config/keeper_runtime.toml is the authoring SSOT.
        # runtime.json is no longer generated or committed, so the old
        # runtime_materialize CLI is retired. This focused test renders
        # the TOML in memory, validates the declarative catalog, and
        # proves config/runtime.json has not reappeared as a tracked
        # second source of truth.
        # See: test/test_runtime_config_validity.ml.
        run: |
          opam exec -- dune build --root . @test/runtest-test_runtime_config_validity

      # NOTE: the "Shell IR differential-safety harness gate" step was removed
      # here. #24332 (nonhierarchical Gate refactor) retired the entire
      # shell_ir risk/typed subsystem (Shell_ir_risk, Shell_ir_typed,
      # checked_shell_ir — now zero consumers; exec risk moved to the Gate),
      # including lib/exec/test/test_shell_ir_differential.ml. The orphaned
      # gate built @lib/exec/test/runtest-test_shell_ir_differential, an empty
      # alias, hard-failing main (issue #24352). Restoring is infeasible (the
      # tested subsystem is gone); removing the dead gate completes #24332.
      - name: Env knob catalog drift gate
        # Detects when lib/config/env_config_*.ml has been edited
        # (new MASC_* env var added, doc reworded, knob removed) but
        # docs/runtime-tunables.md was not regenerated. The catalog
        # is purely derivative and should never drift from source.
        # See: bin/env_knob_catalog.ml, issue #10733.
        run: |
          opam exec -- dune exec --root . ./bin/env_knob_catalog.exe -- \
            docs/runtime-tunables.md
          if ! git diff --exit-code docs/runtime-tunables.md; then
            echo "::error::docs/runtime-tunables.md is stale relative to lib/config/env_config_*.ml. Run 'dune exec ./bin/env_knob_catalog.exe -- docs/runtime-tunables.md' locally and commit the result."
            exit 1
          fi

      - name: SSE TypeScript codegen drift gate
        # RFC-0004 Phase A0.2 PR-2: dashboard/src/schemas/sse_event_generated.ts
        # is regenerated by atdts from lib/sse_event/sse_event.atd
        # (lib SSOT established in Phase A0.1).  If the .atd changes
        # without re-running the codegen script, the committed .ts
        # drifts and dashboard consumers parse against a stale schema.
        # See: dashboard/scripts/gen-sse-types.sh, RFC-0004 Phase A0.2.
        run: |
          chmod +x dashboard/scripts/gen-sse-types.sh
          opam exec -- dashboard/scripts/gen-sse-types.sh --check

      - name: Install eio-trace
        continue-on-error: true
        run: |
          # Diagnostic-only. Avoid opam depexts here: GTK/cairo system
          # packages can consume the step before the quick suite runs.
          timeout 45s opam install -y --no-depexts eio-trace \
            || echo "::warning::eio-trace install skipped"

      - name: Run tests (quick suite)
        id: quick_suite
        # scripts/ci-run-tests.sh has its own 2100s timeout and diagnostics,
        # but this step-level bound keeps a stuck timeout/diagnostic path from
        # holding the shared runner for the full Build and Test job budget.
        timeout-minutes: 40
        env:
          ME_ROOT: /tmp/me
          ALCOTEST_QUICK_TESTS: "1"
          MASC_INCLUDE_OPERATOR_CONTROL: "false"
          CI_TEST_TIMEOUT_SEC: 2100
          CI_TEST_HEARTBEAT_SEC: 30
          CI_TEST_ALLOW_FLAKY_RETRY: "1"
          MASC_LOCAL_RUNTIMES_JSON: '[{"base_url":"http://127.0.0.1:8085","max_concurrency":4}]'
          MASC_KEEPER_MSG_TIMEOUT_MAX_SEC: "10"
          MASC_E2E_TESTS: "true"
          # Reduce parallelism to minimize Eio fiber scheduling flakes.
          # See: https://github.com/jeong-sik/masc/issues/2957
          DUNE_JOBS: 1
        run: |
          mkdir -p /tmp/me
          chmod +x scripts/ci-run-tests.sh
          scripts/ci-run-tests.sh "opam exec -- dune test --root ."

      - name: Upload test diagnostics on failure
        if: ${{ failure() && steps.quick_suite.outcome == 'failure' }}
        uses: actions/upload-artifact@v7
        with:
          name: test-diagnostics-quick-suite-${{ github.run_id }}
          path: |
            _build/log
            _build/default/test/_build/_tests/**/*.output
            /tmp/ci-run-tests.*.log
          retention-days: 7

      - name: Upload eio-trace on failure
        if: ${{ failure() && steps.quick_suite.outcome == 'failure' }}
        uses: actions/upload-artifact@v7
        with:
          name: eio-trace-quick-suite-${{ github.run_id }}
          path: |
            _build/default/**/*.trace
            /tmp/eio-trace-*
          retention-days: 7

      - name: Run operator control suite
        id: operator_control_suite
        # Run regardless of earlier test failures, but only after a successful
        # compile, so every suite gets a chance to report and the job fails if
        # any suite fails.
        if: ${{ always() && steps.build_step.outcome == 'success' }}
        env:
          ME_ROOT: /tmp/me
          ALCOTEST_QUICK_TESTS: "1"
          CI_TEST_TIMEOUT_SEC: 600
          CI_TEST_HEARTBEAT_SEC: 15
          CI_TEST_ALLOW_FLAKY_RETRY: "1"
          MASC_LOCAL_RUNTIMES_JSON: '[{"base_url":"http://127.0.0.1:8085","max_concurrency":4}]'
          MASC_KEEPER_MSG_TIMEOUT_MAX_SEC: "10"
          MASC_E2E_TESTS: "true"
          DUNE_JOBS: 1
        run: |
          mkdir -p /tmp/me
          chmod +x scripts/ci-run-tests.sh
          operator_targets="@test/runtest-test_operator_control_snapshot_state @test/runtest-test_operator_control_snapshot @test/runtest-test_operator_control_snapshot_cache"
          scripts/ci-run-tests.sh "opam exec -- dune build --root . ${operator_targets}"

      - name: Run SSE reconnect e2e
        id: sse_reconnect_e2e
        if: ${{ always() && steps.build_step.outcome == 'success' }}
        env:
          ME_ROOT: /tmp/me
          CI_TEST_TIMEOUT_SEC: 900
          CI_TEST_HEARTBEAT_SEC: 15
          CI_TEST_ALLOW_FLAKY_RETRY: "1"
          DUNE_JOBS: 1
          MASC_E2E_TESTS: "true"
        run: |
          mkdir -p /tmp/me
          chmod +x scripts/ci-run-tests.sh
          scripts/ci-run-tests.sh "opam exec -- dune exec --root . ./test/test_sse_storm_e2e.exe"

      - name: Run transport harness suite
        id: transport_harness_suite
        if: ${{ always() && steps.build_step.outcome == 'success' }}
        env:
          ME_ROOT: /tmp/me
          CI_TEST_TIMEOUT_SEC: 900
          CI_TEST_HEARTBEAT_SEC: 15
          CI_TEST_ALLOW_FLAKY_RETRY: "1"
          DUNE_JOBS: 1
        run: |
          mkdir -p /tmp/me
          chmod +x scripts/ci-run-tests.sh
          chmod +x scripts/harness/transport/run_all.sh
          chmod +x scripts/harness/transport/verify_sse.sh
          chmod +x scripts/harness/transport/verify_grpc_subscribe.sh
          chmod +x scripts/harness/transport/verify_h2c_autodetect.sh
          chmod +x scripts/harness/transport/verify_ws.sh
          chmod +x scripts/harness/transport/verify_webrtc_signaling.sh
          chmod +x scripts/harness/lib/server_bootstrap.sh
          run_suite() {
            scripts/ci-run-tests.sh "bash scripts/harness/transport/run_all.sh"
          }
          if run_suite; then
            exit 0
          fi
          echo "::warning::transport harness suite failed; retrying once"
          run_suite

      - name: Run contract harness suite
        id: contract_harness_suite
        if: ${{ always() && steps.build_step.outcome == 'success' }}
        env:
          ME_ROOT: /tmp/me
          CI_TEST_TIMEOUT_SEC: 900
          CI_TEST_HEARTBEAT_SEC: 15
          CI_TEST_ALLOW_FLAKY_RETRY: "1"
          DUNE_JOBS: 1
        run: |
          mkdir -p /tmp/me
          chmod +x scripts/ci-run-tests.sh
          chmod +x scripts/harness/contract/run_all.sh
          chmod +x scripts/harness/lib/server_bootstrap.sh
          run_suite() {
            scripts/ci-run-tests.sh "scripts/harness/contract/run_all.sh"
          }
          if run_suite; then
            exit 0
          fi
          echo "::warning::contract harness suite failed; retrying once"
          run_suite

      - name: Generate main release evidence bundle
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          chmod +x scripts/release-evidence.sh
          mkdir -p .release-evidence
          scripts/release-evidence.sh \
            _build/default/bin/main_eio.exe \
            .release-evidence/main-release-evidence.md

      - name: Upload main release evidence
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v7
        with:
          name: release-evidence-main
          path: .release-evidence/

      - name: Config diagnostic drift report
        if: ${{ always() && steps.build_step.outcome == 'success' }}
        continue-on-error: true
        run: |
          if [ -f _build/default/bin/main_eio.exe ]; then
            echo "::group::Config diagnostic report"
            _build/default/bin/main_eio.exe diagnostic config --json || true
            echo "::endgroup::"
          else
            echo "::notice::main_eio.exe not found, skipping config-diagnostic"
          fi

  lint:
    name: Lint
    runs-on: ubuntu-latest
    # Dependency installation plus @install warn-error build regularly exceeds
    # 20 minutes on cold runners; keep this above the install-only worst case.
    timeout-minutes: 40
    needs: [pr-live-gate, changes]
    if: ${{ always() && !cancelled() && needs.pr-live-gate.outputs.run_heavy == 'true' && needs.changes.result == 'success' && needs.changes.outputs.lint == 'true' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Run #8605 family detector
        run: bash scripts/lint/no-unknown-permissive-default.sh

      - name: Run yojson option-field [@default None] lint
        run: python3 scripts/lint/yojson-option-default.py

      - name: Run OCaml docstring bare escape-quote lint
        run: bash scripts/lint/no-docstring-escape-quote.sh

      - name: Run dashboard hardcoded-color lint
        run: bash scripts/lint/no-hardcoded-colors-dashboard.sh

      - name: Run dashboard keeper-state SSOT lint (RFC-0135 §9)
        run: bash scripts/lint/dashboard-ssot-keeper-state.sh

      - name: Run dashboard agent-status SSOT lint (RFC-0139 §10)
        run: bash scripts/lint/dashboard-ssot-agent-status.sh

      - name: Setup OCaml toolchain
        uses: ./.github/actions/setup-ocaml-toolchain

      - name: Pin external OCaml dependencies
        uses: ./.github/actions/pin-ocaml-deps

      - name: Install system and OCaml dependencies
        uses: ./.github/actions/install-ocaml-deps
        with:
          os-packages: ripgrep

      - name: Check Eio conventions
        run: |
          chmod +x scripts/check-eio-conventions.sh
          scripts/check-eio-conventions.sh

      - name: Check feature flag consistency
        run: |
          chmod +x scripts/check-feature-flag-consistency.sh
          scripts/check-feature-flag-consistency.sh

      - name: Check TOML syntax
        run: |
          chmod +x scripts/check-toml-syntax.sh
          scripts/check-toml-syntax.sh

      - name: Check Ollama capability drift (RFC-0265)
        # Compares config/runtime.toml declared media caps against the committed
        # /api/show baseline (scripts/ollama-caps-baseline.json). No network:
        # refresh the baseline with --refresh (operator) when Ollama changes a model.
        run: python3 scripts/masc-sync-ollama-caps.py --check

      - name: Check YAML syntax
        run: python3 scripts/ci/check-yaml-syntax.py

      - name: Check keeper prompt paths drift (#6527 iter9)
        run: |
          chmod +x scripts/validate-prompt-paths.sh
          scripts/validate-prompt-paths.sh

      - name: Check MASC/OAS boundary ratchet
        run: |
          chmod +x scripts/check-boundary-guard.sh
          scripts/check-boundary-guard.sh

      - name: Check boundary-guard .mli pairing (sweep-miss gate)
        env:
          BASE_REF: origin/${{ github.base_ref || 'main' }}
        run: |
          chmod +x scripts/check-boundary-guard-mli-pairs.sh
          scripts/check-boundary-guard-mli-pairs.sh

      - name: Check SSOT bypass ratchet (#8462)
        run: |
          chmod +x scripts/check-ssot.sh
          scripts/check-ssot.sh

      - name: Build with warnings as errors
        run: |
          opam exec -- dune build --root . @install --force
        env:
          OCAMLPARAM: "_,warn-error=+a"

      - name: Check gRPC proto descriptor drift
        run: |
          sudo apt-get install -y -qq protobuf-compiler
          chmod +x scripts/gen-grpc-descriptors.sh
          scripts/gen-grpc-descriptors.sh --check

  dashboard:
    name: Dashboard
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [pr-live-gate, changes]
    # PR mode: stay path-scoped (dashboard=true only when dashboard/ changes).
    # Non-PR events (push to main/develop, schedule, workflow_dispatch):
    # ignore path scope and always run, so a dashboard test regression
    # introduced by a non-dashboard-path change (e.g. a shared-type refactor,
    # or a dashboard-touching PR merged via admin fast-track while
    # the dashboard job was red) is detected on the next main/develop push
    # rather than persisting silently. Same main-push safety-net pattern as
    # tla-main.yml; root cause:
    # keeper-fsm-specs.test.ts / keeper-composite.test.ts sat red on main
    # after #14252/#14380 because no main-push run re-checked them.
    if: ${{ always() && !cancelled() && needs.pr-live-gate.outputs.run_heavy == 'true' && needs.changes.result == 'success' && (needs.changes.outputs.dashboard == 'true' || needs.pr-live-gate.outputs.live_state == 'NON_PR') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Run drift gate
        run: scripts/dashboard-drift-check.sh

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Enable corepack and install pnpm
        run: corepack enable && corepack prepare pnpm@10.31.0 --activate

      - name: Resolve pnpm store path
        id: pnpm-store
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v6
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: pnpm-${{ runner.os }}-${{ hashFiles('dashboard/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-${{ runner.os }}-

      - name: Install dashboard dependencies
        working-directory: dashboard
        run: pnpm install --frozen-lockfile

      - name: TypeScript typecheck
        working-directory: dashboard
        run: pnpm run typecheck

      - name: Run dashboard tests
        working-directory: dashboard
        run: pnpm test

  structure-ratchet:
    name: OCaml Structure Ratchet
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [pr-live-gate, changes]
    if: ${{ always() && !cancelled() && needs.pr-live-gate.outputs.run_heavy == 'true' && needs.changes.result == 'success' && (needs.changes.outputs.lib_deps == 'true' || needs.changes.outputs.build == 'true' || needs.changes.outputs.keeper_cwd == 'true') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install ripgrep
        run: sudo apt-get install -y -qq ripgrep

      - name: Run OCaml structure ratchet
        if: needs.changes.outputs.lib_deps == 'true' || needs.changes.outputs.build == 'true'
        run: scripts/ocaml-structure-ratchet.sh

      - name: Run stringly boundary ratchet
        if: needs.changes.outputs.lib_deps == 'true' || needs.changes.outputs.build == 'true'
        run: scripts/stringly-boundary-ratchet.sh

      - name: Run OAS boundary ratchet
        if: needs.changes.outputs.lib_deps == 'true' || needs.changes.outputs.build == 'true'
        run: scripts/oas-boundary-ratchet.sh

      - name: Run keeper tool boundary matrix ratchet
        if: needs.changes.outputs.lib_deps == 'true' || needs.changes.outputs.build == 'true'
        run: scripts/audit-keeper-tool-boundary-matrix.sh

      - name: Run silent-failure ratchet
        if: needs.changes.outputs.lib_deps == 'true' || needs.changes.outputs.build == 'true'
        run: scripts/silent-failure-ratchet.sh

      - name: Run keeper cwd leak gate
        if: needs.changes.outputs.keeper_cwd == 'true'
        run: scripts/keeper-cwd-leak-gate.sh

  shell-ir-ratchet:
    name: Shell IR Consumption Ratchet
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [pr-live-gate, changes]
    if: ${{ always() && !cancelled() && needs.pr-live-gate.outputs.run_heavy == 'true' && needs.changes.result == 'success' && (needs.changes.outputs.shell_ir == 'true' || needs.changes.outputs.lib_deps == 'true' || needs.changes.outputs.build == 'true') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install ripgrep and jq
        run: |
          sudo apt-get install -y -qq ripgrep
          sudo apt-get install -y -qq jq

      - name: Run Shell IR consumption ratchet
        run: scripts/audit-shell-ir-consumption.sh --baseline scripts/shell-ir-consumption-baseline.json

  tla-specs:
    name: TLA+ Model Checking
    runs-on: ubuntu-latest
    timeout-minutes: 40
    needs: [pr-live-gate, changes]
    # PR-only required check: branch protection currently requires CI Gate,
    # so path-scoped PR TLA must remain inside ci.yml to keep failures
    # merge-blocking. Main push, schedule, and manual full-suite ownership live
    # in tla-main.yml.
    if: ${{ always() && !cancelled() && github.event_name == 'pull_request' && needs.pr-live-gate.outputs.run_heavy == 'true' && needs.changes.result == 'success' && needs.changes.outputs.tla == 'true' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Download tla2tools.jar (pinned v1.8.0)
        run: |
          curl -fsSL --retry 3 --retry-delay 5 --retry-all-errors \
            -o specs/keeper-state-machine/tla2tools.jar \
            https://github.com/tlaplus/tlaplus/releases/download/v1.8.0/tla2tools.jar

      - name: Run PR-scoped TLA+ model checking
        run: |
          make -C specs check-clean
          make -C specs check-buggy

  ci-gate:
    name: CI Gate
    runs-on: ubuntu-latest
    needs: [pr-sync-check, pr-live-gate, changes, meta, build, lint, dashboard, health, structure-ratchet, shell-ir-ratchet, tla-specs]
    if: ${{ always() && !cancelled() }}
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Aggregate required check status
        env:
          PR_SYNC_RESULT: ${{ needs.pr-sync-check.result }}
          PR_LIVE_GATE_RESULT: ${{ needs.pr-live-gate.result }}
          CHANGES_RESULT: ${{ needs.changes.result }}
          META_RESULT: ${{ needs.meta.result }}
          BUILD_RESULT: ${{ needs.build.result }}
          LINT_RESULT: ${{ needs.lint.result }}
          DASHBOARD_RESULT: ${{ needs.dashboard.result }}
          HEALTH_RESULT: ${{ needs.health.result }}
          STRUCTURE_RATCHET_RESULT: ${{ needs.structure-ratchet.result }}
          SHELL_IR_RATCHET_RESULT: ${{ needs.shell-ir-ratchet.result }}
          TLA_RESULT: ${{ needs.tla-specs.result }}
        run: |
          set -euo pipefail
          fail=0
          # mode=required (default): fail → block merge
          # mode=advisory: fail → log a WARN line, do not block
          #
          # Build job policy (revised 2026-06-24 by PR-MASC-7):
          #   - dune build (compile-only) is HARD REQUIRED — Build step lacks
          #     continue-on-error, so a compile failure makes the job result =
          #     failure → check "build" required = block merge.
          #   - Test execution (quick-suite, operator-control, sse, transport,
          #     contract harness) is now HARD REQUIRED as well. Each test step
          #     lacks continue-on-error, so a test failure fails the Build and
          #     Test job and blocks merge.
          check() {
            local name=$1
            local result=$2
            local mode=${3:-required}
            if [[ "$result" == "success" || "$result" == "skipped" ]]; then
              printf 'PASS  %-20s %s\n' "$name" "$result"
            elif [[ "$mode" == "advisory" ]]; then
              printf 'WARN  %-20s %s (advisory, not blocking)\n' "$name" "$result"
            else
              printf 'FAIL  %-20s %s\n' "$name" "$result"
              fail=1
            fi
          }
          check "pr-sync-check"   "$PR_SYNC_RESULT"
          # pr-live-gate folds skipped non-PR sync checks into run_heavy=true,
          # while failed live-state lookup remains a hard merge blocker.
          check "pr-live-gate"    "$PR_LIVE_GATE_RESULT"
          check "changes"         "$CHANGES_RESULT"
          check "meta"            "$META_RESULT"
          check "build"           "$BUILD_RESULT"
          check "lint"            "$LINT_RESULT"
          check "dashboard"       "$DASHBOARD_RESULT"
          check "health"          "$HEALTH_RESULT"
          check "structure-ratchet" "$STRUCTURE_RATCHET_RESULT"
          check "shell-ir-ratchet" "$SHELL_IR_RATCHET_RESULT"
          check "tla-specs"       "$TLA_RESULT"
          [ "$fail" -eq 0 ]
