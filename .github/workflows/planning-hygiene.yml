name: Planning Hygiene

on:
  pull_request_target:
    types: [opened, edited, reopened, synchronize, ready_for_review]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  pr-hygiene:
    runs-on: ubuntu-latest
    steps:
      - name: Check PR planning sections
        uses: actions/github-script@v9
        with:
          script: |
            const stickyMarker = '<!-- planning-hygiene:pr -->';
            const pr = context.payload.pull_request;
            const body = pr.body || '';
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            function extractSection(markdown, heading) {
              const escaped = heading.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
              const match = markdown.match(new RegExp(`## ${escaped}\\r?\\n([\\s\\S]*?)(?=\\r?\\n## |$)`, 'i'));
              if (!match) return '';
              return match[1].trim();
            }

            async function upsertStickyComment(message) {
              const comments = await github.paginate(github.rest.issues.listComments, {
                owner,
                repo,
                issue_number: pr.number,
                per_page: 100
              });
              const existing = comments.find((comment) =>
                comment.user?.login === 'github-actions[bot]' &&
                comment.body?.includes(stickyMarker)
              );

              if (!message) {
                if (existing) {
                  await github.rest.issues.deleteComment({
                    owner,
                    repo,
                    comment_id: existing.id
                  });
                }
                return;
              }

              const commentBody = `${stickyMarker}\n${message}`;
              if (existing) {
                await github.rest.issues.updateComment({
                  owner,
                  repo,
                  comment_id: existing.id,
                  body: commentBody
                });
              } else {
                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number: pr.number,
                  body: commentBody
                });
              }
            }

            const requiredSections = [
              'Summary',
              'Product impact',
              'Evidence',
              'Review evidence',
              'Linked issue'
            ];

            const missingSections = requiredSections.filter((heading) => !extractSection(body, heading));
            const linkedIssueOk = /(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?|relates(?: to)?|refs?)\s+#\d+/i.test(body);

            const warnings = [];
            if (missingSections.length > 0) {
              warnings.push(`- add the missing section(s): ${missingSections.map((section) => `\`${section}\``).join(', ')}`);
            }
            if (!linkedIssueOk) {
              warnings.push('- link at least one issue with `Closes #...`, `Fixes #...`, `Relates #...`, or `Refs #...`');
            }

            if (warnings.length === 0) {
              await upsertStickyComment('');
            } else {
              await upsertStickyComment(
                [
                  'PR hygiene warning:',
                  '',
                  ...warnings,
                  '',
                  'The PR can still proceed, but the missing planning sections should be filled in before review.'
                ].join('\n')
              );
            }
