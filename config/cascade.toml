comment = "Known keeper-facing cascade profiles remain typed in lib/keeper/keeper_cascade_profile.ml. Live catalog discovery is schema-driven via lib/cascade/cascade_config_loader.ml: any recognized {name}_* cascade key participates in the catalog, and optional {name}_keeper_assignable=false marks system-only profiles that stay visible/editable but must not be assignable to keepers. Personal/playground-only cascades belong in $MASC_BASE_PATH/.masc/playground/<persona>/.../cascade.json, not in this repo config."

[default]
models = [
  { model = "claude_code:auto", weight = 40 },
  { model = "codex_cli:auto", weight = 30 },
  { model = "gemini_cli:auto", weight = 30 },
]
temperature = 0.3
max_tokens = 4096

[big_three]
models = [
  { model = "claude_code:auto", weight = 40 },
  { model = "codex_cli:auto", weight = 30 },
  { model = "gemini_cli:auto", weight = 30 },
]
temperature = 0.2
max_tokens = 16384

[underdog]
models = [
  { model = "kimi:auto", weight = 50 },
  { model = "glm-coding:auto", weight = 50 },
]
temperature = 0.2
max_tokens = 16384

[local]
models = [
  "ollama:auto",
]
temperature = 0.2
max_tokens = 32768

[local_only]
models = [
  "ollama:auto",
]
temperature = 0.2
max_tokens = 32768

[local_recovery]
models = [
  "ollama:auto",
]
temperature = 0.1
max_tokens = 8192

[tool_rerank]
comment = "inference-only override: tool_rerank has no _models of its own; callers reuse the default cascade's models and apply the short max_tokens here."
temperature = 0.0
max_tokens = 200
keeper_assignable = false
