\* Buggy variant 1: pre-#6542 server-root fallback.
\* The worktree resolver used to fall back to the MASC server
\* repository root when the keeper playground had no clone.
\* Expected: KeeperWorktreeKind VIOLATED in one step
\* (the fallback action creates a worktree with kind = "server").
\* KeeperWorktreeOwner also happens to be violated here because the
\* owner is "none", but the primary invariant tripped is Kind.
SPECIFICATION SpecBuggyServerRoot
INVARIANT KeeperWorktreeKind
INVARIANT KeeperWorktreeOwner
INVARIANT TypeOK
CONSTANTS
    Keepers = {a, b}
CHECK_DEADLOCK FALSE
