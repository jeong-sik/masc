name: Bug report
description: Report a broken behavior, regression, or incorrect result.
title: "[Bug] "
labels:
  - "type:bug"
body:
  - type: markdown
    attributes:
      value: |
        Use this for behavior that is broken, incorrect, or regressed.
        Human reporters, Codex, and internal agents may all file this form.
        Choose exactly one target train below. Automation will keep `triage-required`
        on the issue until it has exactly one `type:*` and one `target:*` label.
  - type: input
    id: version
    attributes:
      label: Observed version
      description: "Example: v2.86.0, main HEAD, local branch"
      placeholder: v2.86.0
    validations:
      required: true
  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - blocks release or data safety
        - major workflow broken
        - moderate incorrect behavior
        - minor but real bug
    validations:
      required: true
  - type: dropdown
    id: target
    attributes:
      label: Target train
      description: Choose the smallest plausible release lane. Triage can retarget later.
      options:
        - "target:v2.86.1"
        - "target:v2.87.0"
        - "target:v2.88.0"
        - "target:v2.89.0"
        - "target:v2.90.0"
        - "target:v2.91.0"
        - "target:v2.92.0"
        - "target:v2.93+"
        - "target:v2.148+"
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run ...
        2. Open ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: Logs, screenshots, run IDs, failing command, or artifact path
      placeholder: Attach the smallest concrete proof you have.
    validations:
      required: false
  - type: textarea
    id: notes
    attributes:
      label: Scope notes
      description: Say whether this looks like a regression, one-off, or repeat issue.
    validations:
      required: false
