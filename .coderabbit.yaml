# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
language: en-US
early_access: false

reviews:
  poem: false
  path_filters:
    - "!_build/**"
    - "!_coverage/**"
    - "!node_modules/**"
    - "!.worktrees/**"
    - "!logs/**"
    - "!.masc/**"
    - "!workspace/**"
    - "!**/*.min.js"
  auto_review:
    enabled: true
    drafts: true
    auto_incremental_review: true
  path_instructions:
    - path: "lib/**/*.{ml,mli}"
      instructions: >
        Prioritize OCaml 5 correctness, interface/signature consistency, Eio cancellation and
        resource safety, and removal of hidden partial failures.
    - path: "trpg/**/*.ml"
      instructions: >
        Validate TRPG state transitions for deterministic turn flow, workspace/session isolation, and
        idempotent updates on retries.
    - path: "**/*.proto"
      instructions: >
        Check protobuf backward compatibility, stable field numbering, reserved fields,
        and safe default values.
    - path: "scripts/**/*.{sh,bash,zsh}"
      instructions: >
        Flag unsafe shell patterns (unquoted variables, brittle pipes, missing strict mode),
        and portability issues.
    - path: ".github/workflows/**/*.yml"
      instructions: >
        Validate workflow correctness, permission scope minimization, and cache/security risks.
