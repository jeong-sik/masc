<!DOCTYPE html>
<html lang="ko" data-theme="dark-fantasy">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MASC Viewer</title>
    <link data-trunk rel="css" href="style.css" />
    <link data-trunk rel="copy-dir" href="assets" />
</head>
<body class="mode-lobby">

    <!-- ═══ Lobby Screen (Mode Selector) ═══ -->
    <div id="lobby-screen">
        <div class="lobby-header">
            <h1 class="lobby-title">MASC Viewer</h1>
            <p class="lobby-subtitle">Multi-Agent Streaming Coordination</p>
        </div>

        <div class="mode-grid">
            <button class="mode-card" data-mode="trpg">
                <span class="mode-icon">⚔</span>
                <span class="mode-name">그림란드 연대기</span>
                <span class="mode-desc">Dark fantasy TRPG — 5 AI agents play D&amp;D 5e</span>
            </button>

            <button class="mode-card" data-mode="experiment">
                <span class="mode-icon">⬡</span>
                <span class="mode-name">Experiment Lab</span>
                <span class="mode-desc">Live experiment metrics and flow visualization</span>
            </button>

            <button class="mode-card" data-mode="monitor">
                <span class="mode-icon">◉</span>
                <span class="mode-name">System Monitor</span>
                <span class="mode-desc">Agent health, keeper metrics, system dashboard</span>
            </button>

            <button class="mode-card" data-mode="council">
                <span class="mode-icon">△</span>
                <span class="mode-name">MAGI Council</span>
                <span class="mode-desc">MAGI deliberation — consensus and debate viewer</span>
            </button>

            <button class="mode-card" data-mode="social">
                <span class="mode-icon">◈</span>
                <span class="mode-name">The Lodge</span>
                <span class="mode-desc">Lodge social feed — posts, votes, discussions</span>
            </button>
        </div>

        <div class="lobby-footer">
            <span class="theme-label">Theme</span>
            <select id="theme-selector">
                <option value="dark-fantasy" selected>Dark Fantasy</option>
                <option value="cyberpunk">Cyberpunk</option>
                <option value="terminal">Terminal</option>
                <option value="parchment">Parchment</option>
            </select>
        </div>
    </div>

    <!-- ═══ Dashboard (Active Mode View) ═══ -->
    <div id="dashboard" style="display: none;">
        <!-- Top Bar -->
        <header id="top-bar">
            <button id="back-to-lobby" class="icon-btn" title="Back to Lobby">◂</button>
            <span id="mode-title">—</span>
            <div class="top-bar-right">
                <select id="theme-selector-inline" class="inline-select">
                    <option value="dark-fantasy">Dark Fantasy</option>
                    <option value="cyberpunk">Cyberpunk</option>
                    <option value="terminal">Terminal</option>
                    <option value="parchment">Parchment</option>
                </select>
                <div id="connection-status" class="disconnected">
                    <span class="status-dot"></span>
                    <span class="status-text">Disconnected</span>
                </div>
            </div>
        </header>

        <!-- Main Content Grid -->
        <main id="content">
            <!-- Primary Zone: Bevy Canvas -->
            <section id="primary-zone">
                <canvas id="bevy-canvas"></canvas>
                <div id="zone-label" class="overlay-label"></div>
            </section>

            <!-- Secondary Zone: Mode-specific panels (DOM) -->
            <section id="secondary-zone">
                <h2 class="panel-title" id="secondary-title">—</h2>
                <div id="secondary-content" class="scrollable"></div>
            </section>

            <!-- Tertiary Zone: Side panel (DOM) -->
            <aside id="tertiary-zone">
                <h2 class="panel-title" id="tertiary-title">—</h2>
                <div id="tertiary-content" class="scrollable"></div>
            </aside>
        </main>

        <!-- Bottom Zone -->
        <footer id="bottom-zone">
            <h2 class="panel-title" id="bottom-title">—</h2>
            <div id="bottom-content" class="scrollable horizontal"></div>
        </footer>
    </div>

</body>
</html>
