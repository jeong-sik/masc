\* Clean: NoOrphan + CapOk must both pass.
\* This is a terminating spec (pc: "trim" → "done"); TLC's default deadlock
\* check would flag the intended terminal state, so disable it and rely on
\* the safety invariants.
SPECIFICATION SpecClean
CONSTANTS
    MaxLen = 5
    MaxCount = 3
INVARIANT NoOrphan
INVARIANT CapOk
CHECK_DEADLOCK FALSE
