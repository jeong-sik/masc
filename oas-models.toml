# RunPod Models
# WORKAROUND: OAS emits provider_label "openai_compat" for RunPod — it has no
# *.proxy.runpod.net base_url recognition (unlike ollama_cloud's ollama.com
# special-case in provider_config.capability_provider_label). The prior
# "runpod_mtp/" id_prefix never matched the provider-qualified catalog lookup
# (Capabilities.for_provider_model_id_catalog joins label^"/"^model_id and
# requires entry.id_prefix to start with label^"/"), so the capability gate
# (Runtime.init_default_strict) rejected qwen36-35b-a3b-mtp at boot as silently
# dropping thinking/sampling control. Aligning the id_prefix with the label OAS
# actually emits restores the match. Root fix: teach OAS to recognize RunPod
# proxy URLs so a dedicated "runpod_mtp" label exists (follow-up OAS PR,
# mirrors the ollama_cloud pattern).

[[models]]
id_prefix = "openai_compat/qwen36-35b-a3b-mtp"
base = "openai_chat"
max_context_tokens = 131072
supports_tools = true
supports_tool_choice = true
supports_reasoning = true
supports_extended_thinking = true
supports_reasoning_budget = true
thinking_control_format = "chat_template_kwargs"
preserve_thinking_control_format = "chat_template_kwargs_preserve_thinking"
supports_multimodal_inputs = false
supports_image_input = false
supports_native_streaming = true

[[models]]
id_prefix = "qwen36-35b-a3b-mtp"
base = "openai_chat"
max_context_tokens = 131072
supports_tools = true
