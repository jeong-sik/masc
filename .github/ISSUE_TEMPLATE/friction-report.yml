name: Friction report
description: Report something that works but is annoying, confusing, slow, or sharp-edged.
title: "[Friction] "
labels:
  - "type:friction"
body:
  - type: markdown
    attributes:
      value: |
        Use this for dogfooding discomfort.
        Human reporters, Codex, and internal agents may all file this form.
        Small fixes usually belong in `target:now`; workflow redesign usually belongs in `target:next`.
        Automation mirrors the selected planning area and target lane into labels and keeps
        `triage-required` on the issue until it has exactly one `type:*`, one `area:*`,
        and one `target:*` label.
  - type: dropdown
    id: area
    attributes:
      label: Product area
      options:
        - Repo coordination
        - Team session delivery
        - Dashboard and read models
        - Operator and intervention
        - Transport, auth, and health
        - Config and installation
        - CI and release automation
        - Docs and onboarding
        - Experimental surfaces
    validations:
      required: true
  - type: dropdown
    id: target
    attributes:
      label: Target lane
      options:
        - now
        - next
        - later
    validations:
      required: true
  - type: dropdown
    id: promise
    attributes:
      label: Promise affected
      options:
        - repo coordination
        - ops visibility
        - experimental or internal
    validations:
      required: true
  - type: checkboxes
    id: product_gap
    attributes:
      label: Product gap
      options:
        - label: Code may already exist, but the product promise is still not trustworthy.
  - type: input
    id: version
    attributes:
      label: Observed version
      description: "Example: v0.2.0, main HEAD, local branch"
      placeholder: v0.2.0
    validations:
      required: true
  - type: dropdown
    id: category
    attributes:
      label: Friction category
      options:
        - UX confusion
        - too many steps
        - slow feedback
        - noisy output
        - missing affordance
        - naming or discoverability
        - other
    validations:
      required: true
  - type: textarea
    id: workflow
    attributes:
      label: What were you trying to do?
      placeholder: Describe the workflow in one short paragraph.
    validations:
      required: true
  - type: textarea
    id: pain
    attributes:
      label: What felt bad?
      placeholder: Explain the annoying part, wasted steps, or confusion point.
    validations:
      required: true
  - type: textarea
    id: desired
    attributes:
      label: What would feel better?
      description: A rough expectation is enough. It does not need a perfect solution.
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: Screenshots, logs, command transcript, or paths
    validations:
      required: false
