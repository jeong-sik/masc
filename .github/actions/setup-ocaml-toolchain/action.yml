name: Setup OCaml Toolchain
description: Shared OCaml toolchain bootstrap with Linux local-opam pinning and macOS parity.

inputs:
  ocaml-compiler:
    description: OCaml compiler version
    required: false
    default: "5.5.0"
  dune-cache:
    description: Whether to enable dune cache
    required: false
    default: "true"
  dune-cache-save:
    description: Whether this job is the authoritative main-branch Dune cache writer
    required: false
    default: "false"
  cache-prefix:
    description: Prefix for the dune cache key
    required: false
    default: oas-otel-02

runs:
  using: composite
  steps:
    - name: Setup OCaml (macOS)
      if: runner.os == 'macOS'
      uses: ocaml/setup-ocaml@v3.6.0
      with:
        ocaml-compiler: ${{ inputs.ocaml-compiler }}
        dune-cache: ${{ inputs.dune-cache }}

    - name: Cache OCaml toolchain (Linux)
      if: runner.os == 'Linux'
      uses: actions/cache@v5
      with:
        path: |
          ~/.opam
          ~/.local/share/opam
        key: opam-linux-${{ inputs.cache-prefix }}-${{ inputs.ocaml-compiler }}-${{ hashFiles('*.opam', 'dune-project', 'scripts/oas-agent-sdk-pin.sh', 'scripts/opam-pin-external-deps.sh') }}-v2
        restore-keys: |
          opam-linux-${{ inputs.cache-prefix }}-${{ inputs.ocaml-compiler }}-

    # The opam cache above only restores the toolchain/switch; every dune
    # build of masc itself still started cold (~50 min Build and Test).
    # Cache dune's content-addressed artifact store so an unchanged module
    # graph rebuilds incrementally. Pull requests and non-authoritative jobs are
    # restore-only: PR caches are ref-scoped and cannot warm other PRs, while
    # partial Health/Lint artifacts must not race the full Build cache. Exactly
    # one authoritative job per cache-prefix opts into the main-branch writer.
    # The run id gives each main publication an immutable key; restore picks the
    # newest cache in that trusted lineage.
    - name: Restore dune build artifacts (Linux)
      if: runner.os == 'Linux' && inputs.dune-cache == 'true' && (inputs.dune-cache-save != 'true' || github.event_name != 'push' || github.ref != 'refs/heads/main')
      uses: actions/cache/restore@v5
      with:
        path: ~/.cache/dune
        key: dune-linux-${{ inputs.cache-prefix }}-${{ inputs.ocaml-compiler }}-${{ github.run_id }}
        restore-keys: |
          dune-linux-${{ inputs.cache-prefix }}-${{ inputs.ocaml-compiler }}-

    - name: Cache dune build artifacts (Linux authoritative main writer)
      if: runner.os == 'Linux' && inputs.dune-cache == 'true' && inputs.dune-cache-save == 'true' && github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: actions/cache@v5
      with:
        path: ~/.cache/dune
        key: dune-linux-${{ inputs.cache-prefix }}-${{ inputs.ocaml-compiler }}-${{ github.run_id }}
        restore-keys: |
          dune-linux-${{ inputs.cache-prefix }}-${{ inputs.ocaml-compiler }}-

    # Storage mode is hardlink, not copy. `copy` keeps every artifact twice:
    # once in _build and once in ~/.cache/dune. On ubuntu-latest that
    # duplication exhausted the runner disk and the Build and Test job of run
    # 29090394322 (main, the #23996 merge) died while linking a test
    # executable, with zero free space reported by the runner. Both paths live
    # on `/`, so dune can hardlink cache entries into _build and keep a single
    # copy on disk.
    #
    # This explanation stays a YAML comment on purpose. GitHub echoes the whole
    # `run:` script into the job log, so a shell comment quoting the linker and
    # disk-space messages would plant those exact strings in every job log —
    # scripts/ci-run-tests.sh matches them in disk_full_detected().
    - name: Enable dune cache (Linux)
      if: runner.os == 'Linux' && inputs.dune-cache == 'true'
      shell: bash
      run: |
        # hardlink, NOT copy: copy mode duplicates every artifact into
        # ~/.cache/dune, roughly doubling disk while the cache populates.
        # The first cache-cold Build and Test after #23996 died at link time
        # with "/usr/bin/ld: final link failed: No space left on device"
        # (run 29091172837). ~/.cache/dune and the workspace share one
        # filesystem on GitHub runners, so hardlinks add no meaningful space.
        {
          echo "DUNE_CACHE=enabled"
          echo "DUNE_CACHE_STORAGE_MODE=hardlink"
        } >> "$GITHUB_ENV"

    - name: Bootstrap local opam switch (Linux)
      if: runner.os == 'Linux'
      shell: bash
      env:
        OCAML_COMPILER_INPUT: ${{ inputs.ocaml-compiler }}
      run: |
        set -euo pipefail

        case "${OCAML_COMPILER_INPUT}" in
          5.5|5.5.x)
            compiler_pkg="ocaml-base-compiler.5.5.0"
            ;;
          [0-9]*.[0-9]*.[0-9]*)
            compiler_pkg="ocaml-base-compiler.${OCAML_COMPILER_INPUT}"
            ;;
          ocaml-base-compiler.*)
            compiler_pkg="${OCAML_COMPILER_INPUT}"
            ;;
          *)
            echo "Unsupported ocaml-compiler input: ${OCAML_COMPILER_INPUT}" >&2
            exit 1
            ;;
        esac

        switch_name="ci-${OCAML_COMPILER_INPUT//[^A-Za-z0-9]/-}"

        # Export non-interactive opam settings for this step and later steps
        export OPAMCOLOR=always
        export OPAMCONFIRMLEVEL=unsafe-yes
        export OPAMERRLOGLEN=0
        export OPAMEXTERNALSOLVER=builtin-0install
        export OPAMRETRIES=10
        export OPAMSOLVERTIMEOUT=600
        export OPAMYES=1
        {
          echo "OPAMCOLOR=always"
          echo "OPAMCONFIRMLEVEL=unsafe-yes"
          echo "OPAMERRLOGLEN=0"
          echo "OPAMEXTERNALSOLVER=builtin-0install"
          echo "OPAMRETRIES=10"
          echo "OPAMSOLVERTIMEOUT=600"
          echo "OPAMYES=1"
        } >> "${GITHUB_ENV}"

        # Download opam binary first — it's small (~10MB) and always needed
        case "$(uname -m)" in
          x86_64|amd64)
            opam_arch="x86_64"
            ;;
          aarch64|arm64)
            opam_arch="arm64"
            ;;
          *)
            echo "Unsupported runner architecture: $(uname -m)" >&2
            exit 1
            ;;
        esac

        opam_version="2.5.0"
        opam_dir="${RUNNER_TEMP}/opam-bin"
        opam_url="https://github.com/ocaml/opam/releases/download/${opam_version}/opam-${opam_version}-${opam_arch}-linux"

        mkdir -p "${opam_dir}"
        curl -L --fail --retry 3 --retry-delay 5 --retry-all-errors "${opam_url}" -o "${opam_dir}/opam"
        chmod +x "${opam_dir}/opam"
        export PATH="${opam_dir}:${PATH}"
        echo "${opam_dir}" >> "${GITHUB_PATH}"

        # Cache hit: reuse existing switch, skip init + switch create.
        # `opam switch list` is the authoritative check — it covers both the
        # default `~/.opam` root and an XDG root under `~/.local/share/opam`,
        # so don't pre-gate on a single directory path (that produced a false
        # cache miss when opam used the XDG layout).
        if opam switch list --short 2>/dev/null | grep -q "^${switch_name}$"; then
          echo "::notice::Cache hit — reusing opam switch ${switch_name}"
          switch_prefix="$(opam var prefix --switch="${switch_name}")"
          echo "OPAMSWITCH=${switch_name}" >> "${GITHUB_ENV}"
          echo "${switch_prefix}/bin" >> "${GITHUB_PATH}"
          exit 0
        fi

        echo "::notice::Cache miss — bootstrapping opam switch ${switch_name}"

        opam init --auto-setup --bare --disable-sandboxing --yes
        opam switch create "${switch_name}" "${compiler_pkg}" --yes

        switch_prefix="$(opam var prefix --switch="${switch_name}")"
        echo "OPAMSWITCH=${switch_name}" >> "${GITHUB_ENV}"
        echo "${switch_prefix}/bin" >> "${GITHUB_PATH}"

    - name: Reject unsupported runner OS
      if: runner.os != 'Linux' && runner.os != 'macOS'
      shell: bash
      run: |
        echo "setup-ocaml-toolchain supports Linux and macOS runners only" >&2
        exit 1
