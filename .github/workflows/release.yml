name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-14  # Apple Silicon
            arch: macos-arm64
          - os: ubuntu-latest
            arch: linux-x64

    runs-on: ${{ matrix.os }}
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Check version truth
        run: |
          chmod +x scripts/check-version-truth.sh
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            scripts/check-version-truth.sh --tag "${GITHUB_REF_NAME}"
          else
            scripts/check-version-truth.sh
          fi

      - name: Install libpq (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install libpq
          echo "$(brew --prefix libpq)/bin" >> "$GITHUB_PATH"
          echo "PKG_CONFIG_PATH=$(brew --prefix libpq)/lib/pkgconfig" >> "$GITHUB_ENV"

      - name: Setup OCaml environment
        uses: ./.github/actions/setup-ocaml-env
        with:
          dune-cache: "false"
          pin-extra-args: --with-compact-protocol
          opam-install-args: --deps-only --yes

      - name: Build
        run: opam exec -- dune build --release bin/main_eio.exe

      - name: Package binary
        run: |
          mkdir -p dist
          cp _build/default/bin/main_eio.exe dist/masc-mcp-${{ matrix.arch }}
          chmod +x dist/masc-mcp-${{ matrix.arch }}

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: masc-mcp-${{ matrix.arch }}
          path: dist/masc-mcp-${{ matrix.arch }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    timeout-minutes: 15

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
