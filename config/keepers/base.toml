[keeper]
# base.toml is a loader template referenced by other keeper TOMLs via
# `base = "base.toml"` (see lib/keeper/keeper_types_profile.ml:846-855 +
# loader_level_keeper_toml_key_names at line 652). It is not an
# autoboot target — it has no persona_name, no goal, and no
# mention_targets, so validate_keeper_inputs (keeper_tool_persona_runtime.ml:109)
# rejects it with "goal is required" every autoboot cycle.
# Suppress the failed materialize attempt (142 events/24h triplet) by
# disabling autoboot for this file. discover_keepers_toml still loads it
# as a profile-defaults source for downstream keepers.
autoboot_enabled = false
# persona⊥{model,runtime}: keeper TOML no longer carries a runtime/model
# selection (the parser now fail-loud rejects `runtime_id`/`model` keys).
# keeper→runtime assignment is the sole responsibility of runtime.toml
# [[runtime.assignments]], keyed by keeper name. The former value here was
# `runtime_id = "runpod_mtp.qwen-runpod"`; operators preserving that exact
# routing must add the keeper(s) inheriting this base to runtime.toml
# [[runtime.assignments]] (otherwise they fall back to [runtime].default).
sandbox_profile = "docker"
network_mode = "inherit"

instructions = """
MASC 기본 소양 — 모든 keeper의 공통 행동 기반. persona instructions는 이 위에 stack.

1. 코드 변경 라우팅: Read, Grep, Edit/Write, Execute를 사용한다. Execute redirection/tee 또는 직접 file write/edit 우회는 governance/path guard에 막힌다.
2. Worktree 격리: sandbox clone 내부의 `repos/<REPO_NAME>/.worktrees/<branch-or-task>/` 아래에서 작업한다. 루트 checkout/main에서 직접 feature work를 시작하지 않는다.
3. PR 생성 흐름: 코드 작업 완료 후 별도 실행 축이 아니라 Execute typed argv 경로로 PR을 열거나 갱신한다. 이어서 keeper_task_done result에 PR URL과 검증 증거를 남긴다. Ready 전환은 사용자/verifier 권한이다.
4. Task 상태 조회: keeper_tasks_list 또는 masc_tasks를 사용한다. .task.json, task-*.json, .masc, backlog JSON을 find/grep/rg/ls로 찾지 않는다.
5. Task lifecycle 변경: masc_transition으로 claim/start/done/cancel/release/approve/reject를 호출한다. expected_version으로 CAS 충돌을 회피한다.
6. Execute 규칙: `Execute`가 노출된 경우 한 번에 하나의 typed argv 명령만 실행한다. shell quote, glob, brace expansion을 쓰지 않는다. 경로 인자는 plain path. command shape block 또는 workflow_rejection을 받으면 Execute 변형 재시도 대신 active schema에 보이는 typed tool (keeper_tasks_list, Grep, Read 등)로 전환한다.
7. 협업: 다중 keeper 환경에서는 masc_broadcast (전체 공지) 또는 masc_messages (1:1)로 소통한다. 특정 keeper 호출은 @mention. 진행 상태는 masc_heartbeat로 유지한다.
"""
