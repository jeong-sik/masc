<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MASC Cockpit — Snippets (copy-paste ready)</title>
  <link rel="stylesheet" href="../source_styles/tokens.generated.css" />
  <link rel="stylesheet" href="../source_styles/primitives.css" />
  <link rel="stylesheet" href="components.css" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    html, body { margin: 0; padding: 0; background: #f0eee9; font-family: var(--font-sans); color: var(--color-fg-primary); }
    .sn-page { max-width: 1280px; margin: 0 auto; padding: 32px 24px 96px; }
    .sn-head { display: flex; align-items: baseline; gap: 12px; margin-bottom: 8px; }
    .sn-head h1 { font: 600 22px/1 var(--font-mono); margin: 0; color: #2a251f; }
    .sn-head .sub { color: rgba(60,50,40,.7); font-size: 12px; }
    .sn-intro { color: rgba(60,50,40,.7); font-size: 12px; max-width: 720px; margin-bottom: 28px; line-height: 1.5; }
    .sn-intro code { font-family: var(--font-mono); font-size: 11px; background: rgba(0,0,0,.05); padding: 1px 5px; border-radius: 2px; }
    .sn-toc { display: flex; flex-wrap: wrap; gap: 4px; padding: 8px 12px; background: rgba(0,0,0,.04); border: 1px solid rgba(0,0,0,.08); margin-bottom: 32px; }
    .sn-toc a { font: 11px/1 var(--font-mono); padding: 3px 8px; color: #4a4030; text-decoration: none; border: 1px solid transparent; border-radius: 2px; }
    .sn-toc a:hover { background: rgba(0,0,0,.06); border-color: rgba(0,0,0,.12); }
    .sn-toc .gh { color: rgba(60,50,40,.5); padding: 3px 4px; text-transform: uppercase; letter-spacing: .08em; font-size: 9px; }

    .sn-grouph {
      display: flex; align-items: baseline; gap: 8px;
      margin: 40px 0 12px;
      padding-bottom: 6px;
      border-bottom: 1px solid rgba(0,0,0,.12);
    }
    .sn-grouph .nm { font: 600 14px/1 var(--font-mono); color: #2a251f; text-transform: uppercase; letter-spacing: .08em; }
    .sn-grouph .desc { color: rgba(60,50,40,.6); font-size: 11px; }

    .sn-card {
      background: #fff;
      border: 1px solid rgba(0,0,0,.1);
      border-radius: 6px;
      margin-bottom: 14px;
      overflow: hidden;
    }
    .sn-card .hd {
      display: flex; align-items: baseline; gap: 10px;
      padding: 10px 14px;
      border-bottom: 1px solid rgba(0,0,0,.08);
      background: #faf8f3;
    }
    .sn-card .hd .id { font: 600 12px/1 var(--font-mono); color: #2a251f; }
    .sn-card .hd .ti { font: 600 13px/1.3 var(--font-mono); color: #2a251f; }
    .sn-card .hd .tags { display: flex; gap: 4px; margin-left: auto; }
    .sn-card .hd .tag { font: 9px/1 var(--font-mono); padding: 2px 6px; background: rgba(0,0,0,.06); border-radius: 2px; color: #5a4a2a; text-transform: uppercase; letter-spacing: .06em; }
    .sn-card .desc { padding: 8px 14px 0; color: rgba(60,50,40,.7); font-size: 12px; line-height: 1.5; }

    .sn-body { display: grid; grid-template-columns: minmax(280px, 1fr) 1.2fr; gap: 0; align-items: stretch; }
    @media (max-width: 880px) { .sn-body { grid-template-columns: 1fr; } }

    .sn-prev { padding: 16px; background: var(--color-bg-page); color: var(--color-fg-primary); border-right: 1px solid rgba(0,0,0,.08); display: flex; align-items: center; justify-content: center; min-height: 80px; font-family: var(--font-sans); font-size: 13px; overflow: auto; }
    @media (max-width: 880px) { .sn-prev { border-right: 0; border-bottom: 1px solid rgba(0,0,0,.08); } }
    .sn-prev > .wrap { width: 100%; max-width: 100%; }

    .sn-code { background: #1a1816; color: #d4cfc4; display: flex; flex-direction: column; }
    .sn-code .tabs { display: flex; gap: 0; border-bottom: 1px solid rgba(255,255,255,.08); background: #14110f; }
    .sn-code .tabs button { padding: 6px 14px; background: transparent; border: 0; color: rgba(255,255,255,.5); font: 10px/1 var(--font-mono); text-transform: uppercase; letter-spacing: .08em; cursor: pointer; border-bottom: 2px solid transparent; }
    .sn-code .tabs button:hover { color: rgba(255,255,255,.8); }
    .sn-code .tabs button.on { color: #e6d090; border-bottom-color: #c2964a; }
    .sn-code .tabs .copy { margin-left: auto; padding: 6px 12px; background: transparent; border: 0; border-left: 1px solid rgba(255,255,255,.08); color: #c2964a; font: 10px/1 var(--font-mono); text-transform: uppercase; letter-spacing: .08em; cursor: pointer; }
    .sn-code .tabs .copy:hover { background: rgba(194,150,74,.1); color: #e6d090; }
    .sn-code .tabs .copy.ok { color: #7fc78a; }
    .sn-code pre { margin: 0; padding: 14px 16px; overflow: auto; font: 11px/1.6 var(--font-mono); flex: 1; max-height: 440px; }
    .sn-code pre code { white-space: pre; color: inherit; }

    .sn-foot { padding: 8px 14px; border-top: 1px solid rgba(0,0,0,.08); background: #f6f3ec; font: 10px/1.5 var(--font-mono); color: rgba(60,50,40,.6); display: flex; gap: 12px; flex-wrap: wrap; }
    .sn-foot .lbl { color: rgba(60,50,40,.5); text-transform: uppercase; letter-spacing: .08em; font-size: 9px; }
    .sn-foot .css { color: #8a6630; }

    .stamp { position: fixed; top: 16px; right: 24px; font: 10px/1 var(--font-mono); color: rgba(60,50,40,.5); letter-spacing: .08em; }

    /* form-control subset (mirrors forms.html) — needed so .input/.toggle/.check/.segmented snippets render in preview */
    .field { display:flex; flex-direction:column; gap:3px; }
    .field-label { font-family: var(--font-mono); font-size: 9px; letter-spacing: .08em; color: var(--color-fg-muted); text-transform:uppercase; font-weight:600; }
    .field-hint { font-family: var(--font-mono); font-size: 9px; color: var(--color-fg-disabled); letter-spacing: .04em; }
    .input { background: var(--color-bg-panel-alt); border: 1px solid var(--color-border-strong); border-radius: var(--r-1); padding: 6px 10px; color: var(--color-fg-primary); font-family: var(--font-mono); font-size: 12px; outline: none; width: 100%; box-sizing:border-box; }
    .input::placeholder { color: var(--color-fg-disabled); }
    .input:focus { border-color: var(--brass-2); box-shadow: 0 0 0 1px var(--brass-2), 0 0 10px rgb(var(--color-accent-glow)/.18); background: var(--color-bg-elevated); }
    .check { display:inline-flex; align-items:center; gap: 6px; cursor:pointer; user-select:none; font-family: var(--font-mono); font-size: 11px; color: var(--color-fg-secondary); }
    .check input { position: absolute; opacity: 0; width: 0; height: 0; pointer-events:none; }
    .check .box { width: 13px; height: 13px; border: 1px solid var(--color-border-strong); border-radius: 2px; background: var(--color-bg-panel-alt); display:inline-grid; place-items:center; transition: all .12s; flex-shrink:0; }
    .check input:checked + .box { background: var(--color-accent-fg); border-color: var(--color-accent-fg); box-shadow: 0 0 8px rgb(var(--color-accent-glow)/.5); }
    .check input:checked + .box::after { content: ''; width: 6px; height: 3px; border-left: 1.5px solid var(--color-bg-page); border-bottom: 1.5px solid var(--color-bg-page); transform: rotate(-45deg) translate(1px, -1px); }
    .toggle { display:inline-flex; align-items:center; gap: 8px; cursor:pointer; user-select:none; font-family: var(--font-mono); font-size: 11px; color: var(--color-fg-secondary); }
    .toggle input { position:absolute; opacity:0; }
    .toggle .track { width: 26px; height: 14px; background: var(--color-bg-elevated); border: 1px solid var(--color-border-strong); border-radius: 999px; position: relative; transition: all .15s; flex-shrink:0; }
    .toggle .track::after { content: ''; position: absolute; top: 1px; left: 1px; width: 10px; height: 10px; border-radius: 50%; background: var(--color-fg-muted); transition: all .15s; }
    .toggle input:checked + .track { background: rgb(var(--color-accent-glow)/.15); border-color: var(--brass-2); }
    .toggle input:checked + .track::after { left: 13px; background: var(--color-accent-fg); box-shadow: 0 0 6px rgb(var(--color-accent-glow)/.7); }
    .segmented { display: inline-flex; border: 1px solid var(--color-border-strong); border-radius: var(--r-1); overflow: hidden; background: var(--color-bg-panel-alt); }
    .segmented button { background: transparent; border: none; color: var(--color-fg-muted); font-family: var(--font-mono); font-size: 10px; letter-spacing: .08em; text-transform: uppercase; font-weight: 600; padding: 5px 12px; cursor: pointer; border-right: 1px solid var(--color-border-strong); }
    .segmented button:last-child { border-right: none; }
    .segmented button:hover { background: var(--color-bg-elevated); color: var(--color-fg-primary); }
    .segmented button.is-active { background: var(--color-bg-elevated); color: var(--color-accent-fg); box-shadow: inset 0 -1.5px 0 var(--color-accent-fg); }
  </style>
</head>
<body>
  <div class="stamp">MASC · v0.42.1 · snippets</div>
  <div id="root"></div>
  <script type="text/babel" src="snippets.jsx"></script>
</body>
</html>
