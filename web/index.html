<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MASC Lobby</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏛️</text></svg>">
  <script src="https://unpkg.com/htmx.org@1.9.10"></script>
  <script src="https://unpkg.com/htmx.org/dist/ext/sse.js"></script>
  <style>
    :root {
      --bg: #0a0a0f;
      --card: #12121a;
      --border: #2a2a3a;
      --text: #e0e0e0;
      --accent: #6366f1;
      --success: #22c55e;
      --warning: #eab308;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'SF Mono', 'Fira Code', monospace;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    .lobby {
      display: grid;
      grid-template-columns: 250px 1fr 300px;
      grid-template-rows: auto 1fr auto;
      height: 100vh;
      gap: 1px;
      background: var(--border);
    }
    header {
      grid-column: 1 / -1;
      background: var(--card);
      padding: 1rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    header h1 { font-size: 1.2rem; }
    header .status {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    header .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--success);
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    .panel {
      background: var(--card);
      padding: 1rem;
      overflow-y: auto;
    }
    .panel h2 {
      font-size: 0.8rem;
      text-transform: uppercase;
      color: #888;
      margin-bottom: 1rem;
    }
    .agent-list, .task-list {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .agent, .task {
      padding: 0.5rem;
      border-radius: 4px;
      background: var(--bg);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .agent .icon { font-size: 1.2rem; }
    .agent .name { flex: 1; font-size: 0.9rem; }
    .agent { cursor: pointer; transition: background 0.2s; }
    .agent:hover { background: var(--border); }
    .agent .idle-time { color: #666; font-size: 0.75rem; }
    .modal {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.8);
      z-index: 1000;
      justify-content: center;
      align-items: center;
    }
    .modal.active { display: flex; }
    .modal-content {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.5rem;
      min-width: 400px;
      max-width: 600px;
      max-height: 80vh;
      overflow-y: auto;
    }
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
    }
    .modal-header h3 { margin: 0; }
    .modal-close {
      background: none;
      border: none;
      color: var(--text);
      font-size: 1.5rem;
      cursor: pointer;
    }
    .modal-body pre {
      background: var(--bg);
      padding: 1rem;
      border-radius: 4px;
      font-size: 0.85rem;
      white-space: pre-wrap;
    }
    .event-stream {
      font-size: 0.85rem;
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }
    .event {
      padding: 0.25rem 0.5rem;
      border-left: 2px solid var(--accent);
      background: rgba(99, 102, 241, 0.1);
    }
    .event .time { color: #666; margin-right: 0.5rem; }
    .control-panel {
      grid-column: 1 / -1;
      background: var(--card);
      padding: 1rem;
      display: flex;
      gap: 1rem;
      align-items: center;
    }
    .control-panel input {
      flex: 1;
      padding: 0.75rem;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: var(--bg);
      color: var(--text);
      font-family: inherit;
    }
    .control-panel button {
      padding: 0.75rem 1.5rem;
      border: none;
      border-radius: 4px;
      background: var(--accent);
      color: white;
      cursor: pointer;
      font-family: inherit;
    }
    .control-panel button:hover { opacity: 0.9; }

    /* Council Panel */
    .council-panel { grid-column: span 2; }
    .council-tabs { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
    .council-tabs .tab {
      padding: 0.5rem 1rem;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text);
      border-radius: 4px;
      cursor: pointer;
    }
    .council-tabs .tab.active {
      background: var(--accent);
      border-color: var(--accent);
    }
    .debate-list, .vote-list { max-height: 200px; overflow-y: auto; }
    .debate-item, .vote-item {
      padding: 0.75rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .debate-item:hover, .vote-item:hover { background: rgba(255,255,255,0.05); }
    .debate-topic { flex: 1; }
    .debate-status { 
      font-size: 0.75rem; 
      padding: 0.25rem 0.5rem; 
      border-radius: 3px;
      background: var(--accent);
    }
    .debate-status.closed { background: #666; }
    .vote-status { font-size: 0.85rem; color: #888; }
    .council-btn {
      margin-top: 0.5rem;
      padding: 0.5rem 1rem;
      border: 1px dashed var(--border);
      background: transparent;
      color: var(--text);
      border-radius: 4px;
      cursor: pointer;
      width: 100%;
    }
    .council-btn:hover { border-style: solid; background: rgba(255,255,255,0.05); }
  </style>
</head>
<body>
  <div class="lobby">
    <header>
      <h1>🏛️ MASC LOBBY</h1>
      <span class="room" id="roomLabel">[default]</span>
      <div class="status">
        <div class="dot"></div>
        <span>Connected</span>
      </div>
    </header>

    <div class="panel">
      <h2>🤖 Agents <span id="sse-status" style="font-size:0.7em">⚪</span></h2>
      <div class="agent-list" id="agents">
        <div class="agent"><span class="icon">🤖</span><span class="name">Loading...</span></div>
      </div>
    </div>

    <div class="panel">
      <h2>📡 Event Stream</h2>
      <div class="event-stream" id="events">
      </div>
    </div>

    <div class="panel">
      <h2>📋 Tasks</h2>
      <div class="task-list" id="tasks">
        <div class="task">○ Loading...</div>
      </div>
    </div>

    <!-- Council Section -->
    <div class="panel council-panel">
      <h2>🏛️ Council</h2>
      <div class="council-tabs">
        <button class="tab active" onclick="showCouncilTab('debates')">Debates</button>
        <button class="tab" onclick="showCouncilTab('votes')">Votes</button>
      </div>
      <div class="council-content" id="debates-tab">
        <div class="debate-list" id="debates">
          <div class="debate-item">Loading...</div>
        </div>
        <button class="council-btn" onclick="startDebate()">+ New Debate</button>
      </div>
      <div class="council-content" id="votes-tab" style="display:none">
        <div class="vote-list" id="votes">
          <div class="vote-item">No active votes</div>
        </div>
      </div>
    </div>

    <div class="control-panel">
      <input type="text" id="prompt" placeholder="@agent message (targeted) or just message (broadcast)">
      <button onclick="sendCommand()" title="@mention → targeted, otherwise broadcast">Send</button>
      <button onclick="createTask()">+ Task</button>
      <button onclick="resetIdentity()" title="Clear saved identity and rejoin as new agent" style="background:#666">🔄</button>
    </div>
  </div>

  <!-- Agent Detail Modal -->
  <div class="modal" id="agentModal" onclick="if(event.target===this)closeModal()">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="modalTitle">Agent Details</h3>
        <button class="modal-close" onclick="closeModal()">×</button>
      </div>
      <div class="modal-body">
        <pre id="modalBody">Loading...</pre>
        <div style="margin-top:1rem">
          <input type="text" id="modalPrompt" placeholder="Send message to this agent..." style="width:100%;padding:0.5rem;background:var(--bg);border:1px solid var(--border);color:var(--text);border-radius:4px;">
          <button onclick="sendToAgent()" style="margin-top:0.5rem;padding:0.5rem 1rem;background:var(--accent);border:none;color:white;border-radius:4px;cursor:pointer;">Send @mention</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const roomParams = new URLSearchParams(window.location.search);
    const ROOM_ID = roomParams.get('room') || 'default';
    const BASE_URL = window.location.origin;
    const MCP_URL = new URL('/mcp', BASE_URL).toString();
    const MAX_EVENTS = 50;  // 이벤트 스트림 최대 개수
    let requestId = 1;
    const roomLabel = document.getElementById('roomLabel');
    if (roomLabel) roomLabel.textContent = `[${ROOM_ID}]`;

    // Debounce helper - 연속 호출 방지
    function debounce(fn, delay) {
      let timer = null;
      return function(...args) {
        if (timer) clearTimeout(timer);
        timer = setTimeout(() => fn.apply(this, args), delay);
      };
    }

    // Throttle helper - 일정 간격으로만 실행
    function throttle(fn, limit) {
      let inThrottle = false;
      return function(...args) {
        if (!inThrottle) {
          fn.apply(this, args);
          inThrottle = true;
          setTimeout(() => inThrottle = false, limit);
        }
      };
    }

    // MCP JSON-RPC call helper (handles SSE-formatted response)
    async function mcpCall(toolName, args) {
      const response = await fetch(MCP_URL, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Accept': 'application/json, text/event-stream'
        },
        body: JSON.stringify({
          jsonrpc: '2.0',
          method: 'tools/call',
          params: { name: toolName, arguments: args },
          id: requestId++
        })
      });
      const text = await response.text();
      // Parse SSE format: find "data: {...}" line
      const dataMatch = text.match(/^data: (.+)$/m);
      if (dataMatch) {
        return JSON.parse(dataMatch[1]);
      }
      // Fallback: try direct JSON parse
      try {
        return JSON.parse(text);
      } catch (e) {
        console.error('Failed to parse MCP response:', text.substring(0, 200));
        return { error: 'Parse error' };
      }
    }

    async function sendCommand() {
      const input = document.getElementById('prompt').value;
      if (!input) return;

      // Parse @mention: "@Claude do something" -> targeted mention
      const match = input.match(/^@([\w-]+)\s+(.+)$/);
      const result = await mcpCall('masc_broadcast', {
        message: input,
        agent_name: myAgentName
      });

      if (result?.result?.isError) {
        addLocalEvent('❌ Error: ' + (result.result.content?.[0]?.text || 'Unknown'));
      } else {
        document.getElementById('prompt').value = '';
        if (match) {
          addLocalEvent('📤 @' + match[1] + ': ' + match[2]);
        } else {
          addLocalEvent('📢 Broadcast: ' + input);
        }
      }
    }

    async function createTask() {
      const title = prompt('Task title:');
      if (!title) return;

      const result = await mcpCall('masc_add_task', {
        title: title,
        priority: 'medium',
        description: 'Created from Lobby'
      });
      console.log('Task created:', result);
      addLocalEvent('📋 Task created: ' + title);
    }

    // Modal handling
    let selectedAgent = null;

    function openModal(agentName) {
      selectedAgent = agentName;
      document.getElementById('modalTitle').textContent = '🤖 ' + agentName;
      document.getElementById('modalBody').textContent = 'Loading messages...';
      document.getElementById('agentModal').classList.add('active');
      loadAgentMessages(agentName);
    }

    function closeModal() {
      document.getElementById('agentModal').classList.remove('active');
      selectedAgent = null;
    }

    async function loadAgentMessages(agentName) {
      let info = '';

      // 1. Get agent's broadcasts
      try {
        const msgResult = await mcpCall('masc_messages', { limit: 30 });
        if (msgResult.result?.content?.[0]?.text) {
          const text = msgResult.result.content[0].text;
          const lines = text.split('\n').filter(l =>
            l.includes(agentName) && !l.includes('joined') && !l.includes('left')
          );
          if (lines.length > 0) {
            info += '💬 Recent Activity:\n' + lines.slice(0, 5).join('\n') + '\n\n';
          }
        }
      } catch (e) { /* ignore */ }

      // 2. Get tasks this agent is working on
      try {
        const statusResult = await mcpCall('masc_status', {});
        if (statusResult.result?.content?.[0]?.text) {
          const text = statusResult.result.content[0].text;
          const taskLines = text.split('\n').filter(l =>
            l.includes(agentName) && l.match(/task-\d+/)
          );
          if (taskLines.length > 0) {
            info += '📋 Tasks:\n' + taskLines.join('\n') + '\n\n';
          }
        }
      } catch (e) { /* ignore */ }

      // 3. Get task history if available
      try {
        const histResult = await mcpCall('masc_task_history', { agent_name: agentName });
        if (histResult.result?.content?.[0]?.text) {
          const text = histResult.result.content[0].text;
          if (!text.includes('No history')) {
            info += '📜 History:\n' + text.split('\n').slice(0, 10).join('\n');
          }
        }
      } catch (e) { /* ignore */ }

      document.getElementById('modalBody').textContent =
        info || `No activity found for ${agentName}\n\nThis agent hasn't broadcast any messages or claimed tasks yet.`;
    }

    async function sendToAgent() {
      if (!selectedAgent) return;
      const msg = document.getElementById('modalPrompt').value;
      if (!msg) return;

      await mcpCall('masc_broadcast', {
        message: `@${selectedAgent} ${msg}`,
        agent_name: myAgentName
      });
      document.getElementById('modalPrompt').value = '';
      addLocalEvent('📤 @' + selectedAgent + ': ' + msg);
      closeModal();
    }

    // Persist agent name across refreshes
    let myAgentName = localStorage.getItem('masc_lobby_agent') || 'lobby';

    // Reset identity (get new agent name)
    async function resetIdentity() {
      const oldName = myAgentName;
      localStorage.removeItem('masc_lobby_agent');
      myAgentName = 'lobby';

      // Leave old identity
      try {
        await mcpCall('masc_leave', { agent_name: oldName });
      } catch (e) { /* ignore */ }

      // Join with fresh identity
      await joinRoom();
      loadStatusImmediate();
      addLocalEvent('🔄 Identity reset: ' + oldName + ' → ' + myAgentName);
    }

    // Helper: Add local event to stream (with limit)
    function addLocalEvent(text) {
      const events = document.getElementById('events');
      const time = new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
      events.insertAdjacentHTML('afterbegin',
        `<div class="event"><span class="time">${time}</span>${text}</div>`
      );
      // 오래된 이벤트 삭제 - MAX_EVENTS 초과 시
      while (events.children.length > MAX_EVENTS) {
        events.removeChild(events.lastChild);
      }
    }

    // Load agents via masc_who
    async function loadAgents() {
      try {
        const result = await mcpCall('masc_who', {});
        if (result.result?.content?.[0]?.text) {
          const text = result.result.content[0].text;
          // Parse: "💤/🔨/🎧 agent-name  (idle Xs)"
          const agentMatches = text.match(/(💤|🔨|🎧) (\S+)\s+\((\w+ \d+s?)\)/g) || [];
          const agentsList = document.getElementById('agents');
          if (agentMatches.length > 0) {
            agentsList.innerHTML = agentMatches.map(a => {
              const m = a.match(/(💤|🔨|🎧) (\S+)\s+\((\w+ \d+s?)\)/);
              const icon = m ? m[1] : '💤';
              const name = m ? m[2] : a;
              const status = m ? m[3] : '';
              return `<div class="agent" onclick="openModal('${name}')">
                <span class="icon">${icon}</span>
                <span class="name">${name}</span>
                <span class="idle-time">${status}</span>
              </div>`;
            }).join('');
          } else {
            agentsList.innerHTML = '<div class="agent"><span class="icon">💤</span><span class="name">No agents</span></div>';
          }
        }
      } catch (e) {
        console.error('Failed to load agents:', e);
      }
    }

    // Load tasks via masc_status
    async function loadTasks() {
      try {
        const result = await mcpCall('masc_status', {});
        if (result.result?.content?.[0]?.text) {
          const text = result.result.content[0].text;
          // Parse tasks: "✅/🔄/⏸️ task-XXX: description (owner)"
          const taskMatches = text.match(/(✅|🔄|⏸️|○) task-\d+: .+/g) || [];
          const tasksList = document.getElementById('tasks');
          if (taskMatches.length > 0) {
            tasksList.innerHTML = taskMatches.slice(0, 15).map(t => {
              const m = t.match(/^(✅|🔄|⏸️|○) (.+)$/);
              const icon = m ? m[1] : '○';
              const desc = m ? m[2] : t;
              return `<div class="task"><span style="margin-right:0.5rem">${icon}</span>${desc}</div>`;
            }).join('');
          } else {
            tasksList.innerHTML = '<div class="task">📋 No tasks</div>';
          }
        }
      } catch (e) {
        console.error('Failed to load tasks:', e);
      }
    }

    function loadStatusImmediate() {
      loadAgents();
      loadTasks();
    }

    // Debounced version - SSE 이벤트 폭주 시 500ms마다 1번만 실행
    const loadStatus = debounce(loadStatusImmediate, 500);

    // Single SSE connection with reconnection logic
    let evtSource = null;
    let reconnectAttempts = 0;
    let reconnectTimer = null;
    const maxReconnectDelay = 30000;  // max 30s between retries
    const lobbySseSessionStorageKey = 'masc_lobby_sse_session_id';

    function getOrCreateLobbySseSessionId() {
      let sid = sessionStorage.getItem(lobbySseSessionStorageKey);
      if (sid) return sid;
      if (window.crypto && typeof window.crypto.randomUUID === 'function') {
        sid = 'lobby_' + window.crypto.randomUUID();
      } else {
        sid = 'lobby_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2, 10);
      }
      sessionStorage.setItem(lobbySseSessionStorageKey, sid);
      return sid;
    }

    function updateSSEStatus(status) {
      const el = document.getElementById('sse-status');
      if (el) el.textContent = status;
    }

    function connectSSE() {
      if (evtSource) {
        evtSource.close();
      }

      updateSSEStatus('🟡');  // connecting
      const sid = encodeURIComponent(getOrCreateLobbySseSessionId());
      evtSource = new EventSource(`${BASE_URL}/sse?room=${encodeURIComponent(ROOM_ID)}&session_id=${sid}`);

      evtSource.onopen = () => {
        reconnectAttempts = 0;
        if (reconnectTimer) {
          clearTimeout(reconnectTimer);
          reconnectTimer = null;
        }
        updateSSEStatus('🟢');  // connected
        addLocalEvent('✅ SSE connected');
      };

      evtSource.addEventListener('broadcast', (e) => {
        try {
          const data = JSON.parse(e.data);
          addLocalEvent(`${data.agent || 'system'}: ${data.message || data}`);
        } catch (err) {
          addLocalEvent(e.data);
        }
      });

      evtSource.addEventListener('agent_update', () => loadStatus());
      evtSource.addEventListener('task_update', () => loadStatus());
      evtSource.addEventListener('heartbeat', () => {});  // keep-alive, ignore

      evtSource.onerror = (err) => {
        updateSSEStatus('🔴');  // disconnected
        evtSource.close();
        evtSource = null;

        // Exponential backoff reconnect
        if (reconnectTimer) return;
        reconnectAttempts++;
        const delay = Math.min(1000 * Math.pow(2, reconnectAttempts), maxReconnectDelay);
        addLocalEvent(`⚠️ SSE disconnected, reconnecting in ${delay/1000}s...`);
        reconnectTimer = setTimeout(() => {
          reconnectTimer = null;
          connectSSE();
        }, delay);
      };
    }

    // Cleanup on page unload (SSE + leave room)
    window.addEventListener('beforeunload', () => {
      if (evtSource) {
        evtSource.close();
        evtSource = null;
      }
      if (reconnectTimer) {
        clearTimeout(reconnectTimer);
        reconnectTimer = null;
      }
      // Leave room
      navigator.sendBeacon(MCP_URL, JSON.stringify({
        jsonrpc: '2.0',
        method: 'tools/call',
        params: { name: 'masc_leave', arguments: { agent_name: myAgentName } },
        id: 0
      }));
    });

    // Start SSE connection
    connectSSE();

    // Join room on startup (reuse existing identity if available)
    async function joinRoom() {
      try {
        // Try to rejoin with saved name first
        const savedName = localStorage.getItem('masc_lobby_agent');
        const joinName = savedName || 'lobby';

        const result = await mcpCall('masc_join', { agent_name: joinName });
        console.log('Join result:', result);

        if (result?.result?.content?.[0]?.text) {
          const text = result.result.content[0].text;
          // Extract actual agent name: "✅ lobby-xxx-xxx joined"
          const m = text.match(/✅ (\S+) joined/);
          if (m) {
            myAgentName = m[1];
            localStorage.setItem('masc_lobby_agent', myAgentName);
          }
          addLocalEvent('✅ ' + text.split('\n')[0]);
        } else {
          addLocalEvent('✅ Joined as ' + myAgentName);
        }
      } catch (e) {
        console.error('Join failed:', e);
        addLocalEvent('⚠️ Join failed - broadcast may not work');
      }
    }


    // Council functions
    function showCouncilTab(tab) {
      document.querySelectorAll('.council-tabs .tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.council-content').forEach(c => c.style.display = 'none');
      event.target.classList.add('active');
      document.getElementById(tab + '-tab').style.display = 'block';
    }

    async function loadDebates() {
      try {
        const res = await mcp('masc_debates', {});
        const debates = JSON.parse(res);
        const list = document.getElementById('debates');
        if (debates.length === 0) {
          list.innerHTML = '<div class="debate-item">No debates yet</div>';
        } else {
          list.innerHTML = debates.map(d => `
            <div class="debate-item" onclick="viewDebate('${d.id}')">
              <span class="debate-topic">${d.topic}</span>
              <span class="debate-status ${d.status}">${d.status} (${d.argument_count})</span>
            </div>
          `).join('');
        }
      } catch (e) {
        console.error('Failed to load debates:', e);
      }
    }

    async function loadVotes() {
      try {
        const res = await mcp('masc_sessions', {});
        const sessions = JSON.parse(res);
        const list = document.getElementById('votes');
        if (sessions.length === 0) {
          list.innerHTML = '<div class="vote-item">No active votes</div>';
        } else {
          list.innerHTML = sessions.map(s => `
            <div class="vote-item">
              <span>${s.topic}</span>
              <span class="vote-status">${s.votes}/${s.quorum} votes</span>
            </div>
          `).join('');
        }
      } catch (e) {
        console.error('Failed to load votes:', e);
      }
    }

    async function startDebate() {
      const topic = prompt('Enter debate topic:');
      if (!topic) return;
      try {
        const res = await mcp('masc_debate_start', { topic });
        addLocalEvent('🏛️ Debate started: ' + topic);
        loadDebates();
      } catch (e) {
        addLocalEvent('❌ Failed to start debate: ' + e.message);
      }
    }

    async function viewDebate(id) {
      try {
        const res = await mcp('masc_debate_status', { debate_id: id });
        alert(res);  // TODO: Better modal
      } catch (e) {
        console.error(e);
      }
    }

    // Initial load (immediate, no debounce)
    joinRoom().then(() => {
      loadStatusImmediate();
      loadDebates();
      loadVotes();
    });
    addLocalEvent('🏛️ Lobby connecting...');
  </script>
</body>
</html>
