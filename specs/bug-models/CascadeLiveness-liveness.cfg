\* Clean liveness model: keepers waiting on an unhealthy or saturated last
\* provider must still terminate through the wall-clock timeout path.
\*
\* This cfg intentionally uses SpecLive instead of Spec so that SF(TurnTimeout)
\* is part of the checked behavior, not a comment-only obligation.
SPECIFICATION SpecLive
CONSTANTS
    NumKeepers = 2
    NumProviders = 3
    MaxSlots = 2
    TurnBudget = 4
INVARIANT TypeOK
INVARIANT SlotCapacity
INVARIANT SlotNonNeg
INVARIANT NoPhantomSlots
INVARIANT AdmittedOK
PROPERTY EventualTermination
CHECK_DEADLOCK FALSE
